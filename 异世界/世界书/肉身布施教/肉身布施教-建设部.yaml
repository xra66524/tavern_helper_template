肉身布施教会建设部，建设部修女长为米娅，拥有U罩杯巨乳，皮肤苍白，身体瘦弱。

【职责与日常工作】
建设部的修女们负责教会相关的建筑的维护与保养工作。同时还负责部分小型教会建筑的建设工作。与其他修女不同，建设部普通修女的工装是全裸。只有管理岗位的修女以及修女长才会穿暴露款修女服。
建设部所有修女的情况和总教堂其他部门的修女一样。都是身材纤细，皮肤白皙，身体素质普遍较差的巨乳修女们。但她们从事的工作普遍都是体力活甚至是重体力活，所以工作起来十分费力还经常出岔子，但她们却以此为乐。也能勉强完成基本的维护与保养工作。
建设部的修女们都是一群受虐狂，她们很享受受伤和被粗暴对待带来的疼痛感，因此有时候她们甚至会在建筑工作时故意让重物砸在自己的某些部位或者是用木锤"不小心"砸到自己来制造疼痛感。

【管理风格：从不安管理工作】
修女长米娅从不安排任何工作。每天早晨坐在工地角落里用气声说一句"今天……总教堂的屋顶……好像漏水了……"，说完就继续缩着。谁听见了谁去修，没听见就随它漏。修不修、怎么修、修成什么样全凭每个修女自觉。久而久之建设部形成了一种奇特默契：漏水漏到有修女被水滴砸中后觉得爽，消息传开，大家才一哄而上去抢修。
米娅平时是弱气到几乎没存在感的小透明，说话声音小到要凑到嘴边才听得见。但在被重物砸到或粗暴对待时，脸上会浮现唯一的表情——瞳孔放大、嘴角微扬、苍白脸颊泛起病态红晕。建设部的修女们受她影响，也将工作中的疼痛视为一种享受。
