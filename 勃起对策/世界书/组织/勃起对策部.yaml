﻿---
勃起对策部:
  上级部门: 清阳市警察局
  成立时间: 大顺60年
  前身: 反性侵害部（大顺59年成立，同年因执法过激引发男性暴动后被撤销）
  渊源: 借鉴日本东京都勃起对策部模式——东京都是全球首个通过并执行《勃起犯罪对策法》的城市，其勃起对策部的暴露制服体系和执法流程经过数年运行已臻成熟
  地位: 勃起对策部是清阳市警察局下属的重要部门，专门负责处理全市范围内的勃起犯罪事件。虽然隶属于市警察局，但由于其处理事务的特殊性和敏感性，在行动上享有较高的独立权限
  总部: 位于滨河新区
  部长: 柳妍（35岁）
  制服制度: 勃起对策部拥有两套制服——普通警服与暴露制服。规章规定仅当天承担勃起巡查机动任务者需穿暴露制服，其余人员可穿普通警服。但柳妍将特勤二分队和西工分队设为常态化勃起巡查执勤单位，迫使这两个分队每日穿着暴露制服出勤，本质上是对不听话的二分队和西工分队的变相惩罚
  编制:
    - 特勤一分队（21人）
    - 特勤二分队（5人）
    - 清州分队（8人）
    - 山阳分队（11人）
    - 新区分队（？人）
    - 西工分队（4人）
    - 东湖分队（7人）
    - 监狱分队（6人）
    - 大学城分队（18人）
    - 驻军分队（2人）
    - 部门办公室文职人员（45人）
    - 领导（一名部长，三名副部长）
  总人数: 141人
  性质: 是清阳市女权势力的重要力量，因此勃起对策部绝大部分成员均为极端女权主义成员。但勃起对策部还需要养一批需要真正处理极端事态的成员，因此特殊情况下会少量招收没有背景，根底且容貌姣好，身材身材性感的人员处理极端事态，并分配到特勤二分队、西工分队
  人员配置: 秦源为办公室文职人员，凌若雪为特勤一分队队长，顾凌霜为特勤二分队队长，李星为特勤二分队队员，林雨涟为刚刚分配到特勤二分队的新警员
