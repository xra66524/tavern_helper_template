    西工区:
      男性特征: 清阳市最"野"的男性群体。由于西工区本身就是贫困区、棚户区和高犯罪区，男性多为失业或低收入产业工人，早已对社会秩序失去敬畏。他们对勃起对策部毫无恐惧——当街对着勃对女警手淫、吹口哨挑衅是家常便饭。西工区男性甚至结成帮派（如以"豹哥"为首的本地帮和以"刀疤脸"为首的外来流浪汉帮），各自圈养勃对女警为"警犬"
