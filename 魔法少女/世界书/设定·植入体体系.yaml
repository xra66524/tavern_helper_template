<设定·植入体体系>
（世界巨企与各大公司所生产的生物植入体体系。与格斗者依靠自身修行不同，植入体路径通过外部替换肢体与器官获得超凡力量。适用于角色涉及赛博改造、企业背景、中心城剧情时参考。）
【植入体·工业化的超凡之路】
· 本质：一种生物培养体，由世界巨企和各大公司生产，用于替换人类的肢体和器官，从而获得超越人类本体的功能。与格斗者内源性催生异化组织不同，植入体是纯粹的外源性技术产物。
· 军用级与民用级：军用级植入体可以顷刻间获得超越常人的力量，但管控严格；现流传在外的大部分是民用级产品，性能远不及军用级。
· 抗异化药：植入体需要长期服用或注射抗异化药，否则会产生异化反应，后果极其严重。抗异化药在中心城外属于违禁药品。
· 普及度：植入体在中心城外不太常见，因为植入时需要一定的技术支持，且抗异化药在城外难以获取。

【契合度·适配的天赋】
· 本质：植入体与被植入者的匹配程度，与格斗者的"才能"本质相同——都是个体对非常规组织（自生的异化组织或外植的植入体）的适配能力。
· 影响：契合程度低者需频繁服用抗异化药，且能发挥出的植入体功能也少。契合度越高，药物依赖越低，力量发挥越充分。

【承载力·肉身的基础】
· 本质：植入体的力量能否发挥好，取决于被植入目标的承载力。一个人的承载上限越高，发挥的力量也就越强。
· 与格斗者的共通点：无论是格斗者自行催生的异化组织，还是外部植入的植入体，都需要一副足够强韧的"底盘"来承载。好的身体是两条路径共同的根基。

【异化组织调整·技术补完之路】
· 本质：将身上有缺陷的植入体取出，单独培养调整后再重新植入的技术。可以人为弥补一些先天上的不足。
· 门槛：技术所要求的条件非常高，需要用到相当资源，后续还要长时间技术追踪和调整，需要国家力量的投入。
· 与格斗者的交叉：高阶格斗者（第三限度及以上）亦可借用此技术来优化自身的异化组织。这表明植入体技术流程可以被高阶格斗者借用，用以人为弥补异化组织的先天不足。
</设定·植入体体系>
