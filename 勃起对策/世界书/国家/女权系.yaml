---
女权系:
  归属: 大顺民国三大派系中议会派下的子派系
  地位: 议会派内组织力最强的子派系，虽非人数最多，但动员能力和舆论影响力远超其他子派系
  势力范围: 江南道为全国根据地，集中了核心学术机构、国际NGO驻顺办事处和主要媒体平台；济北道清阳市为激进派的重要控制据点，亦是在地方层面实践极端执法模式的实验室；岭南道、山南道的城市中产阶级女性中有广泛支持；全国市级议会中占有约两成席位
  意识形态: 以西方激进女权理论为底色，融合本土性别政治形成混合纲领。核心叙事为"父权制是万恶之源"，将社会问题性别化归因。具体主张随时代漂移：从早期的同工同酬和反家暴，逐步升级为职场配额制、教育内容审查、公共空间性别隔离、以及以"性同意"和"反骚扰"名义扩张的刑事法网
  国际关系: 高度依赖全球女权网络。获得西方基金会（类似福特基金会、开放社会基金会等的对应实体）和跨国NGO的持续资助；国际组织的性别平等排名和报告是其在国内施压的重要政治筹码；核心人物定期参与国际女权峰会，引入前沿理论和行动框架
  学术根基: 各大综合性大学的性别研究系（参照：现实中的Gender Studies学科）为意识形态生产中心。教授和研究生既是理论供给者也是政治活动家，通过学术论文、白皮书和专家证词为立法提供"科学依据"。学术圈内部的同行评议和引用网络形成封闭的正反馈回路
  媒体生态: 传统媒体中拥有大量同情者记者和编辑，社交媒体上通过话题标签、举报机制和信息压制主导性别议题叙事。反对声音被标签为"厌女""仇恨言论"而遭平台限流或封禁
  组织形态: 三层结构——顶层为激进派掌控的学术界和NGO领袖，通过控制国际资源和话语权设定政治议程；中层为职业化NGO工作者和基层女议员，是激进派意志的执行者；底层为大学社团和社交媒体活跃分子，负责舆论动员和"猎巫"反对者。建制派政府女性官员游离于此三层结构之外，缺乏自己的独立组织节点，实际上是被激进派半裹挟半利用的边缘角色
  筹款模式: 国际基金会拨款、国内富豪捐款（以企业社会责任或家族基金会名义）、政府性别平等专项预算、以及NGO的小额公众募捐。资金流向透明度低，行政开支和差旅费用占比较高
  制度捕获: 在各道政府中推动设立"性别平等委员会"，掌握人事否决权和预算审议权；在公立教育系统推行性别审查教材和教师培训；在大型企业中要求设立DEI（多元、公平、包容）部门并对管理层性别比例施加合规压力
  内部张力: 激进派垄断学术、NGO、基金会和国际资源，话语权碾压一切。建制派限于政府女性官员，主张体制内渐进，但无独立资源和舆论阵地，动辄被骂"父权走狗"。激进派态度——"用你的位置，听我的指挥"。清阳勃起对策在激进派眼中是"先锋实验"，建制派不安但不敢吭声
  关键人物: 激进派领导层集中在江南道——江南大学性别研究系的明星教授、全国妇女权益联合会的秘书长、以及多家受国际资助的大型女权NGO的负责人构成实际决策核心。柳妍与赵曼青为济北道清阳市的激进派地方实力人物，其"勃起对策"模式虽极端但在激进派舆论场中备受推崇，被视为"基层创新标杆"。建制派代表多为政务院各部委和道级政府中的女性高官，在体制内有职位但无派系话语权
