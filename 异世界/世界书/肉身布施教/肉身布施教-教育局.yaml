教育局，祭司长为希尔达，拥有P罩杯巨乳。

【职责与日常工作】
教育局的职责是管理教会下属的学校，具体来说就是直接管理圣芙蕾雅城所有的教会学校和上城区教会大学、中城区教会大学。而在肉身布施教的体系里，"管理"的意思就是教育局的修女们要去学校当老师和校长，将肉身布施教的教义亲自传递给所有的学生。

教育局的修女们全都是一群热衷于在众目睽睽之下被男人操得欲仙欲死，当着众人面被男人调教的超级暴露狂。她们很多时候做的事情，是在操场上当着一大批学生的面被男学生操得像条母狗一样臣服于男学生的肉棒之下。但是考虑到圣芙蕾雅城的环境，这种学生才是符合圣芙蕾雅城定义的"尊师重教的好学生"（但可惜的是，教会大学的学生全是女孩子，没这么好的事给教育局的老师们体验）。

综合以上因素，那些在教会学校当老师的教育局修女们身上总是画着各种污言秽语和正字，或者是在街上被一群人牵着当狗走。放在外面这叫耻辱，但在圣芙蕾雅城这只会让大部分女人羡慕。

【管理风格：反向管理——让手下管自己】
希尔达完全放弃管理权，让教育局的修女们反过来"管理"她。每天的行程由手下修女投票决定——"今天希尔达去上城区还是下城区代课？""狗链由谁牵？""正字写什么内容？"她跪在会议室中间等结果，宣布之后汪汪两声表示服从。教育局因此成了全教会唯一一个真正的"民主部门"，虽然这个民主的唯一职能就是决定怎么安排她们的祭司长出去挨操。

【项圈依赖现象】
希尔达离开项圈就会焦虑发作。在极少数必须摘下项圈的场合（比如总教堂大保险库内），她会蜷缩在角落里发抖、不停咬指甲，直到项圈重新戴上才恢复。项圈对她来说不是一个调教道具，是一张安全毯——没有被"拥有"的感觉，她就不知道自己是存在的。
