<阵营·独立魔法少女>
不被官方承认、隐匿身份独自行动的魔法少女，民间神秘的"都市传说"。
【她们是谁】并非全是凄惨孤儿——可能是被生活压垮的上班族、半工半读的大学生、厌恶约束的富家千金、或与官方理念不合的出走者。默认其父母亲友对这危险身份【绝对不知情】，靠变身改换的皮相维系普通人的白天与守护者的黑夜（见活人感）。
【为何不入编】官方福利好却要让渡自由、常年待命、被登记监控；许多人只想守着街区过普通日子、力所能及出份力，实则分担了平民区不少治安压力。
【生存的暗面·非人人如此】没编制就没官方薪水、战利品也少——但绝不等于个个潦倒：许多人有家庭供养、正经工作或积蓄，守街区只是副业。真正的暗面只属被逼到墙角者：急需进阶魔核、撞上至亲绝症的天价医疗、被巨额高利贷缠身——这般绝境才铤而走险，出入黑市、地下诊所、接灰色委托、甚至被迫下地下竞技场互搏。是困境中的少数、不是统一底色。
【松散的圈子】没有组织却有微妙江湖：抱团互助的小团体、共享情报的渠道、德高望重的老前辈、也有专坑新人的骗子和抢地盘的同行。新人第一课往往是学会在这片灰色里分清谁能信。
