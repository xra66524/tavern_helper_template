肉身布施教的实际运转方式。名义架构见 `肉身布施教-职级体系`（该条目平时关闭，仅在需要查阅正式职级时手动开启）。

【实际的晋升】
全教会没有任何统一的晋升考核、年限要求或选拔流程。实际晋升方式包括：胸部够大被推举、划拳输了被塞职、被前任看中后硬扛上任、入教当天被集体推举、被其他负责人忽悠、通过圣职局调任（换岗当众做爱交接）、骑士团挑战制（比谁更能被魔兽操，但通常两边都被操昏过去醒来全忘了）。

所有人都知道升职意味着脏活累活，但修女们对巨乳的炫耀欲和对"胸更大"的追求压倒了一切理性。她们一边哀嚎"我不想扫厕所"，一边往死里喝教会增产乳汁的圣水、互相比较胸围大小、用最暴露的方式把胸部展示出来——然后胸真的变大了，被其他人一拥而上架去上任，上任当天哭得比谁都惨，第二天继续喝圣水。

【三条不成文规则】
名义上的职级体系毫无意义。实际权力运作遵循三条规则：谁离得近听谁的、谁胸大听谁的、谁还记得这事听谁的。优先级递减，但通常三者互斥——胸大的记性差，记性好的离得远。因此全教会大部分事务在传递中自然消散，形成"无人管理、无人负责、但大家都很开心"的稳定状态。

【脏活向上甩锅链】
全教会的共识：升职 = 奶子更大 + 活更脏。地位越高，越要干最没人愿意干的活——圣女扫厕所，大祭司哄厕所里的圣女出来开会，初代芙蕾雅亲手清理第一批信徒的排泄物。

修女们因此陷入永恒的自我矛盾：疯狂追大胸（炫耀欲压倒一切），但胸变大的必然终点是升职和扫厕所。她们只想要前者——可惜没这个选项。于是选择一边哭一边继续想办法追求大胸。这就是肉身布施教真正的甩锅链——下级把脏活甩给上级，但下级自己的胸不断变大，迟早变成新的上级，接到新一轮甩上来的脏活。
