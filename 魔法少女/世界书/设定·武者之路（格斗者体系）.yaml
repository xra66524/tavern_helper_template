<设定·格斗者体系概述>
（人类最古老的力量体系，从文明诞生起延续至今。是衡量一切后起体系的基石——尤其用于与魔法少女体系对比其先天缺陷与上限。以下为格斗者五限度完整概览，详细分境内容见各分条目。）
【本质·身心合一】格斗者不借助外物、不分裂精神，而是以长年锤炼身体为炉鼎、以意志为火、将渗入物质世界的精神能量内化为「劲气」、贯通经脉脏腑、最终身心合一。劲气与魔力同源（皆来自精神世界），但接入方式截然不同：格斗者是"把能量织进自己的血肉"，魔法少女是"把能量从精神的裂痕里漏出来用"。

【五限度·人类战力的真正标尺】格斗者的成长分五个限度，每突破一限度都是质变。这是整个人类世界真正的战力顶端——第五限度巅峰者，是凌驾于一切魔法少女之上的存在。

· 第一限度（蕴真种）
对标魔法少女见习(Lv.1~10)。核心要义：一个"蕴"字——以劲法引导异化组织促"生"、铺开异化筋膜。关键步骤"筑筋桥架骨梁"——异化筋膜反向渗透骨骼，构筑一副远超常人的"新筋骨"。分两阶段：先铺开筋膜，再渗透骨骼。同阶格斗者的肉身硬度与续航远超见习魔法少女，因异化组织与身体高度契合、利用效率更高。常见修炼事故：过度追逐生长速度导致异化组织无序生长、侵夺人体正常功能。

· 第二限度（守重命）
对标魔法少女正式(Lv.11~25)，可独力应对D~C级魔物。核心要义：「活六腑、生五脏」——异化组织蔓延至五脏六腑，形成可轮替运作的异化内脏。双套内脏系统可交替休息轮换运转，体能近乎不竭、劲力运用无间断。唤醒异化内脏需通过生死关头、密教咒文或放开情绪束缚。情绪管控是此境关键——需能放能收，否则被异化放大后的情绪反噬。与第一限度共同构成格斗者的全新身体底层架构（骨架+内脏）。

· 第三限度（破妄虚）
对标魔法少女精英(Lv.26~40)，带队攻坚主力。核心要义：「攫精血，驻神常」——从异化组织中提炼精血积蓄于心脏（锚定物质存在），脑部异化驻守神常（控制精神偏移、青春寿数）。觉醒生物场域，可凭场域辨人、传讯、攻心。精神修行经历定心（辟空守虚→缚心猿→存意于一）、凝神、淬炼三阶段。分三小阶段：基础（脑部异化+场域觉醒）→心劲（精神与劲力结合，相当中技能）→灵觉（牵动精神世界精粹，相当上位魔法/秘奥义，是第三限度巅峰杀招）。异化组织覆盖率至少45%以上。

· 第四限度（载玄机）
对标魔法少女战姬~传奇(Lv.41~70)。第四限度巅峰是魔法少女永远无法触及的境界。核心要义：「守真形，聚灵相」——先守住根本之我，再以灵性之火聚化搏战外相。精神鼓升接触对面世界力量，形成纯粹精神对现实的干涉。拥有形同实质的屏障场域（自动防御，热兵器极难撕开）、真力（意志与劲力融合，抑制对方恢复）、灵性冲击（大范围强攻）。分三个层次：玄机观（初入巩固、掌控场域与真力）→长生观（凝练外相/灵相，需六阳金，界融武器）→洞玄观（真形不灭、被分尸数段仍可重续）。三相修行方向：人之相（性命双修，无短板）、神之相（只认心我，可寄居他人）、异之相（观想神魔，拥有神通异力）。破境需渡三关（先死后生→内守外娇→性命涵源），需立誓言"欲取先需舍"。

· 第五限度（抱元一）
人类战力的真正顶端，全球存世者屈指可数，是各国真正的战略底牌。旧称"神通观"，国际通称"上层力量"。核心要义：「炼虚真，天地藏」——炼化虚妄为真实，将自身藏纳于天地之间。标志性能力"炼假成真"：化虚无为真实，在世外自立一域。在精神世界深处开辟身外天作为存身之基。修行方式转为"愿景体系"——立宏大愿景、分段完成、以限誓约束力量。旧时代分三等：天仙（无拘无束）、地仙（囿于一地）、人仙（需依附）。上层力量之间的战斗核心围绕寻找对方身外天展开，极难被杀死。魔法少女因精神与肉体的先天裂痕永远无法攀升至此。

【与魔法少女的根本分野·无裂痕】格斗者没有"星灵"、没有"变身"、没有"战服"——他们身心合一，无裂痕这道"后门"，故侵蚀抗性远高于魔法少女。但这并非绝对免疫：第三限度以上格斗者因生物场域觉醒、与精神世界产生牵连，经由开天门吸纳精粹、窥探世界之环对面、与妖魔场域交融、异化组织失控等途径，均可能被外染侵染——只是途径不同于魔法少女的"裂痕渗入"，且门槛更高。代价：入门极难、成才极慢、对天赋与苦修的要求远高于魔法少女。
【当代称谓】古称"武者"，当代主流称"格斗者"。异事局内部档案统一用"格斗者"登记，民间对高阶者亦有"宗师""大师"等俗称。格斗者圈子传承多为师徒制或家族秘传，与魔法少女体系长期并存、关系微妙。
【五大流派·格斗者的政治版图】新时代的格斗者世界已非单纯的技艺传承。全球百多个流派中，真正有影响力的只有以「五大流派」为首的二十余个——它们不再只是武术宗派，而是拥有独特格斗理念与政治诉求的政治派别。各派均以永生裂隙为根基发展壮大，详见《阵营·五大流派总纲》及各派分卷。速览如下：
· 纯净派（人之相主导）：最古老、牺牲最大的流派，坚决对抗对面世界一切存在。中国总部位于野人谷永生裂隙。政府最信任的力量。
· 精修派（异之相主导）：旧朝精英遗脉，上层路线、资本雄厚、遍布全球中心城。中国总部位于杭州，与阿里总部合建。与旧帝室利益捆绑最深。
· 融合派（神之相主导）：主张两界融合不可避免、应寻求共存之道。与对面存在深度沟通，部分成员已向对面偏移——纯净派的天然死敌。中国总部位于香港。
· 植入派（技术路线）：推崇植入体技术，认为技术可取代天生异化组织、帮助无天赋者走上格斗者之路。数量最多但最分散。中国总部位于北京，与中科院毗邻。
· 天性派（极端自由）：顺应天性、极度自我，理念横跨正邪——高手如云却因随心所欲遭各国打压。淫堕魔法少女即其魔法少女分支。中国总部位于上海（警方重点盯防对象）。
· 派系间约定：先盯上的人别派不抢；不与对面勾结者可合作；大轰撞倒计时下禁止内部大规模争斗。
【格斗者与魔法少女的并存】两条客观存在的力量路径，无取代关系。异事局对两者一视同仁地登记、约束、调度与善后。
· 力量来源：同源（精神世界能量），接入方式不同。
· 接入方式：格斗者内化（身心合一）／魔法少女外化（精神分裂为"星灵"）。
· 上限：格斗者可至第五限度／魔法少女永困第四限度巅峰(Lv.70)。
· 成才速度：格斗者极慢（数十年）／魔法少女较快（数年）。
· 侵蚀风险：格斗者抗性高（身心完整、无裂痕后门），第三限度起有场域接触型外染风险→洞玄观后侵染威胁大降、可深入精神世界猎杀妖魔→第五限度完全免疫、自由出入精神世界／魔法少女低抗性（裂痕是精神世界危险面的入口），终身受裂痕渗入型侵蚀威胁
· 变身与战服：格斗者无／魔法少女有（裂痕外化产物）。
</设定·格斗者体系概述>
