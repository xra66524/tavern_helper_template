<设定·双世界交汇>
（本卡世界观的根本前提。一切超自然现象——魔力、裂隙、魔物、三大修炼体系——皆源于此。先理解本条，再读其余。）
【两界】地球所在的宇宙以物质为底层架构，称「物质世界」；另有一个以精神为底层架构的世界，称「精神世界」。两者底层法则完全不同、却如两个相互挨近的天体般沿某种轨道相互环绕、彼此吸引。
【周期律·距离波动】两界距离并非恒定，而在漫长周期中波动：远时影响极弱、近时影响极深。距离决定两界之间的渗透率——物质、能量、信息能否跨越、跨越多少，皆随距离涨落。周期有两相：
· 变动期（近点/灵潮时代）：两界距离较近，精神世界对物质世界影响深厚。裂隙频发、魔物涌入、人类中敏感者开始与精神世界共鸣、获得超凡之力。旧时代的王朝兴衰、文明起落，多与变动期暗合。
· 冷寂期（远点/末法时代）：两界几乎隔绝，精神世界对地球的影响趋近于零，超自然力量衰退至近乎消失，人类文明转向科学与理性。
· 当代：正处于一轮不同以往的变动期——两界距离持续缩短、变动期无限延长，冷寂期迟迟未至。详见《设定·精神世界与变动周期》。
【历史节律·文明兴衰的暗线】旧时代的王朝兴衰、文明起落，多与两界距离的波动暗合：神话时代两界极近、众神与英雄行走大地；古典文明两界尚近、巫术神谕预言盛行；中世纪两界渐远、魔力衰退而未绝；启蒙至工业革命两界跌入末法低谷、人类转向科学；当代两界正由远转近、灵潮复苏——这是本卡所处的时代。
【1980·大轰撞预警】约1980年，世界各国（通过格斗者与密教传承者的预警、以及裂隙活动的异常加速）发现一个严峻事实：两界距离已越过历史最近点、正加速冲向物质世界。终有一天，两界将完全靠在一起——物质世界的底层法则将被精神世界直接改写，后果不可预测、极可能是文明的终结。这一终局被命名为「大轰撞」。若不干预，大轰撞预计约2000年前后发生。
【2000·结局】大轰撞并未真正发生。推迟它的根本原因是世界之环的建立——1985年初代大型场域生物研发成功后，各国在格斗者、密教传承者与新生的魔法少女体系三方协力下，以中心城的大型场域生物为核心、于交融地靠近精神世界一侧搭建起「世界之环」（环幕）这道场域屏障。环幕持续抵消着两界相互吸引的牵引力，将大轰撞推迟至2028-2030年的窗口期。但世界之环只能"挡"而不能"推回"——两界距离未能推回冷寂期水平、仍维持在变动期的近距区间，裂隙持续、魔物不绝、共鸣者不断涌现，世界进入"长期灵潮对峙"的新常态，直至今日。环幕一旦被突破或崩溃，大轰撞将提前到来。详见《设定·世界之环与中心城》。
【大轰撞·迟早的终局】世界之环只是推迟、并非消除大轰撞。两界的相互吸引是底层法则层面的趋势，环幕抵消的只是牵引力的一部分、无法逆转两界靠拢的总趋势。各国共识：如无意外，理想情况下大轰撞约在2028-2030年必然到来——这是世界之环能争取到的极限缓冲期。届时无论环幕是否仍在，两界都将完成碰撞。这一倒计时是当代所有势力最深的焦虑根源，也是人类争分夺秒发展战力、寻找根本解法的根本动力。
【精神世界的性质】精神世界并非"天堂"或"地狱"，它是一个底层法则完全不同的异界：那里的"存在"以精神/意识为实体、物质稀薄或不存在；地球人难以直观察知其全貌，只能通过裂隙、共鸣、侵蚀等"界面现象"间接接触。
· 关键事实：精神世界中漫天都是S级妖魔——注意这里的"妖魔"是严格定义：仅S级魔物方可称妖魔（详见《魔物分类与威胁等级》）。人类在现世所遭遇的F~A级魔物，不过是环幕过滤后渗进来的零碎；在环幕的另一侧，以S级为基本单位的妖魔之潮无边无际。正因如此，大轰撞才是文明的终结——那不是一个世界撞过来，而是一片由S级妖魔组成的、密度远超人类战力的海洋压过来。
· 魔物是精神世界的原生存在随裂隙涌入物质世界的产物；所谓"交融地"是两界交汇的广袤中间地带——它不是精神世界的全部，只是人类通过中心城能触及的过渡区域，详见《设定·交融地》。
【力量的共同源头】格斗者的劲气、密教的仪式之力、魔法少女的魔力，本质都是精神世界的能量借由不同"接口"进入物质世界、被人类利用的形式。三大体系共享同一个源头，只是接入方式、代价、上限各不相同（详见各体系条目）。

【两界资源·源自精神世界的珍稀之物】
两界交汇不仅带来魔力与魔物，也带来了各类源自精神世界的物质与资源。以下为三大体系皆可使用的重要产物（因体系接入方式不同，具体用途可能各有侧重）：
· 魔核：魔物被击破后凝出的能量结晶，是魔法少女炼化升级的主要资源，也是硬通货。各国政府大量收购魔核——精炼后注入可食用明胶，可制成高能营养膏：普通级一小根即可满足常人一天活动所需；高等级营养膏可为第二、第三限度格斗者提供高强度活动所需的能量。格斗者群体中大量以此节省进食与排泄时间。详见『魔物分类与威胁等级』。
· 纯质（精神世界的精粹）：两界距离足够近时，精神世界的高纯度能量会凝为可见的结晶状物质，称为"纯质"。本质是精纯的精神世界能量——纯而不杂、不携带对面世界的污染性。可调和内外、纯化精神与肉身、加强潜力。过去两界靠近时不乏寻觅，如今被大势力严格封锁。格斗者用以突破第四限度；魔法少女可用以纯化自身的魔力质量、稳定裂痕边缘、延缓侵蚀。
· 遗落物（阴阳之变）：位于两界交界处自然凝结的特殊产物——"两天相交而成、代表着阴阳之变"。形态不定，但每件都承载着两界法则相互作用的痕迹。通常作为突破境界、强化力量、制作高等装备的引子。格斗者突破第五限度至少需要一件一级遗落物；魔法少女可用于强化星器（作为锚定物的升级材料）。一级遗落物虽稀少但对于大势力不难找，难得的是契合度；高等遗落物极度珍稀。
· 六阳金：来自对面世界的金黄色琥珀状晶体，坚不可摧。精神力量可侵蚀它、将其化炼融入自身。格斗者用一到两枚即可完成长生观灵相的构筑；魔法少女可将其嵌入星器或战服，提升锚定稳定性与防御强度。
· 珍材（天外精粹·魔核的上位产物）：仅S级魔物（妖魔）体内凝聚的高品质精粹。与魔核的区别见『魔物分类与威胁等级』。获取时的纯粹性要求因人而异——只有顶尖洞玄观才在乎"必须亲手独立击杀"；魔法少女和大部分普通洞玄观用他人击杀的珍材一样可行。格斗者以此为突破第五限度的核心引子，详见『格斗者·洞玄观』。</设定·双世界交汇>
