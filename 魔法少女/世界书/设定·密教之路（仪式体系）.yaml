<设定·密教之路（仪式体系）>
（与格斗者之路并列的古老体系，从文明诞生起延续至今。三大体系之一，理解它才能理解魔法少女"为什么是第三种方式"。）
【本质·以仪式撬动法则】密教不内化能量（如格斗者）、也不分裂精神（如魔法少女），而是通过绘制特定的仪式阵图、符文、咒轨，在物质世界中"撬动"精神世界的法则——如同用钥匙开锁，仪式是钥匙、精神世界的法则是锁。密教者本身不持有力量，他们是"仪式的工匠与执行者"。
【力量形式·仪式之力】密教的力量不储存在体内，而是临场绘制仪式时从精神世界"借"来：阵图完成、法则被撬动、效果显现、仪式结束则力量消散。故密教者无法像格斗者那样随时出手、也无法像魔法少女那样变身即战——他们需要时间与场地布置仪式，是"准备型"而非"即时型"战力。
【仪式的种类】
· 封印仪式：封堵裂隙、镇压魔物、封锁区域——这是密教最古老也最核心的用途，历代王朝都靠密教者封印裂隙、维系太平。
· 净化仪式：驱散瘴气、清除侵蚀、净化被污染之地——与魔法少女的净化系功能重叠但机制不同（密教靠仪式、少女靠魔力）。
· 增益仪式：为格斗者或魔法少女临时加持劲气/魔力、强化战力——密教者常作后方辅助。
· 攻击仪式：以仪式阵图直接攻击（如阵中凝聚法则之力轰击、阵图范围内压制魔物）——威力巨大但需提前布置、难以临场应变。
· 预言与感知仪式：窥探两界距离波动、预警裂隙、占卜吉凶——这是1980年人类能提前发现大轰撞威胁的关键，密教者的预言仪式是人类的早期预警系统。
【门槛与代价】密教的门槛在于"知识"而非"体质"——任何人只要能学会仪式的绘制与原理，理论上都能成为密教者，故其传承比格斗者更广、在古代常与宗教、宫廷、学术机构结合。代价是：①仪式耗时、难以应对突发战斗；②高阶仪式需要稀有材料（魔核、灵脉结晶、特定矿物等）；③撬动法则有反噬——仪式失败或过度使用会反噬密教者精神，轻则头痛失忆、重则疯癫甚至被精神世界"吞噬"。
【与格斗者、魔法少女的关系】
· 密教与格斗者：古代常并称"武密"，武者主战、密教主辅，许多古老门派兼修二者。当代仍有许多格斗者兼习密教基础仪式以辅助战斗。
· 密教与魔法少女：密教者对魔法少女体系的态度复杂——一方面，1985年世界之环的建立中密教者贡献不可替代：大型场域生物的仪式绑定、环幕阵图的绘制正是密教核心技术，而格斗者与魔法少女是守卫环幕的战力部分；另一方面，魔法少女的"变身即战"让密教的"准备型"显得笨拙，新生代中有人觉得密教过时。但高阶密教者仍是各国不可替代的战略资源（封印大型裂隙、预警两界波动、加持高阶战力、维护环幕阵图）。
【当代地位】官方称"仪式工程师"或"密教顾问"，异事局设专门的仪式司。民间密教传承者散布于各古老家族、宗教机构、学术团体中，有些与官方合作、有些独立。密教者数量介于格斗者与魔法少女之间，是"知识精英"型战力。
【三大体系定位速查】
· 格斗者：身心合一、内化劲气、即时战斗、上限最高、成才极慢、数量极少。
· 密教：以仪式撬动法则、准备型战力、知识门槛、反噬风险、数量中等。
· 魔法少女：精神分裂外化、变身即战、上限受限(Lv.70)、成才较快、数量较多（但仍稀缺）。
三者共享精神世界这一力量源头，是变动期人类应对危机的三种不同"接口技术"。</设定·密教之路（仪式体系）>
