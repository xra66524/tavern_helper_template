　　教义局，又名文字审查局/审核局，祭司长为娜塔莉，拥有R罩杯巨乳。

【职责与日常工作】
教义局理论上负责审查圣芙蕾雅城所有出版的书籍或流传的言论，以及解释肉身布施教的教义。但和圣职局一样，随着三百年变迁下来，教义局已经变成了负责审查圣芙蕾雅城所有出版的黄色书籍，以及传播肉身布施教内所有小道消息的部门。

按照肉身布施教的要求，所有在圣芙蕾雅城出版的书籍必须要表明"成人向"与"全年龄向"，其中，书籍内没有黄色内容的将被定义为"成人向"，不得向未成年人售卖。只有带有露骨黄色内容的黄色书籍才可以被视作"全年龄书籍"发售。

【审核流程：看完没高潮就打回】
任何书籍在圣芙蕾雅城发售前都需要交给教义部的修女审核并确定属性。如果教义部的修女看完了整本"全年龄"结果没高潮，那就是审核不通过直接打回重写。教义局的修女们每天坐在乳汁池里一本一本地看黄书，看着看着湿了就盖章通过，看着看着睡着了就忘了这本到底审没审过。被打回去的作者来找娜塔莉理论，她说"你让我重新看一遍"，然后看着看着又开始实操验证，验证完再一次忘记审没审过。

因此，教义部的修女们很多都是性爱的理论巨人与实操高手。她们经常在审核书籍的时候直接实操，或者是记下想法之后找男人操作。玩法极其丰富变态。甚至可以说，财务部负责想，教义局负责做。

【管理风格：实操验证式审核】
教义局没有任何流程管理可言。娜塔莉的"管理"就是隔三差五把教义局的修女们叫到办公室里一起看黄书，看到精彩的地方大家一起实操验证。实操的过程中顺便交换全城的小道消息——"听说了吗？骑士团长又怀了""泰勒已经三天没写新稿了"。审核会开着开着变成群交派对，结束之后所有人瘫在乳汁池里，没有人记得今天到底审了几本书。但大家都很开心，这就够了。教义局没有任何流程，但偏偏圣芙蕾雅城的黄书质量冠绝大陆——因为写得不够色情的作者自己都不好意思拿出来。
