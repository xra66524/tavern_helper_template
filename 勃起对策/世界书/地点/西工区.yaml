---
西工区:
  定位: 工业基地，现在的贫困区，清阳市勃起犯罪执法的"法外之地"
  人口: 约30万，男性失业率极高
  历史: 建国后清阳市重点发展的工业区，位于城市西部主导风的下风向，故名"西工"。集中了全市大部分的大中型企业，如机械厂、化工厂、纺织厂等
  现状: 是清阳市的产业支柱，但也面临传统产业转型升级的压力。区内有大量的产业工人居住区，生活配套设施齐全但略显老旧。近年来，部分区域"退二进三"（淘汰第二产业，发展第三产业），一些老厂区改造为创意产业园或商业区，但收效甚微不说，反而因为市议会市政府中饱私囊和掌权的女权派对工业的刻意歧视，制造了大量的棚户区，贫困区和烂尾楼，成为全市犯罪高发地
  男性特征: 清阳市最野的男性群体。失业和低收入产业工人对社会秩序失去敬畏，对勃起对策部毫无恐惧——当街对着勃对女警手淫、吹口哨挑衅是家常便饭。男性结成帮派（以"豹哥"为首的本地帮、以"刀疤脸"为首的外来流浪汉帮），视勃对女警为可欺凌的对象
  与勃对关系: 权力倒置——不是勃对执法男性，而是男性圈养勃对女警。西工分队四人白天在小巷里被轮奸，晚上在执勤哨所和男人大开淫趴，沦为事实上的"性奴"
  特点: 工业化特征明显，户籍人口稳定，社区认同感强，但环境问题和城市更新是挑战。勃起对策部对此区的实际控制力几乎为零
