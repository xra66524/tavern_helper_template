▸▸ 铁板桥式（角力桥式）
姿势描述：女性仅以头顶和后脚跟着地，全身悬空反弓成桥，双腿弯曲、双手可环抱男性或自然伸展。与下腰桥式（手脚撑地）不同，铁板桥的支点只有头和脚，对颈部和后链力量的要求呈指数级上升。
身体要求：颈部伸肌群（头夹肌、颈夹肌、斜方肌上部）的极限承重——全身重量和冲击力通过脊柱传导到颈椎，再由颈椎传导到头顶。竖脊肌和臀大肌组成的后链必须全程绷死以维持桥身不下塌，任何一次冲击后的微小塌陷都会直接把压力转移到颈椎，轻则颈部剧痛、重则当场无法转头。全教会公认基础技巧中最危险的一项，每年都有修女因训练不当导致落枕数周。
常见场景：修女的进阶炫技项目。因姿势极度反弓、乳房完全朝天，视觉上兼具力量感与淫靡感。
