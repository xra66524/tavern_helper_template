---
警用飞机杯:
  正式名称: 阴茎纹路与反应综合采集仪
  用途: 勃起对策部专用执法装备，用于采集嫌疑人阴茎生物特征数据、执行"现场排泄"及评估犯罪风险等级
  外观:
    外箱:
      材质: 银色金属箱，表面磨砂处理
      尺寸: 约两个鞋盒大小
      标识: 边角处印有勃起对策部红色徽章——一个被锁链缠绕的勃起阴茎图案，下方是交叉的电击棒
    内衬: 黑色海绵内衬，严丝合缝地嵌着采集仪主体
    采集仪主体:
      材质: 医用级高透明亚克力制成的圆柱形容器
      尺寸: 长约18厘米，直径5-7厘米
      内部: 布满数百个微小的硅胶触须，呈螺旋状排列，在光线下折射出淡粉色光泽，柔软如活物触手
      底部: 嵌有一圈细密的数据采集器——银色针尖大小的电极环绕排列，中间为微型摄像头，镜头处有幽蓝色指示灯
      外壳: 外侧包裹乳白色仿生硅胶，触感温润，模拟人体肌肤的质感和温度。外壳表面刻有精细刻度，从5厘米到20厘米不等
  技术参数:
    传感器: 128个独立硅胶触须传感器，可根据插入阴茎的尺寸自动调整紧密度
    恒温系统: 内置仿生硅胶恒温系统，维持在38°C左右，避免阴茎因温差而疲软
    采集精度: 可采集整个阴茎的血管纹路和龟头轮廓，精度堪比指纹识别
    档位: 触须收缩频率和力度共12个档位，从轻缓抚摸到高强度榨取
    最高档位: 全频抽搐加真空抽吸，可在三秒内强制射精，射精后疼痛持续至少半小时
    电击功能: 底部环形电极可释放电击，直接作用于龟头和冠状沟。强度可独立调节，最高档令男性痛不欲生。可与触须榨取同步使用——在射精瞬间施加电击，将快感转为痛苦记忆
    数据联网: 采集的血管纹路和龟头轮廓数据实时上传至济北道阴茎生物特征数据库。各市勃起对策部共享访问，如同指纹库——惯犯在任何辖区被查，插入采集仪即瞬间匹配档案，前科记录、历次射精数据一目了然
    强制勃起模式: 针对无法勃起的嫌疑人（紧张、生理障碍或抗拒配合），触须启动强制刺激程序——全触须高频振动，强制在三分钟内勃起。勃起后自动切换至预设的榨取或电击模式
    边缘控制: 可设置"无释放模式"——触须持续刺激使嫌疑人保持在射精临界点但永不释放，最长可持续数小时。用于审讯逼供或精神压制，被许多勃对警员视为最有效的讯问手段
  使用方法:
    步骤:
      - 嫌疑人被带回派出所后，处置者（勃起对策部警员）要求其现场勃起
      - 嫌疑人将完全勃起的阴茎插入采集仪
      - 处置者通过外壳上的触摸屏控制内部触须的收缩频率和力度，执行榨精
      - 设备自动记录从插入到完全勃起的用时、龟头充血程度及射精前的各项生理数据，录入嫌疑人档案
      - 底部微型摄像头记录射精全过程，包括精液喷射轨迹、射量、射速，用于评估犯罪风险等级
