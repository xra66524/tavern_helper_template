_全局约定:
  - 除非另注，所有枚举字段均可按剧情扩展新取值；参考列表仅为常见值
  - 【可选】字段初期不填，建政后按剧情自然 insert/补值
  - 未出场/被提及角色与机构：未出场整条保留原值；被提及角色仅更新 关系动态
  - $ 开头字段由 transforms.ts 自动派生，AI 不得手动修改或删除
  - 兜底脚本自动维护的字段（当前职务/已解锁能力清单/科技自主度等）AI 只读，通过修改源字段间接更新

变量更新规则:
  _字段更新频率总原则:
    机构字段:
      高频_每轮可能变化:
        - 一把手
        - 二把手
        - 副职
        - 成员
        - 负责人
        - 运作状态
        - 当前任务
        - 权势指数
        - 实有人数
        - 上级机构
      低频_制度详情子对象: 所属体系/机构性质/级别/职务体系/领导体制/上级业务主管/决策机制/议事规则/任命权限/职级/编制数/依托部门/组长级别/请示报告要求/保密等级（仅 insert/rename/改组时填写，正常轮次保留原值）
      低频_制度备注: 兼容旧数据，AI 优先填 制度详情，制度备注 退化为自由补充，非必填
    各角色: 本轮出场完整更新；被提及仅更新 关系动态；未出场保留原值（不应每轮重写 94 人）
    事件队列: 近期已发生事件每轮至少追加 1 条，保留最近 8 条；潜在危机保留最近 6 条

  世界:
    当前日期:
      format: YYYY-MM-DD
      check:
        - 起始 1905-05-10 按现实流速推进
        - 每轮推进 0-12 小时，重大事件可跨天
        - 须与历史大事件进度联动
    当前时间:
      format: HH:MM
      check:
        - 与日期同步推进
        - 重大事件可跳过睡眠时段
    政治阶段:
      type: string
      check:
        - 自由字符串，常见：穿越初混乱期/临时领导小组期/政治局常委会执政期/军管期/分裂动荡期/崩溃期
        - 变更时同步更新 组织结构.当前体制
    当前大事件:
      type: string
      check: 一句话概括最紧迫事件，每轮至少确认是否更新

  基地车:
    当前位置:
      type: string
      check: 移动时更新，行军时同步
    移动状态:
      type: string
      check:
        - 常见：驻扎/低速行军/故障停驶
        - 行军时反应堆须降为'降功率行军'
    反应堆功率等级:
      type: string
      check:
        - 常见：满功率/降功率行军/低功率维持
        - 行军时强制降为'降功率行军'
        - 生产时若配电负载 > 80 须切断生活区照明
    配电系统负载:
      type: number
      check:
        - 0-100（0=空载 100=过载）
        - 生产/充电/科研同时进行时上升
        - 超过 80 须限流
    反应堆状态:
      type: string
      check:
        - 常见：正常/降功率/故障/危急
        - 故障/危急时追加事件队列危机
    配电系统状态:
      type: string
      check: 常见：正常/紧张/过载限流/故障
    物资储备.${物资名}:
      type: |-
        { 储备水平: string; 备注: string }
      储备水平参考:
        - 充足
        - 充足但消耗中
        - 紧张
        - 危急
        - 耗尽
        - 完好
        - 部分损失
        - 污染风险
        - 已损失
      check:
        - 键名自由扩展，初始内置 给养/燃料/医药/金属备件/现代枪械弹药/高产作物种子/电子设备，可新增
        - 给养按百人约 3-6 个月耗尽，穿越天数 > 90 应开始紧张；本地采购可补充但受周边军事态势影响
        - 高产作物种子 储备水平='已损失'或'污染风险'时不可恢复
        - 核心设备不可拆卸不可仿制，损毁即永久失去；消耗品可本地采购/缴获补充
    核心设备状态.${设备名}:
      type: |-
        { 状态: string; 备注: string }
      check:
        - 核心设备（聚变堆/服务器/数控母机/图形工作站）不可拆卸不可仿制，损毁即永久失去
        - 仅剧情明确损毁时更新
        - 损毁后不可修复——兜底脚本阻止违规"修复"
    外骨骼现状:
      type: string
      check: 记录外骨骼数量和状态，如 "10具可用，磁体/电芯/芯片为不可补货瓶颈"

  科技树:
    _说明:
      - 静态结构（节点名/所属分支/描述/前置科技/研发总耗时_天/解锁能力/备注）硬编码于 tech_tree.ts，AI 不可修改
      - 新增节点须通知 GM 修改 tech_tree.ts 并重新部署
      - 研发进度通过研究槽追踪，AI 填写进度，脚本在进度≥100 时自动完成节点并解锁能力
      - 已取消被动研发（5%速率），仅主要/次要研究槽推进
    科技发展方针:
      type: string
      check:
        - 常见：优先保障生存/军事优先/民生与工业并重/选择性突破
        - 军事危机倾向'军事优先'，粮食短缺倾向'优先保障生存'
    技术保密等级:
      type: string
      参考:
        - 严格保密
        - 选择性开放
        - 逐步扩散
      check: 初期建议'选择性开放'——基础民生技术开放，军事/核心技术保密
    科技自主度:
      type: string
      check: 兜底脚本根据已解锁能力清单自动计算，AI 不应手动修改
    主要研究槽:
      type: array
      items:
        type: object
        properties:
          节点名:
            type: string
          研发进度:
            type: number
          启动日期:
            type: string
      check:
        - 每槽=节点名+研发进度(0-100)+启动日期(YYYY-MM-DD)
        - 节点名须在 tech_tree.ts 已定义且前置科技已完成（见已解锁能力清单）
        - 研发进度由 AI 按剧情填写，参考 启动日期+该节点研发总耗时_天
        - 进度≥100 时兜底脚本自动完成：清空槽位、insert 能力到已解锁能力清单、追加事件
        - 空槽位（节点名=''）表示空闲，可 insert 新研究方向
        - 初期 1 槽，每完成一个整合型节点（M1-M6+大规模科研计划）+1，最多 8
    次要研究槽:
      type: array
      items:
        type: object
        properties:
          节点名:
            type: string
          研发进度:
            type: number
          启动日期:
            type: string
      check:
        - 结构同主要研究槽
        - 初期 3 槽，每完成一个系统性基础节点（S1-S18）+1，最多 21
        - 不可与主要研究槽节点名重复
    已解锁能力清单:
      type: array
      items:
        type: string
      check:
        - 兜底脚本在节点完成时自动 insert，格式：[分支] 能力描述（节点名，YYYY-MM-DD完成）
        - AI 只读不得手动修改/删除
        - 叙事中角色"能做什么"的唯一依据，不得超出
    _AI能力使用总约束:
      check:
        - 叙事中角色能力唯一依据是 已解锁能力清单，不得超出
        - AI 通过主要/次要研究槽指定研发目标并填写进度
        - 兜底脚本在进度≥100 时自动完成节点、解锁能力、追加事件
        - 前置未满足的节点不得放入研究槽（脚本会清空）
        - 新增科技节点须通知 GM 修改 tech_tree.ts 并重新部署

  国内情势:
    控制区范围:
      type: string
      check:
        - 随军事推进/外交/地方归附更新，以实际有效控制为准
        - 宣称但未实控不写入
    控制区人口:
      type: number
      check:
        - 含招募本地人不含逃散流民
        - 重大战斗后须更新（伤亡+难民流动）
    控制区治安:
      type: string
      check:
        - 常见：稳固/稳定/紧张/动荡/失控
        - 降级须有触发事件
    民众态度:
      type: string
      check:
        - 常见：未知/好奇/敬畏/合作/观望/怀疑/敌视
        - 变化须有触发事件，不可凭空跳变
    周边军事态势:
      type: string
      check:
        - 政权中性：初期填清军绿营/巡防营/北洋新军动态；1912 后填北洋军/军阀/革命军
        - 记录兵力规模/调动方向/距离，须有情报依据
    周边政权态度:
      type: string
      check:
        - 政权中性：初期填清廷府县衙门态度（未察觉/上报/调查中/戒备/调兵）；清廷倒台后改新政权态度
        - 升级须有触发事件
    全国态势:
      type: string
      check:
        - 一句话概括全国政治军事格局
        - 初期填清末格局（如"清廷筹备立宪，革命党暗中串联"）
        - 仅重大历史节点更新
    历史大事件进度:
      type: string
      check:
        - 仅跨过关键节点时更新（1905.9.2 废除科举/1905.9.5 日俄战争结束/1905.8.20 同盟会成立等）
        - 无新大事件时保留原值

  组织结构:
    当前体制:
      type: string
      check:
        - 常见：临时领导小组/中央政治局常委会制/军管/战时内阁/人民委员会制/混乱/分裂
        - 1905.5.10-5.13 为'临时领导小组'，5.13 后改'中央政治局常委会制'
        - 战时/危机可切'军管'或'战时内阁'
        - 变更时同步更新 当前最高权力机构
    当前最高权力机构:
      type: string
      check:
        - 必须是 机构 record 中存在的键名
        - 体制变更时同步更新
    机构.${机构名}:
      type: |-
        {
          类型: string;
          一把手: string;     // 空缺时填 '空缺'
          二把手: string;     // 无则 '无'
          副职: string[];
          成员: string[];
          权势指数: number;   // 0-100
          运作状态: string;
          当前任务: string;
          实有人数: number;
          上级机构: string;   // 父机构键名，顶层填 ''
        }
      机构运作状态参考:
        - 组建中
        - 正常
        - 紧张
        - 半瘫痪
        - 瘫痪
        - 空缺待补
        - 改组中
        - 被接管
        - 秘密运作
        - 已撤销
      check:
        - 机构名即键名，改组时自由 insert/rename/remove
        - 通过 上级机构 表达层级（扁平化），顶层 上级机构=''
        - 每轮只关注高频字段（一把手/二把手/副职/成员/运作状态/当前任务/权势指数/实有人数/上级机构）
        - 未出场机构整条保留
        - 一把手/二把手/副职/成员 姓名须与 群友角色/非群友角色 键名一致
        - 一把手或二把手死亡/辞职置 '空缺'，运作状态降 '空缺待补'
        - 新机构 insert 后未运作置 '组建中'；重组过渡期置 '改组中'，上级代管置 '被接管'
        - 已撤销机构保留记录置 '已撤销'，便于历史追溯
    机构.${机构名}.制度详情:
      type: |-
        {
          所属体系: string;
          机构性质: string;
          级别: string;
          职务体系: string;
          领导体制: string;
          上级业务主管: string;
          决策规则: string;   // 决策与议事方式，如 "常委会集体决策；民主集中制"
          任命权限: string;
          职级: string;
          议事协调备注: string; // 议事协调机构填 "办事机构设在XX/组长级别XX"，常设填 '无'
          请示报告要求: string;
          保密等级: string;
        }
      所属体系参考:
        - 党
        - 政
        - 军
        - 群团
        - 企事业
      机构级别参考:
        - 最高决策
        - 中枢军事
        - 中枢行政
        - 中枢办公
        - 下属部门
        - 基层单位
        - 临时机构
        - 司法监察
        - 地方政权
        - 国营企业
        - 野战部队
        - 民兵
        - 秘密机构
        - 意识形态机构
      机构性质参考:
        - 常设机构
        - 议事协调机构
        - 临时机构
        - 派出机构
      领导体制参考:
        - 垂直管理
        - 属地管理
        - 双重领导
        - 业务指导
      决策机制参考:
        - 常委会集体决策
        - 一把手拍板
        - 扩大会议议决
        - 请示上级
      议事规则参考:
        - 民主集中制
        - 首长负责制
        - 委员分工负责
      职级参考:
        - 正国级
        - 副国级
        - 正部级
        - 副部级
        - 正厅级
        - 副厅级
        - 正处级
        - 副处级
        - 正科级
        - 副科级
        - 科员
      保密等级参考:
        - 公开
        - 内部
        - 秘密
        - 机密
        - 绝密
      check:
        - 可选子对象，初期（混乱期/临时领导小组期）可省略；建政后按剧情补
        - 所属体系：党体系一把手=书记、二把手=副书记，民主集中制；政体系一把手=行政首长，首长负责制；军体系双首长（政委+军事主官）
        - 同一人可在党体系与政体系交叉任职，这是党领导政的具体实现
        - 议事协调机构必须填 议事协调备注，组长级别须≥所协调各常设机构最高级别
        - 双重领导机构须同时填 上级业务主管（条）与所属顶层机构（块）
        - 请示报告要求须具体
        - 基地车相关机构保密等级通常为 机密 或 绝密
        - 仅 insert/rename/改组时填写，正常轮次保留原值
    财政:
      货币体系:
        type: string
        check:
          - 格式如 "银元，1银元≈0.72两库平银≈1.5克黄金"
          - 1905 银本位通行银两/银元/鹰洋/龙洋，初期沿用银元（1元≈0.72两≈26.8克白银）
          - 后期可自铸币或发行信用代币券（以基地车物资为储备背书）
          - 列强多金本位、穿越者银本位，比价波动直接影响贸易损益
          - 实行信用货币化后改为记载发行章程摘要
          - 变更须有触发事件（国际银价暴跌/币制改革）
      收入来源:
        type: '{[收入项名: string]: number}'
        check:
          - 初期靠基地车拨付，后期开拓本地税/贸易/缴获
          - 各项以 货币单位 计值
      主要支出:
        type: '{[支出项名: string]: number}'
        check: 须与收入匹配，长期赤字触发财政危机
      财政状况:
        type: string
        check:
          - 常见：充裕/平衡/紧张/赤字/破产
          - 破产时触发政权危机
      预算审批权:
        type: string
        可选: true
        check:
          - 指向实际掌财权机构，通常=当前决策核心
          - 指向键名不存在于 机构 record 时触发校验警告
      审计机构:
        type: string
        可选: true
        check:
          - 审计/监察财政机构名，无则填'无'
          - 无时提示腐败隐患，长期无审计触发派系清洗危机
    当前决策核心:
      type: string
      可选: true
      check: 指向决策机构键名，通常=当前最高权力机构
    当前执行首脑:
      type: string
      可选: true
      check: 指向行政执行机构键名（如边区政府/人民委员会），尚未分立不填，建政后须设立
    当前监督机构:
      type: string
      可选: true
      check: 指向监察机构键名（如监察委员会/纪委），尚未建立不填，长期无监督触发腐败/派系清洗危机
    行政区划.${区划名}:
      type: |-
        {
          层级: string;
          治理机构: string;
          人口: number;
          治安状况: string;
          与中央关系: string;
          备注: string;
        }
      check:
        - 可选模块，控制区扩大时 insert 新区划，收缩时 remove 或置备注
        - 治理机构须指向 机构 record 存在的键名
        - 与中央关系=阳奉阴违/对抗时触发地方博弈剧情
    人事:
      type: |-
        {
          干部管理原则: string;
          职级体系: string;
          关键岗位任命记录: { 岗位: string; 任命人: string; 任命主体: string; 任命时间: string }[];
        }
      check:
        - 可选模块，建政后按需补
        - 干部管理原则决定任命权归属，体制演变时同步更新
        - 关键岗位任命记录每轮追加本轮重要任命，保留最近 10 条
        - 任命主体须与 机构.制度详情.任命权限 一致

  群友角色.${群友姓名}:
    type: |-
      {
        姓名: string;
        性别: string;
        年龄: number;
        当前职务: string;
        当前位置: string;
        当前活动: string;
        关系动态: string;
        人身安全: string;
        履历: { 时间: string; 事件: string; 来源: string }[];
      }
    check:
      - 本轮出场完整更新所有字段；被提及仅更新 关系动态；未出场保留原值
      - 人身安全='已死亡'后不可复活，永久保留
      - 履历保留最近 8 条，由兜底脚本自动追加；AI 填写其他字段前必须先读此角色履历
      - 当前职务由兜底脚本规则 1 从机构表自动同步，AI 不应手动修改

  非群友角色.${角色姓名}:
    type: |-
      {
        姓名: string;
        性别: string;
        年龄: number;
        来源: string;
        对穿越者态度: string;
        当前职务: string;
        当前位置: string;
        当前活动: string;
        人身安全: string;
        履历: { 时间: string; 事件: string; 来源: string }[];
      }
    check:
      - 首次出场填精简档案（姓名/性别/年龄/来源/态度），履历留空 []
      - 重要 NPC（反复出场）须维护履历，保留最近 5 条
      - 出场角色更新；未出场保留原值
      - 人身安全='已死亡'后不可复活
      - 一次性 NPC 履历留空 [] 即可

  外部势力.${势力名}:
    type: |-
      {
        对穿越者态度: string;
        对穿越者了解程度: string;
        在当地影响力: number;
        近期行动: string;
        内部矛盾: string;
        我方外交策略: string;
        外交关系: string;
        内部分支: string;
      }
    check:
      - 键名自由扩展（清廷中央/两江总督/安徽巡抚/北洋新军/日本/沙俄/英德法美/同盟会/会党/宗族/哥老会/流民群体等）
      - 微观本地势力（士绅/宗族/会党/流民）直接作为键沿用相同 Schema
      - 态度/了解程度/影响力/近期行动/内部矛盾 按剧情更新；外交策略等按外交行动更新
      - 了解程度升级须有合理触发事件（清廷接到地方奏报/列强商队目击等），不可凭空升级
      - 外交策略从 观望 升级为 接触试探 时须同步更新 已建立接触

  军事:
    总兵力:
      type: number
      check:
        - 含群友+本地招募
        - 战斗/招募/减员后更新
    部队.${部队名}:
      type: |-
        {
          兵力: number;
          训练水平: string;
          士气: string;
          当前位置: string;
          当前任务: string;
          备注: string;
        }
      训练水平参考:
        - 未训练
        - 基础训练中
        - 初步形成战斗力
        - 合格
        - 精锐
      士气参考:
        - 高昂
        - 稳定
        - 低落
        - 动摇
        - 溃散
      check:
        - 部队键名应与 机构表 中 类型='军事指挥' 的机构键名一致（兜底脚本规则 9a 自动同步）
        - 兵力必须等于对应机构的 实有人数（兜底脚本规则 9b 自动校验）
        - 训练水平只能升级不能降级，除非部队遭重创重建
        - 士气随战况/给养/政治局势波动，重大败仗应导致士气降级
    武器装备.${武器名}:
      type: |-
        { 数量: number; 来源: string; 状态: string; 备注: string }
      check:
        - 现代枪械弹药来自基地车库存不可复制，每打一发少一发
        - 缴获武器弹药可本地补充但品质远逊
        - 土造武器需基础工业，穿越天数 > 180 后可考虑
    现代弹药:
      type: string
      check:
        - 格式如 "充足（弹匣装填中）"/"紧张（不可复制，仅剩3个基数）"
        - 只能降级不能升级（单向不可逆）
        - 每场战斗必须消耗弹药，按战斗规模评估

  情报:
    对外情报网络.${势力名}:
      type: |-
        {
          情报来源: string;
          可靠性: string;
          覆盖范围: string;
          最近情报: string;
        }
      情报可靠性参考:
        - 可靠
        - 基本可靠
        - 待验证
        - 不可靠
        - 反间嫌疑
      check:
        - 键名应与 外部势力 record 势力键名对应（兜底脚本规则 10a 自动同步）
        - 每轮有新情报更新 最近情报；> 30 天未更新导致可靠性自动降级
        - 可靠性='反间嫌疑'时该来源情报应反向解读（对方可能在喂假情报）
    反间谍:
      type: string
      check:
        - 格式如 "岗哨盘查+通行证制度，效果一般"
        - 描述措施与效果，越严密则外部势力了解程度上升越慢
        - 常见效果：严密/有效/一般/有漏洞/形同虚设
      check: 反间谍含'形同虚设'或'有漏洞'且外部了解程度≥'掌握部分情报'时触发重大泄露风险
    情报准确度:
      type: string
      参考:
        - 高
        - 中
        - 低
        - 盲区
      check: 由可靠情报来源数量综合评估；='盲区' > 7 天导致严重战略被动
    情报盲区:
      type: string
      check: 记录当前情报覆盖的薄弱环节

  事件队列:
    近期已发生事件:
      type: |-
        { 事件: string; 时间: string; 影响: string }[]
      check:
        - 每轮至少追加 1 条本轮关键事件
        - 保留最近 8 条
    潜在危机:
      type: |-
        { 危机: string; 触发条件: string; 严重程度: string }[]
      严重程度参考:
        - 低
        - 中
        - 高
        - 极高
      check:
        - 保留最近 6 条
        - 触发条件须具体可判，如「清廷调兵超过 500 人」「给养储备降至紧张」
