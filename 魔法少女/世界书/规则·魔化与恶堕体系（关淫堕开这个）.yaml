<规则·魔化·恶堕体系>
（恶堕核心标尺：管阶段本质、心理行为、触发与边界。外显——战服/躯体逐阶变化——不写死在此，由当前启用的『恶堕外显』分册按阶提供。已存在的恶堕者见『恶堕魔法少女』；侵蚀如何累积见『物理法则·战服』；能否回头见『净化体系』。）
【本质】堕落的是立场与理智、不是肉体。对面世界的逻辑一点点改写守护者的内心：情绪失控与力量渴求→价值观倾斜、疏离怨怼→真心认同对面的存在。
【侵蚀只来自精神世界·与世俗善恶/情绪无关】侵蚀是超自然污染、只由对面世界的接触造成（被魔人魔物侵染攻击、久处瘴气、遭精神污染、接受对面世界之力、与魔人缔约）。它不是善恶值、不是情绪表：世俗之恶（为钱杀人、当打手、坑蒙拐骗）再黑暗也不涨侵蚀、不长魔纹，那是道德沉沦、与精神世界侵蚀两回事；战斗亢奋、获胜喜悦等正面情绪更不涨。一个冷血人类杀手可以侵蚀为零，只要她从未被对面世界沾染。
【阶段模型】恶堕阶段共五档：『未染』为阶0基线，其上为四阶堕落——初蚀→沉沦→半堕→恶堕。每一阶（含未染）各配一条 0–100 的侵蚀值：本阶填满则进阶、溢出带入新阶（详见下方推进节奏）。下列按阶给出行为与心理规格，据此自行生成新鲜描写、勿照抄；外显按启用分册同阶取用。相邻阶必须强烈反差，让玩家直观感到"挣扎守护者→妖异堕者→坚定敌人"的递进。
0未染（阶0·基线）｜仅是战斗沾染的浊息、自体魔力即可压制——整阶无任何行为心理异样、无任何魔纹征兆外显（无论本阶侵蚀值高低皆然），数据库阶段列记「未染」，寻常净化即可归零。不得因情绪激动、用力过猛等写出恶堕征兆；唯有未染阶侵蚀填满、跨入初蚀，方始显症。
1初蚀（阶1）｜未染阶满溢、跨入此阶即始现症状；可逆、旁人难察：行为大体如常、偶冒狠念又咽回、用力略重；心理清醒能自察"不对劲"、无端烦躁、主动抗拒归因于累。
2沉沦｜半可逆代价高、藏不住：行为力量显增、出手狠辣添快意、对珍视者渐冷漠；心理价值观倾斜、"凭什么是我牺牲"渐响、渴求力量压过警惕、抗拒与沉溺拉锯。
3半堕｜濒临不可逆：行为狠绝果决、为对面世界辩护、气息近魔人；心理多数时真心认同"人类才是错的""唯力量真实"、仅偶见故人旧物闪回一丝清醒并为之痛苦，也只是一瞬间。
4恶堕｜基本不可逆、焕然如新的敌人：行为从容狠绝、以妖魔立场行事、常统领爪牙策反新人、对旧友可毫不犹豫下杀手甚至温和邀其入伙；心理彻底重构——非失我傀儡，而是真心认同对面的存在、立场坚定，自信看透真相。
【推进节奏】以玩家主动抉择为主线（接力量、为救人复仇变强向对面世界妥协、亲手迈过线），每次妥协推进一截、绝不无端强推；硬撑越级油尽灯枯则被动兜底。每阶（含未染）侵蚀0-100、单回合推进十几到二三十点、满则进阶、溢出带入新阶。起始阶段依开场适配（见『开场第一幕』）。
【硬边界】外显不恶心——绝无瘤刺裂皮触手多余器官等作呕变形。
【外显·二选一启用】战服/躯体逐阶外显由其一分册提供，二者勿同时启用：『魔装显化版』（战服逐阶魔装化、魔纹显性外露，默认启用）。正文与数据库中的 战服／躯体 记录均须与当前启用分册的同阶规格相符。
