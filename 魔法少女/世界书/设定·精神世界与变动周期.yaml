<设定·精神世界与变动周期>
（两界交汇的根本节律。本条补充《双世界交汇》中未展开的周期命名、大轰撞概念、开天门机制及整体局势。）

【变动期与冷寂期】
两个世界如同相互环绕的天体，彼此吸引、牵扯，距离并非恒定，在漫长周期中波动：
· 变动期：两界距离较近，精神世界对物质世界影响深厚。旧时代的王朝兴衰、文明起落，多与变动期暗合。在变动期，裂隙频发、魔物涌入、人类中敏感者开始与精神世界共鸣、获得超凡之力。
· 冷寂期：两界距离较远，精神世界的影响极为微弱直至近乎消失，超自然力量衰退，人类文明转向科学与理性。
· 当代：本卡所处的时代正处变动期——且这一轮变动期不同以往，两界距离正持续缩短，变动期正在无限延长，冷寂期迟迟未至。

【大轰撞】
世界各国于20世纪80年代发现：随着两个世界越来越近，终有一天两界将完全靠在一起，物质世界的底层法则将被精神世界直接改写，这一终局现象被命名为「大轰撞」。1980年代末，各国预测若不干预，大轰撞约在2000年前后发生。
推迟大轰撞的根本原因是世界之环的建立：1985年初代大型场域生物研发成功后，各国在格斗者、密教传承者与新生的魔法少女体系三方协力下，以中心城的大型场域生物为核心、于交融地靠近精神世界一侧搭建起「世界之环」（环幕）这道场域屏障。环幕持续抵消着两界相互吸引的牵引力，将大轰撞推迟至2028-2030年的窗口期。但世界之环只能"挡"而不能"推回"——两界至今仍维持在变动期的近距区间，世界进入"长期灵潮对峙"的新常态。环幕一旦被突破或崩溃，大轰撞将提前到来。详见《设定·世界之环与中心城》。
· 迟早的终局：世界之环只是推迟、并非消除大轰撞。两界的相互吸引是底层法则层面的趋势，环幕抵消的只是牵引力的一部分、无法逆转两界靠拢的总趋势。各国共识：如无意外，理想情况下大轰撞约在2028-2030年必然到来——这是世界之环能争取到的极限缓冲期。这一倒计时是当代所有势力最深的焦虑根源。

【开天门】
当较为庞大的场域生物在交融地深处发生自我分裂繁殖时，其释放的能量会在无形中拉近两界局部距离，并形成一种特殊的裂隙——旧时代称之为「开天门」。
· 天门裂隙与普通裂隙不同：其规模更大、持续时间更长，且会引渡来大量对应世界的外染（精神污染），同时亦有他世精粹（高质量精神世界能量）一并涌入。
· 第三限度格斗者若把握住时机、使用正确方法进入天门附近修行，可吸纳精粹、获取突破契机——旧国教所谓"灵丹吞吐，服饮长生"即指此事。
· 代价：吸纳精粹时不可避免接触外染。运气好者或能活下来并迈上更高层次；运气不好者当场死亡已是好结果，大部分会蜕变为某种非人存在，或被对面世界那些存在所侵占。
· 当前立场：各国政府对开天门持谨慎态度。官方格斗者需经审批方可接近；未经批准擅自利用天门者，一经发现严肃处理。

【整体局势·漫天妖魔】
精神世界那边漫天妖魔，数量之巨根本数之不清——注意：此处"妖魔"不是泛指所有魔物，而是特指S级魔物。在异事局的威胁评级中，S级即"灾厄级"——每一头都需要倾尽全省战力或出动传奇级魔法少女才能应对。而这样的存在，在精神世界中密密麻麻、漫无边际。
这意味着什么？人类迄今为止所面对的所有魔物入侵——从F级到A级——都只是从对面世界"渗"过来的边角料，是那道环幕挡下了真正的海啸。倘若大轰撞发生、环幕彻底崩溃，物质世界将面对的不是零星的魔物袭击，而是以S级妖魔为基本单位的、铺天盖地的妖魔之潮。
正因如此，从古至今现世有所成就的先人——无论格斗者、密教传承者还是后来的魔法少女——都在持续与之对抗。两界的挨近固然让对面妖魔更容易过来，但也令整个现世的生灵获得了迈上超脱之路的机会。对面世界并非瞬间压来，而是先由薄弱处侵入，再徐徐挤压，最后才与现世合为一体。这个过程可能持续数载、十数载，甚至百年千年——直到两个世界完全不分彼此。
