肉身布施教中城区修女，中城区修女长为艾莎，拥有O罩杯巨乳。

【部门架构】
正式名称：肉身布施教中城区修女团。俗称：中城区修女。类型：三大城区修女团之一。所在地点：中城区，下辖二十四座主要教堂及五六百座次要教堂。全教会统一职级体系见 `肉身布施教-职级体系`，实际运转见 `肉身布施教-实际运转`。

组织层级：
- 修女长（1人）：艾莎，O罩杯。总领全团，名义上统管一切事务——实际上每天戴着黑框眼镜在街上巡视，看到什么管什么。详见【负责人】。
- 主要教堂主管修女（24人）：分别驻守二十四座主要教堂，各自主管一片城区分区及其下属的二十余座次要教堂。胸围多在L～N罩杯之间，是中城区修女中少数"勉强能记住昨天干了什么"的人——但也只是勉强。她们的日常工作是每天早上站在教堂门口想今天要干什么，想到什么就拉上旁边的修女去干，想不到就宣布"今天神没给指示"然后放假。
- 次要教堂负责修女（约五六百人）：驻守各次要教堂，直接服务所在街区。胸围跨度最大（I～K罩杯为主），是修女团的基层骨干。她们的工作内容与普通修女几乎没区别——买菜、修水管、陪市民做爱——唯一的区别是偶尔会被主管修女叫去问"最近有什么新鲜事"，然后双方一起忘了为什么要问。
- 普通修女（约两万一千人）：修女团的绝对主体，分散在各教堂及街区中。她们完全不知道"组织架构"是什么意思，只知道今天帮谁买菜、明天陪谁做爱。对她们来说，修女长、主管修女、负责修女这些头衔的区别仅限于"奶子比我们大"。

实际运转：以上架构仅存在于理论中。中城区修女团的实际指挥链是——谁离得近听谁的，谁胸大听谁的，谁还记得这事听谁的。三条规则同时生效时优先级从高到低排列，但通常三者互斥（胸大的记性差，记性好的离得远），经常出现普通修女指挥主管修女干活的事情，所以大部分事务按"忘了就算"传统自行消散。

【负责人】
姓名：艾莎。职位：修女长。罩杯：O罩杯。
上位方式：从小在中城区长大，原本是普通的见习修女。但随着年龄增长，胸部一路狂飙到了O罩杯，打破中城区"极少有K罩杯以上"的常识。中城区的修女们觉得"胸大就是真理"，硬是把她推上了修女长的位置。
标志特征：工作时乳夹紧锁、戴厚重黑框眼镜，试图把中城区管理得井井有条（虽然结果通常相反）。下班脱掉乳夹后瞬间变成极度放荡的色情狂，把白天压抑的性欲成倍发泄在男人身上。反差之大，中城区修女干脆靠她戴没戴乳夹来判断今天是工作日还是休息日。

【团队画像】
胸围范围：I～O罩杯（全教会胸围跨度最广的修女团）。人数：约两万两千人。
体型特征：涵盖圣芙蕾雅城最真实的修女群体面貌，从I罩杯的普通修女到O罩杯的修女长都有。与上城区修女的纤细奢华和下城区修女的肌肉狂野不同，中城区修女体型最为多样化、最贴近普通女性。
性格共性：贴近市民生活的邻里型快乐笨蛋。满脑子只有做爱，但待人亲切友善、不摆架子。在一群快乐笨蛋中，至少修女长艾莎"愿意去管事"——虽然管得一团糟，但这份态度在中城区修女眼中已经极其干练。

【理论职责】
为中城区约三百万市民提供宗教服务、日常生活照料与性爱慰藉，维护圣芙蕾雅城核心居住区的日常运转与邻里和谐。

【实际做的事】
帮街坊买菜、修水管、看摊子、调解邻里纠纷，以及陪男性市民做爱。她们有为男性购买物品的权利和义务，但大多时候被男性出于照顾修女钱包的因素拒绝了。由于中城区物价更高、人口更多、工作量更大，修女们的工资是上城区的两倍，但她们经常几个月不领工资，偶尔去领了一回也会很快因为结伴去上城区游玩而花得七七八八。

【办公方式】
办公环境：以中城区二十四座主要教堂和五六百座次要教堂为据点，各教堂均设有乳汁池。修女长办公室位于中城区核心教堂，陈设朴素，墙上贴着修女们随手画的工作备忘录（通常画到一半就去干别的了）。
文书与乳夹：与其他部门不同，中城区修女团无论怎样都无法避免处理纸质文件——市民的身份登记、婚姻登记、房产契约等文书往来频繁——因此在处理文件时必须佩戴乳夹，以防乳汁喷溅毁坏文书。
文件与记录：中城区修女团经手的文件分为两类，命运截然不同。市民文书（身份登记、婚姻登记、房产契约等）是教会与市民之间的正式往来文件，必须严肃对待——处理时必须戴乳夹，完成后统一归档至各主要教堂的文书柜。内部文件则完全不产生——修女们不写报告、不做会议记录、不留备忘录（墙上随手画的不算），甚至不知道"档案"是什么意思。偶尔有主管修女试图建立内部档案制度，但建立当天就忘了这件事。
信息传递与汇报：内部分工全靠口耳相传和路上偶遇时互相喊话。交接方式是"那家水管你修了没""啊？我以为你修了"，然后两人一起去修——结果一起把水管修炸。对市民的通知则较为正式——各教堂门口设有公告栏，修女们会把需要告知街区的事项（比如哪天停水、哪天有大型弥撒）贴上去，前提是有人记得贴。下属向艾莎汇报工作时，她通常会中途被别的事吸引走，然后双方都忘了刚才在说什么。

【管理风格：忘了就算，但文书不行】
中城区修女团的管理制度是——除了市民文书必须归档，其余一切皆可忘。具体表现为五个标志性制度：
一、教堂自治。二十四座主要教堂各自为政，主管修女对本区事务有完全自主权——自主到她们自己都不知道自己有什么权。次要教堂同理，教堂之间几乎没有协调机制。一座教堂的水管修炸了，隔壁教堂三天后才听说，然后说"我们也去看看水管"然后忘了去。
二、文书例外原则。全团唯一严格执行的制度是市民文书处理流程：接收→戴乳夹→登记→归档入柜。因为修女们对弄坏市民的东西怀有极大的愧疚感，因此竭尽全力保护文书不被乳汁毁坏。即便如此仍有一定损毁概率，好在市民和其他部门多少都留有备份，至今从未真正出过事。
三、工资追讨。偶尔有人想起来工资还没领过，修女长便会带队向上级追讨，追回后按教堂分发。但分发过程极其艰难——修女们碍于脸面与打脸充胖子的心态，普遍不愿意领工资。主管修女们不得不像抓壮丁一样把底下修女抓来塞钱。至于修女长本人的工资她自己从来不领。
四、公告栏通知。各教堂门口设有公告栏，是修女团对市民的唯一正式信息渠道。贴什么、谁负责贴、多久更新，全无规定。大多数公告栏上贴的还是三个月前的停水通知，偶尔有修女路过良心发现撕掉，第二天又有别的修女把同一张纸贴回去——因为她不记得三个月前已经停过水了。
五、问题自愈。任何内部矛盾、工作失误、未完成任务，三日无人提起则自动视为已解决。极少数无法被遗忘的事（比如市民拿着房产契约找上门）才会被认真对待——因为市民不会忘。

【部门特有文化】
"胸大就是真理"信条：中城区修女普遍认为胸部大小与说话分量成正比。艾莎之所以被推上修女长，纯粹因为O罩杯在中城区属于降维打击。修女之间的争论最终常以"你胸有我大吗"收场。
乳夹即工牌：乳夹是中城区修女最醒目的身份标识。夹上乳夹意味着"正在处理市民文书，勿扰"；摘掉乳夹则意味着"现在可以随便喷奶了"。市民也学会了看乳夹办事——戴乳夹的修女可以正经咨询，没戴乳夹的修女随时可能把你要的文件喷湿。
打脸充胖子：中城区修女工资是上城区的两倍，但她们反而更不愿意领——因为拿了高薪就不好意思在市民面前装穷蹭饭，可不领又确实没钱去上城区玩。最终形成了一种矛盾循环：不领工资→囊中羞涩→偶尔领一回→去上城区挥霍一空→继续不领。
邻里一家亲：中城区修女与市民的关系是全教会最融洽的。修女帮市民买菜，市民帮修女修被修女修炸的水管，互相照顾互相拖累。修女们经常被市民邀请到家里吃饭，吃着吃着就吃到床上——双方都不觉得这有什么不对。

【跨部门关系】
上城区修女团：中城区修女领完工资后的主要消费目的地。上城区的商店是中城区修女们为数不多能把工资花出去的地方，两区修女在购物和性爱上多有交集。
下城区修女团：性格反差最大的姐妹部门。中城区修女觉得下城区修女太野，下城区修女觉得中城区修女太软。但双方在"都是快乐笨蛋"上高度一致，偶尔会一起参加下城区角斗场的暖场表演——中城区修女通常是观众席上捂着眼睛但从指缝里偷看的那群。
总务部：中城区是总务部修女们"灵感驱动"式工作最频繁的试验场。总务部偶尔会突然跑到中城区执行某个奇思妙想（比如把所有垃圾桶漆成粉色），中城区修女对此习以为常，并在三天后因为"忘了就算"而彻底忘记。
性爱局：性爱局位于下城区教会大学，中城区修女偶尔去"交流学习"——名义上是学习先进性爱技术，实际上是去看下城区的男人是不是传闻中那么猛。
财务部：中城区修女工资是上城区的两倍但领取极为随意。财务部早已放弃催促，双方在"什么时候领工资"上达成了"想起来再说"的共识。
