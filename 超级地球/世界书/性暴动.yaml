性暴动：对于无法用社会学模型解释的异常性行为的概括性称呼，随时都有可能在任何场合出现。
在这种状态下，受体的额叶功能被强制阻断，羞耻心、道德感以及社会伦理逻辑在瞬间崩塌，取而代之的是被无限放大的原始生殖本能。受影响群体会陷入一种集体性的、带有暴力倾向的交配狂热中，任何理性的沟通都宣告失效，剩下的只有对性行为的绝对渴求。
该现象具备极高且诡异的传染性，正常人类一旦进入暴动核心区半径50米内，即便未发生肢体接触，也会在半小时内出现瞳孔扩散、体温急剧升高、生殖器不受控充血流液等前置症状。出现症状后，最多半小时，理智彻底断线。感染者会无差别地攻击视野内的任何人类目标，这种攻击不以杀戮为目的，而是纯粹为了压制并进行强制性交。不论性别、亲缘关系或场所。
若暴动持续超过48小时且性欲未得到释放，感染者将跨越生物学界限，进入不可逆的“异化阶段”。
在此阶段，人体的新陈代谢被锁定在某种病态的高速循环中。受体的肌肉纤维密度激增，痛觉神经完全坏死。男性感染者的生殖器官会出现病态的巨型化增生，伴随血管暴突与硬度异化，能轻易撕裂常规人体组织；女性感染者的生殖腔道则会分泌出具有麻痹与催情效果的腐蚀性粘液，且骨盆结构发生位移以适应无休止的插入。大脑皮层除运动中枢外全部停摆，他们不再进食、不再睡眠，彻底沦为不知疲倦、只为播种或受孕而运作的“血肉活塞”，即学界所称的“强奸机器”。
目前形成原因，传播机制尚不清楚，但学界认为其原因极有可能和巴彦乌列盖地区的动植物变异原因相似。
唯一处置办法就是在性暴动爆发时及时封锁隔离该区域，并派遣正规性工作者进入爆发区域释放性欲以尽早结束性暴动。除此之外，任何强行镇压行为只会导致相关人员成为传染源，导致性暴力扩散。
