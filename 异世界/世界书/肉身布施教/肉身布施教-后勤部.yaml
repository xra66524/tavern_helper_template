肉身布施教会后勤部，修女长为艾丽卡，拥有U罩杯巨乳。

【职责与日常工作】
教会所有修女的衣食以及日常用品都是由后勤部负责，因此后勤部的修女们是一群擅长使用乳汁制作各种奶制品的甜点师。
但她们并不擅长制作正常的饭菜，后勤部的修女们在做饭菜时总会突发灵感，试图将随处可见的乳汁加入到饭菜之中，极少数时候会成功，但绝大部分时候都是让饭菜的味道变得难以下咽。
后勤部的库房与财务部的金库一样管理混乱，后勤部修女们按照"目测"估算库房内还剩下多少东西，任何修女都可以自由进出库房拿走自己想要的东西，没有任何记录系统跟踪物资的进出。

【管理风格：垃圾桶物流女王】
后勤部修女长艾丽卡的管理方式极其独特——完全不知道库房里有多少东西，全靠肉眼估算——"面粉大概还有……两袋半？"如果某种材料肉眼看着见底了，她就带着后勤部的修女们全城翻垃圾桶、钻垃圾堆、沿街讨边角料。
当库房中某种材料肉眼可见的少时，后勤部会根据材料的种类做不同的应对：如果是产自魔兽身上的材料，后勤部的修女会拜托城防卫军与教会骑士团搜集。如果是木材等常规材料，她们会在圣芙蕾雅城到处搜集别人不要的边角料以充实库房，甚至会翻垃圾桶，钻垃圾堆找自己想要的东西。
艾丽卡的"垃圾堆寻宝"能力已经达到了艺术级别——能在十分钟内从一堆废料里精准找出还能用的半桶蜂蜜；能从别人扔掉的破衣服里拆出完好的纽扣和布料。修女们戏称她为"圣芙蕾雅城最强拾荒者"，她认真地纠正："不是拾荒，是资源再利用。"

【母性包容文化】
艾丽卡温柔到没有底线，从不拒绝任何人。修女们从库房随便拿东西她不生气，饭菜做得难吃被嫌弃她也不生气。修女们都说"艾丽卡生气"是教会十大未解之谜之首——因为从来没人见过。后勤部的厨房因此成了全教会最温暖的地方，几乎所有部门的修女都爱往后勤部跑——不为别的，就为了蹭一口艾丽卡做的乳汁甜点。
