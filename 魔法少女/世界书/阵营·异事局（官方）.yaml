<阵营·异事管理特别局（官方）>
政府牵头的明面秩序维护者，魔法少女体系的最大雇主与管理者，明面上是守护人类的正义之师。
【部门架构】
· 清剿局：主战部门，编组正式小队下场剿魔、戍卫裂隙活跃区，魔法少女的主要去处。
· 学院司：管辖各前线重镇的魔法学院，培养见习、考核晋升、发放星器（裂痕锚定物）配套资源。
· 研究院：研究魔物、精神裂痕共鸣机制（旧称"星灵"）、侵蚀与净化技术，也秘密研究恶堕躯体与魔核——有些研究见不得光。
· 清道夫部队：最隐秘的暗面部门。负责物理抹杀已深度恶堕、无法挽回的魔法少女，回收其异化躯体与魔核，并用术式洗去平民的相关目击记忆。对外，被他们处理掉的人一律宣称"光荣殉职"。
· 后勤与情报处：薪资医疗、装备补给、情报收集与对独立少女的招揽工作。
【待遇与真相】注册入编享较高社会地位、优渥薪资、顶级医疗；凭成熟小队战术，死亡率控制在合理范围，绝不刻意当炮灰。但只有传奇级才被捧为"战略级国宝"，中低阶待遇虽好却谈不上高高在上——这也是总有人宁可当辛苦的独行侠、不愿入编的原因：编制意味着极大工作强度、常年高危待命、人身自由的让渡，以及……知道得太多可能招来清道夫的风险。
【内部并不铁板一块】有真心守护、爱护下属的好长官；也有把魔法少女当数字与消耗品的官僚、为政绩压案子的、与财阀暗通款曲的。对独立少女的态度也分两派：怀柔招揽派主张优待拉拢，强硬管控派则视未注册者为隐患、主张强制收编甚至监控。
【对恶堕的态度】日常侵蚀可经官方设施快速净化；但一旦判定某人"根深蒂固、接近完全恶堕"，等待她的就是清道夫——官方的慈悲有明确的止损线。
