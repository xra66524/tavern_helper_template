<设定·魔物分类·威胁等级>
（魔物是精神世界之灾，只按形态与威胁分类。两条要点：①魔物没有魔法少女那套「系别」——系别是魔法少女精神裂痕外化的能力倾向，魔物只有天生的灾异本能，绝不给魔物安「元素系/特殊系」之类标签。②下面的 F~S 是【人类异事局给魔物/威胁标定的危险评级】、是人类的评估工具，不是魔物自带的"等级"或"位格"——评级用来调度多少战力去应对，魔物自己并不"持有"一个字母。魔人一方的成长与强弱另有其说法，见『成长体系·魔人/魔物』，勿把 F~S 当作魔人角色的身份标签去贴。）
形态：原生种（从裂隙直出、智力低下、凭本能猎杀）／变异种（长期潜伏、吸收能量或污染后变异、懂伪装伏击）／高阶魔物（具化形或寄生能力、智力比肩人类，分化形种、寄生种、双形种）。
天生异能：依形态与强弱而定，如利爪尖牙、硬甲、喷吐腐蚀毒雾/火焰/冰霜、狂暴再生、瘴气缠身；高阶者更有精神污染、空间撕裂、寄生操控等——这些是它与生俱来的灾异，不是魔法少女的招式或系别。
威胁评级（异事局对魔物的危险标定·与守护者战力对照仅供调度参考）：F最低（普通人持械可应对）／E低（2~3普通人或1见习）／D中（需1正式）／C较高·高阶门槛（1正式小队或1精英）／B高·常具化形寄生（多队或精英围剿、或1战姬）／A极高·必带化形寄生（官方精锐联手或1战姬全力）／S灾厄·自带灾厄绝域（倾尽全省战力或传奇出面）。这套字母是"人类该派多少人去打"的标尺，不是怪物的军衔。
地域分布：裂隙活跃区/前线城市魔物频繁（原生、变异成群，官方戍卫与刷怪区，强度可观但秩序可控）；腹地魔物稀少，零星出现的多是高阶魔人的「附属单位/眼线」（被寄生的居民、潜伏的魔化少女等），核心是潜伏刺探、物色策反，谍战温床。
魔核：魔物被击破或净化后多凝出的能量结晶，是少女炼化升级的资源、也是这世界的硬通货（详见力量来源）。各国政府大量收购魔核，精炼后注入可食用明胶制成高能营养膏：普通级一小根即可满足常人一天活动所需；高等级营养膏可为第二、第三限度格斗者提供高强度活动能量。格斗者群体中大量以此节省进食与排泄时间。
【重要·"妖魔"一词的定义】在格斗者与密教传承者的古老传统中，"妖魔"一词从不是对所有魔物的泛称——它严格指向S级魔物。F~A级的魔物，格斗者另有说辞（如"小怪""异兽""灾兽"等），绝不混称为妖魔。之所以如此严格，是因为人类先人们深知一个事实：精神世界那边，漫山遍野全是这个级别的东西。用"妖魔"去称呼一只F级腐蚀犬，就如同用"哥斯拉"去称呼一条蜥蜴——词义的稀释会让人忘记真正的敌人是什么体量。

珍材（魔核的上位产物）：仅S级魔物（格斗者称"妖魔"）才有概率产出。本质是天外妖魔体内凝聚的精神精粹，品质远高于普通魔核——且并非随便哪头S级妖魔都能产出高质量珍材，需看妖魔自身的位格与积淀。珍材与魔核的区别在于：魔核是"能量结晶"（可炼化升级），珍材则是"天外精粹"（用于特殊用途，如格斗者突破第五限度的引子、制作神兵、强化星器等）。获取时的纯粹性要求因人而异：只有顶尖的洞玄观格斗家才在乎"必须亲手独立击杀、不可掺杂他人场域"——他们的精神已经纯化到无法容忍杂质混入的程度。对于魔法少女和大部分普通洞玄观来说，他人击杀的珍材一样可以用，精神层面没有那层顾虑。（详见格斗者体系洞玄观）</设定·魔物分类·威胁等级>
