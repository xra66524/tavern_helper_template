<设定·格斗者·第四限度·载玄机>
（超越人类范畴的境界，对应魔法少女战姬~传奇(Lv.41~60)。适用于角色处于第四限度或涉及灵相战斗、三相抉择的剧情场景。洞玄观详情见"格斗者·洞玄观"分条目。）
【第四限度·载玄机】
· 称谓：古时民间冠以"武圣""仙佛"等称，是旧时代格斗流派追逐的最高目标。到达此限者已彻底超越人类范畴，可说是另一种生物。
· 核心要义：「守真形，聚灵相」。
真形——自我根本之形。守住根本之我是前提：既需勇猛精进，又需有所约束。守不住真形，外相便会取代真我。
灵相——以灵性之火聚化而出的搏战外相。先有"我"，再有"外"——必须先修住根本之我，才能去聚化外显之相。
· 精神鼓升：第一至第三限度是人身的极限。第四限度的关键在于精神的鼓升——用精神接触对面世界的力量，扭转现实，化不可能为可能，形成纯粹精神力量对现实的干涉。格斗家若不"撒意"，限度之下者看不见也听不到他们。精神不可一口气冲上去，需逐步洗去后天之秽（人身在红尘中沾染的杂质），重返先天之精纯。若天门开启时能采撷到足够精粹洗练精神，可大幅缩短修行时间。
· 屏障·生物场域：最外圈的无形屏障，形同实质，防御力极强。由强盛生命力自然形成，只要格斗家活着就存在，平时无需刻意操纵。一般热兵器极难撕开，限度之下者站着打也破不了。生命力越强，场域越坚固。
· 真力（精劲/灵性之火）：场域之内蕴藏格斗家意志与独有劲力的力量。碰撞到对方身上产生巨大破坏，同时抑制对方异化组织的恢复。格斗家之间的交战本质——破开对手场域防御→将自身真力藏入对方体内→破坏其身体组织。
· 灵性冲击：攻击速度快、范围大，需丰沛灵性之火与事前蓄势，快节奏战斗中极少出现。释放后不受控制，方向难改。
· 妖兆·异化风险：修行越深，来自对面世界的精神侵染越多。侵染严重时格斗家被迫维持灵相→战斗力短暂提升→但这是不可逆的慢性过程→最终完全丧失理智，蜕变为妖鬼。这正是要"守真形"的原因——灵相能聚的前提是能散，散不了则污秽源源不断涌入，真形不保。
· 破境（突破至第四限度）：
纯质——即第三限度灵觉阶段所说的"精神世界的精粹"。调和内外、纯化精神与肉身、加强潜力的珍稀物质。过去两个世界吸引时不乏寻觅，如今被大势力严格封锁。实力越强需要越多，身体不够强难以一次消化。沉积体内时易被对面世界存在盯上。
誓言——所有破境者必经的关口："欲取先需舍"。立下誓言或舍弃某样珍视之物（情感、寄托、爱好）→获得力量回馈→精神更强韧。舍弃越珍贵，换回的力量越强。也可立誓强制日日践行内心深处最反感之事，同样达成目的。
两种方式——内求（饮服药物自我调和，主流，成功率较高较安稳，可调动六七成力量）；外求（外部环境刺激，寻求神我一致精神反哺，更危险但可调动八成以上力量，不成不归）。
破境之法——神之貌在前（精神冲破碍隔，借侵染炼就神顽）；身之貌在后（洗练肉身，筑成真形）。
渡三关——第一关"先死后生"：点灼精合助神通；第二关"内守外娇"：克服"心猿"——精神完成后不愿再被肉身拖累、想逐去旧我的本能冲动，明确此意则神自归来；第三关"性命涵源"：阴阳变转、光从心生、内外照彻、神我致一，精神反哺身躯。
「摄同阴阳合神气，天门一入裁玄机」——故名"载玄机"。踏入此限后持续从对面世界吸收能量改造身体，改造越久根底越厚。蜕变完成后能完全收敛生物场域与精神溢散。
· 三相·三大修行方向：
人之相（主流）——"我相为主，形相不易，神存根本"，近似性命双修。精神和躯体平衡，无短板，要么平庸要么极其强大。可用"人核"（外相的一部分）代替身躯承受侵袭。修行到深处最为灵活，不似其他二相受固定方向拘束。
神之相——"只认心之我，非身之我"，躯壳为载具。需过人精神，可神游对面世界构建"长存之痕"。躯壳损坏未必殒命，可寄居附着于他人。现代生物技术进步，可营造合适躯壳供给此道修行者。
异之相（旧称妖相）——"观想诸异，化悟妙理"，需强健肉身。凭观想图持坐修行或从内心阐发化异之相。观想各类神魔，拥有近乎神通异力的能力。走偏极难纠正，可能沦为失去自我的异类。

【玄机观·第四限度第一层次】
· 此为初入第四限度之境地。格斗家破境后首先巩固自身，让气息贯通沉淀。处于高水平力量状态时，能量与营养供应不足会导致气息起伏不稳。稳固之法有古传药物、密教仪式、特殊怪谈试炼，以及现代生物技术（需长期注射药物配合特殊环境）。
· 此阶段的核心在于完成蜕变、掌控场域与真力，为下一步凝练外相做准备。

【长生观·第四限度第二层次】
· 接天桥：气息降伏后凝练"外相"。外相不仅是战斗之用，最主要在于适应对面世界环境——"反哺本真，辅还己身"。修行越深入，外相越凝实强横，可与体型巨硕的敌人正面相抗。
· 外相·灵相详解：自我之存观，神出之显像。规模由场域范围决定，由此化生而出，等同于自我的一部分——但灵相只是工具，是"我"的化身，绝非真正的自我。三相之别的本质是对"本我"认定不同：异之相靠观想图逐渐趋近，内外相应成画上仙神；神之相明确外我之分；人之相看自我认知，最不受拘束。外相在存观中如同对面世界虚化的一面，外显后由虚转实。凝聚外相需在心中一处独特的异化组织器官中孕育出完全的自我，再由生物场域之外照出来。外相不是纯粹肉身，而是身神交互之物，最适合对面环境。一开始外相与自身越相似，发挥的战力越强。
· 六阳金：来自对面世界的金黄色琥珀状晶体，坚不可摧。精神力量可侵蚀它。格斗家通常用一到两枚即可完成长生观修行——用精神力量化炼并融入眉心，依此法门构筑灵相。
· 界融武器：旧称"神兵"，专为灵相使用的武器，介乎真虚之间，可融入场域。难换主人，因已被原主的精神侵染过。</设定·格斗者·第四限度>
