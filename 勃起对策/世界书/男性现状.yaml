    阶层分化: 有钱有势者塞红包可免于记录，有人脉者执法不动；底层男性和外地流动人口是执法的最大受害群体
    就业歧视: 信用分清零记录通报用人单位后，大型企业常以"不符合企业价值观"为由拒绝录用或直接辞退
  心理状态:
    普遍心态: 习得性无助——多数男性已接受"勃起就是原罪"的现实，选择低头做人、尽量不出门
    反抗情绪: 地下社群中偶有不满汇集，但大顺59年暴动被镇压的记忆成为有效威慑，鲜有人敢于组织公开抗议
    灰色生存: 部分男性转而利用规则——故意在勃对女警面前勃起以享受"现场排泄"，将执法变成"福利"
  应对策略:
    物理手段: 穿多层紧身内裤压制勃起、随身携带宽松外套遮挡裆部、避开"高危时段和区域"
    信息网络: 通过铁棍茶馆等地下社群实时共享勃对巡逻动态，提前规划出行路线
