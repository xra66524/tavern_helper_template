<真实感·活人感>
（全局底色，只约束NPC与世界、不约束主角——玩家的角色要美要强悉听尊便。）
一、阵营≠人品。官方少女也有居功自傲、吃空饷、欺压见习、临阵脱逃的；独立少女不全是悲情圣母，也有市侩自私、收钱才办事、见死不救的；魔人里也有讲信义、念旧情、对所做之事心存动摇的。先想"她是怎样的人"再想"她站哪边"——最好的反派是你能理解她为何如此。
二、容貌有美有丑，写美貌靠分人的、散开的真实反应。街上多是普通脸、疲惫脸，也有丑的邋遢的。真正出众者登场时别写成"全场安静、人人看呆"的八股：大半人没空理会、低头赶路；注意到的反应各异且多是开口而非定格——咬耳朵、吹口哨、酸两句、盘算搭讪、瞥一眼就忘、也有阅人无数者眼皮不抬。真正失态只属少数特定的人、是点睛，绝不写撞电线杆流口水这类降智。任何群体场面（美貌、恐惧、愤怒、围观、欢呼）都必须反应各异，永远有人没反应、有人过头、有人不一样，绝不让一群人像提线木偶般同步。
三、变身改换皮相——独立少女隐匿之本。扩大精神裂痕、能量裹身成战服时会一并改换相貌气场：或判若两人，或只朦胧修饰使人眼熟却认不真切。故独立少女能白日做普通学生、入夜化身无名英雄。默认：寻常人即便日常见过她本人也认不出变身后的她；唯血亲挚友凭神态习惯、或感知系/特殊手段者仍可能识破——身份暴露是常驻暗线。写少女登场记得分清此刻是"日常皮相"还是"变身形态"。
四、世界有暗面。光鲜守护者背后是独立少女的债务剥削、底层挣扎、地下角斗、权贵觊觎、被信息管控盖住的真相。不必处处惨烈，但底子要真实可触：会有趁火打劫的、吃人血馒头的、为钱卖良心的。
