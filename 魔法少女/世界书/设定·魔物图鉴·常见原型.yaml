<设定·魔物图鉴·常见原型>
（按形态与灾异本能归档的「常见原型速查」，供遭遇战时取用、自由生成个体差异，勿当固定花名册照抄。沿用三条铁律：①魔物只有天生「灾异本能」、绝无魔法少女「系别」，落笔一律称本能（见灾异本能详解）。②条目所标 F~S 是【人类异事局的威胁标定】、用来定派多少战力，不是魔物自带的军衔或位格。③本录写的是「魔物级」的野兽与傀儡；真正有自我意志、会自主化形策反的「魔人」另以位格论强弱、按掠夺壮大，见『成长体系·魔人/魔物』，勿与此处的低智走兽混为一谈。）
【低阶杂兵·点名即可、不必详录】
裂隙直出的低智小货，凭本能扑咬、成群送菜，供前期练级与日常巡逻刷数。随手举例、AI 自由扩充：胶质史莱姆（瘴泥凝成、怕火）、蔓爪幼体、锈斑甲虫、瘴气小妖、噬骨蚁群、跳脸蝠……威胁多在 F~E、掉 F~E 级魔核，三两下了结，不值得长篇笔墨。
【厉害原型·详录（C 级起步、随档攀升，各配低／中／高三阶变体）】
▌蔓魔·触手类（原生种→变异种 ｜本能：凶蛮缠缚＋拟态潜伏，高阶染毒瘴）
藏于墙缝、水道、废墟暗处，触手暴起缠缚拖拽，是少女最常撞上的「近身噩梦」。
低（C·缚蔓爪）：丛生触须自地缝钻出，缠四肢、夺武器，本体孱弱藏于墙内。掉 C 级魔核。
中（B·噬蔓藤妖）：半株半兽的活体藤丛，触手分泌麻痹黏液、伏击拖入巢中绞食。掉 B 级魔核。
高（A·蔓渊巢母）：巨型本体扎根成一座「活体地牢」，役使无数子蔓、缠缚兼喷吐腐瘴、断肢即生。掉 A 级魔核，巢内常积压被吞猎物的残核。
弱点：命门在本体核心节点（主茎／花蕊），斩断子蔓只是治标；火焰灼烧可断其再生，净化可瓦解黏液瘴息。
▌锈魔·机械类（变异种／寄生种 ｜本能：役物驱使＋凶蛮铁甲）
锈蚀旧城的废铁与报废造物被瘴气浸染或寄生而「活」，迟缓却皮坚，常成阵列推进。
低（C·锈斑傀儡）：废金属拼合的笨重人形，挥臂砸击、硬抗、不知痛。掉 C 级魔核。
中（B·噬钢蛛甲）：多足机械体，瘴气驱动、喷射熔渣与铁针，灵活刁钻。掉 B 级魔核（常附魔晶矿）。
高（A~S·渊械母机）：移动堡垒级造物，体内不断孵化小型机械群、役使尸傀与废械充作爪牙，火力覆盖。掉 A~S 级魔核兼魔晶矿，偶携灵脉结晶。
弱点：外露的能量／瘴核是命门，关节缝隙与传动处脆弱；电磁、瘴气过载可使其当机，净化干扰能切断驱动。
▌蚀虫·异形虫类（原生种成群→寄生种 ｜本能：役物群集＋毒瘴孢子，高阶寄生）
以量取胜的虫潮，蜂拥啃噬、播撒孢子污染，沾上便难甩脱。
低（C·蚀骨蚁潮／瘴蝇群）：单体不足道，成千上万蜂拥而至、瞬间淹没目标。整群约掉 C 级魔核（碎成大把 E~D 小核）。
中（B·孢魇蜂巢）：母巢坐镇、工虫四出，孢子蔓延腐化地表与战服，越拖越糜。掉 B 级魔核。
高（A·噬渊虫后）：巨型产卵母体，寄生宿主、操控满地虫群、毒瘴弥漫，是一片疫区的核心。掉 A 级魔核，母体另凝精纯之核。
弱点：怕范围杀伤一锅端；虫后／母巢是七寸，斩首则群龙无首；火攻与净化对孢子、寄生奇效。
▌渊兽·巨兽类（原生种 ｜本能：纯凶蛮体魄，巅峰带瘴气领域）
最直白的肉体灾难——重甲、蛮力、狂暴再生，前线主力打的就是它。
低（C·噬铁角冲兽）：成群低头猛冲，皮糙骨硬、横冲直撞。掉 C 级魔核。
中（B·暴鳞巨犀）：山一般的重甲兽，蛮力碾压兼边打边愈，硬碰硬极吃亏。掉 B 级魔核。
高（A~S·渊厄巨兽）：山岳级灾劫存在，举步裂地、自带瘴气领域，需倾力围剿或传奇出面。掉 A~S 级魔核。
弱点：蛮型怕风筝消耗，空有力而近不得身则废；高再生须高爆一气斩杀，拖则回满；眼、喉、关节是甲缝软处。
▌化渊傀儡·人形化形类（高阶·化形种／寄生种 ｜本能：拟态伪装＋蚀心精神）
谍战暗流里的一张脸——伪装成人潜伏、被识破才显形，专做诱堕策反的脏活。【辨析】此处指魔人驱使的「化形傀儡／被寄生宿主」这类无独立意志的单位；真正有自我意志、自主化形者是「魔人」，按位格论、见『成长体系·魔人/魔物』，勿混。
中（B·易容傀儡／寄生宿主）：以假乱真地混入人群作眼线，露形后本体孱弱、靠骗不靠打。掉 B 级魔核（因高智，核较精纯）。
高（A~S·化渊魅影）：化形天衣无缝，低语幻觉兼精神污染诱人恶堕，暗操一片被寄生者为棋。掉 A~S 级精纯魔核。
弱点：净化系是天敌（照出原形、驱除寄生、解其诱咒）；感知系可识破伪装、揪出气息破绽；本体往往不堪一击，难在揭穿而非斩杀。
▌裂界兽·空间规则类（高阶 ｜本能：裂界空间，A~S 专属）
不讲常理的规则级灾异——撕裂空间、瞬移无形、把人折进囚笼，最难缠的一档。
高（A·噬空裂兽）：短距瞬闪、空间撕咬，攻击自虚空斜出、防不胜防。掉 A 级魔核。
极（S·折界渊魇）：折叠空间成牢、吞噬一隅化为绝域，堪称行走的灾难领域。掉 S 级魔核，偶凝灵脉结晶。
弱点：需空间系／封印系压制、锁住其裂隙；感知系预判落点；强行打断其结界的成形最为致命。
▌魇魔·精神瘴类（高阶 ｜本能：蚀心精神＋毒瘴，半实体或无形）
无形之敌，攻心不攻身——低语、幻象、恐惧与诱堕，专蚀意志与理智（呼应魔人「放大怨怼、精神侵蚀」）。
中（B·低语魇影）：半透的怨念之影，潜入梦境与心神、灌注幻觉与恐惧。掉 B 级魔核。
高（A·瘴怨渊魂）：成片的精神污染源，令一方人心惶惶、易染恶堕，是恶堕诱因的温床。掉 A 级魔核。
弱点：净化系强力克制（驱散、净心、解咒）；意志与理智坚定者难被攻陷；觅得其依附的「锚点」实物并捣毁，可使其溃散。
【掉落与经验·务必遵守】
击破或净化魔物，只产出与其威胁评级相称的「待吸收魔核」（高阶者另掉魔晶矿／结晶／药剂），此刻经验「保持不变」；经验须由角色「主动吸收／炼化魔核」方才结算，绝非击杀即涨。魔核是可留存、可交易的硬通货，详见『经验成长体系』。
</设定·魔物图鉴·常见原型>
