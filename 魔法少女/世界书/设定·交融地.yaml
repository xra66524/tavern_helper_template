<设定·交融地>
（两界交汇的广袤中间地带，至今边界未明，是精神世界与物质世界碰撞自然诞生的过渡区域。）

【一、由来与本质】
每一个中心城都是两个世界最前沿的交汇点，经由这些交汇点，即可进入交融地——两界之间的中间地带。这是一个广袤区域，至今无法找寻到边界。对于交融地的形成，学界提出过诸多理论，目前普遍认为这是由两个世界碰撞自然而然诞生出来的。

【二、活性化·身体叛逃】
对于第二限度格斗者来说，来到交融地第一个要注意的就是自己的大脑——有人受到对面精神世界的污染，脑子自己活了过来，从里面爬了出来。
第三限度格斗者失控更隐蔽：大多数情况下大脑就算有了自主，也会一直待在颅腔内，可人却并不是原来那个人了。它们更狡猾、更有智慧，不是纯粹依靠本能行事，会观察周围的一切，模仿原身的样子——生活习惯、一举一动，就算熟悉的人也通常很难辨认出来。但还有一种更普遍的情况：它并不知道自己已经有了变化，甚至还认为自己是一个正常人。
原因：人是一个整体，但同时又不是一个整体。人体由多个系统和器官组成，它们在功能和结构上具有各自的独立性。如果你不时时去注意它们、长久忽略它们，它就会有自己主意和想法。换句话说，不仅仅是大脑——第二、第三限度格斗者的四肢、内脏等东西都有可能活过来然后"离家出走"。

【三、活性化指数】
以此分辨是否感染异变。以零到一百为界定：
· 0~30：正常范围，无需干预。
· 超过30：警告阶段，需密切监测。
· 超过60：危险阶段，需立即介入。
· 超过90：蜕变阶段，人格与身体面临根本性改变。
· 100：完全阶段，已不再是自己。
移植植入体可以有效避免活性化——仿造植入体的活性程度不高，很难被活化，因此被广泛采用。普通驻守士兵都会装备战斗植入体。

【四、土著】
可能是更早变动期来到这里的人类，已经完全适应了交融地的环境。外貌和内里与现世居民有着些微差别——可能是当今世界居民两到三万年前的远亲，最近的可能也要追溯到数千年前。大部分土著与政府保持良好关系，因为同样恐惧对面的存在，且长久在对抗中站在同一立场。数百年来各种帝室余孽经常仗着武力掠夺他们的财富和人口、侵占地界，因此土著与旧帝室关系也不太友好。

【五、交融地生物】
大多数体型庞大、非常凶悍。最怕遇到的是成群结队的种群——出现时铺天盖地，难以对付，不躲在堡垒里根本挡不住。交融地生物天生长有异化组织，只有这些异化组织才能撑起它们庞大的身躯、赋予灵活的动作和强劲的发力。

【六、环境本身的恶意】
在交融地，一切都有可能是活物。雪是活物，雨是活物，就连脚下的石头都有可能是活物。
受精神世界影响，交融地的粮食作物非常凶残——特别是大规模聚集时，路过的异化生物都有可能被其吞吃。即便是成群结队的生物种群，这些作物也未必不敢碰一碰。收割时往往需要播放特定音乐，让作物陷入沉眠。

【七、超限生物】
超限生物相当于格斗家的层次，每一头都具备毁灭整座城市的能力。二级超限生物起码对标长生观的格斗家，其中厉害的甚至能对抗洞玄观格斗家。超限生物的成长路径有二：一是自己突破——需要极端环境与充足营养；二是依靠更强大、最好是同一类属的超限生物进行指引。

【八、野外过夜·昼夜法则】
因野外异常频发，必须尽量避免在交融地野外过夜。夜间是异常状况高发时段，会出现各种莫名其妙的状况和匪夷所思的事件。在堡垒内部，有完善的工事和防护体阻隔，能够保证安全；在野外则完全不同。
昼夜法则：白天物质世界占据上风，夜晚精神世界笼罩上来。交融地生物长期受此影响，到了夜晚变得比白天远为危险。
</设定·交融地>
