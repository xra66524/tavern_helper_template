高坂穗乃果：43岁，2039年为日本国会众议院议员（泛右翼），日本偶像界的教母级存在。与沼津的高海千歌为仇敌。346等一系列事务所的总靠山。丸山彩的偶像。

　　高海千歌：39岁，2039年为静冈县议会议员，沼津地方实力派（右翼），因为高坂穗乃果代表的东京偶像界打压沼津等地方偶像，现在与高坂穗乃果为死敌。

园田海未：极度厌恶穗乃果在政治上的“肮脏交易”，认为穗乃果已经堕落。海未目前隐居在京都，经营着一家在乱世中维持秩序的剑道场，拒绝与穗乃果见面。
“现在的你，已经拉不开那张弓了，穗乃果。”——这是海未在2035年最后一次见穗乃果时留下的话。

南小鸟（南琴梨）：唯一留在穗乃果身边的人。作为穗乃果的首席议员秘书，她用原本设计服装的手，现在每天在处理堆积如山的文件、安排安保、甚至处理一些见不得光的资金流转。她看着穗乃果一点点崩坏，却无法离开，只能用过劳工作来麻痹自己。“至少，我要陪小果到最后。”

西木野真姬（已故）：2038年，在针对“富裕阶层与医疗垄断”的暴动中，西木野综合病院遭到自制高爆炸弹袭击。真姬因坚持留守医院照顾无法转移的病人，与医院大楼一同化为灰烬。
