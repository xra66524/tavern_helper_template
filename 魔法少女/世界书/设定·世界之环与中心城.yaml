<设定·世界之环与中心城>
（人类社会应对大轰撞的核心基础设施。本条详细说明中心城体系、世界之环屏障、第三限度格斗者的协议与部署。）

【中心城·两界的锚点与堡垒】
中心城是两个世界的引索和锚点——世界之环的节点，亦是对抗精神世界的前沿堡垒。
· 历史：中心城是1985年初代大型场域生物研发成功、世界之环构想提出后才出现的概念。在此之前（1980年以前，尤其是古代），各个国家和政权对裂隙的态度是建立据点看守并控制裂隙，而非系统性建城。
· 选址原则：通常选在大型主要城市，以拱卫核心都市。以中国为例——各省省会城市必须是中心城；计划单列市（如深圳、大连）同样是中心城；重要边境城市（如丹东）也被设为中心城。
· 配置：每一座中心城都配备了至少一个大型场域生物——该类生物的场域能量与洞玄观格斗家相当，是维持世界之环运转的能量核心。
· 职能：捕获世界交汇过来的第一个信息，接受或隔离从另一个世界到来的东西；收拢并稳定区域裂隙；作为格斗者、魔法少女、密教传承者的驻防与调度节点。

【世界之环·环幕】
世界之环位于交融地深处——交融地是物质与精神世界的交汇过渡带，世界之环则是更上层、靠近精神世界一侧的隔离屏障。它是推迟大轰撞的根本原因。
· 建造：自1985年起，人类社会利用场域生物技术，在各中心城的大型场域生物协同下，于中间带靠近精神世界那一侧搭建起一道场域屏障——称为「世界之环」，亦称「世界之幕」。
· 根本性作用：环幕持续抵消着两界相互吸引的牵引力，将原本预计2000年前后发生的大轰撞推迟至2028-2030年的窗口期。这是大轰撞至今未至的根本原因——不是某次仪式或战斗的功劳，而是这道屏障日复一日、年复一年的持续抵消。但世界之环只能"挡"不能"推回"：两界距离仍维持在变动期近距，环幕一旦被突破或崩溃，大轰撞将提前到来。
· 迟早的终局：世界之环只是推迟、并非消除大轰撞。两界的相互吸引是底层法则层面的趋势，环幕抵消的只是牵引力的一部分、无法逆转两界靠拢的总趋势。各国共识：如无意外，理想情况下大轰撞约在2028-2030年必然到来——这是世界之环能争取到的极限缓冲期。届时无论环幕是否仍在，两界都将完成碰撞。这一倒计时是当代所有势力最深的焦虑根源，也是人类争分夺秒发展战力、寻找根本解法的根本动力。
· 次要作用：阻挡对面世界的某些存在，令其力量无法立刻转为实质。
· 不完美性：这道屏障并不密实——世界的碰撞持续挤压着它，时不时会有对面的东西渗透进来。
· 双重呈现：当所有中心城连接起来后，其连线在物质世界上的呈现如同包裹住地球上所有人类主要聚集地的经纬环；在精神层面上的呈现则是一道精神天幕——两者合称「环幕」。环幕是各个中心城场域生物的精神场域相互联系形成的统一体。
· 对第三限度格斗者的影响：因为生物场域偏向精神层面、不受物理距离严格限制，某些独特的第三限度格斗者在特殊条件帮助下，精神有一定可能穿透这片屏障，接近或抵达对面。越过世界之环本身即是对环幕的破坏——有能力越界者，要么被消灭，要么被政府和大公司收编；肆意妄为者必然遭清除。
· 监察：世界之环上设有严密监察，一旦发现翻越或试图破坏环幕的违规行为，立即予以拘捕或清除。第三限度格斗者严禁私自窥探、接触环幕对面的存在，需定期接受审核与检查。
· 国家分治：世界之环虽为一个整体且彼此连通，但分由各个国家掌握，对外呈现为相对独立的区域。未得他国允许，很难从外围直接进入其他国家的防守节点。通行做法是通过国与国之间的外交交流，从世界内部入境，再经专有通道进入对应节点的环幕区域。世界之环即使被突破一点，不至于全部失效——外部防御分层有利；但内部若出问题，其他国家可能来不及援手。

【第三限度格斗者协议】
凡是经过国家系统培养出来的格斗者，一旦达到第三限度，会被约谈并揭示国家机密。告知前需签订保密协议。
· 家属例外：签订者本人的亲属可视具体情况有限度透露，但同样需签立保密协定，人数限定在两人之内。协议上施加了某种正式密教仪式的约束。
· 征召义务：签下协议、知道真相的格斗者，在国家有需要时须接受征召。
· 特供药物：第三限度格斗者所需的某些特殊修行药物，唯有参与并服从世界之环防务体系、积累一定功绩和贡献后，才会被允许提供。

【格斗家·交融地部署】
格斗家在交融地有两类主要去向：
· 驻军/驻守世界之环：加入当地驻军或申请驻守世界之环，提供武力支持。驻军本身有清理周围交融地生物的职责——若非大型生物，火炮炸药清理相对高效。政府方面还有专门负责搜集狩猎交融地生物的小队。驻守者的日常补给充足——每天都能补充新鲜食材。
· 世界之环驻守的待遇更优厚，但需签立长期驻守协议，很难轻易离开，且可能须根据上级要求随时增援地方。
· 自主狩猎：格斗家自行深入交融地狩猎。须事先与驻军和政府沟通确认、获取区域信息，然后划定一片地域作为狩猎场。
