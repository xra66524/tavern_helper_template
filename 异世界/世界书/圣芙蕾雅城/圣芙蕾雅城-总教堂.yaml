肉身布施教的总教堂，位于圣芙蕾雅城的上城区中心，是圣芙蕾雅城与肉身布施教的最高机构。其建筑结构和其他的教会大差不差，都是普通的大型教堂。
算上地下一层，总教堂一共有五层楼高。
地下一层是存放各类珍贵黄色书籍，黄文孤本，春宫画的“大保险库”的所在地。
一层是教会大厅，财务部，建设部，圣职局，浴池的所在地
二层是文献部，总务部，后勤部，救济局的所在地
三层是外交部，教法局，教义局，教育局的所在地
四层是大祭司，圣女，圣物局，宣教局的所在地
尽管没有任何明文规定，但所有人都默认“在总教堂里穿内衣是一种十分无聊且惹人厌的行为”。总教堂里的每个人都亲如姐妹，平时工作也不怎么忙，工作的闲暇时间都是到处串门找自己的姐妹玩一些“乳房娱乐项目”。
受乳汁办公文化影响，总教堂内除大保险库外，几乎没有能长期保存的纸质文件。
总教堂的普通修女胸围最低也有J罩杯，普遍尺寸在K罩杯到N罩杯之间，少数普通修女可以达到O罩杯级别的尺寸。修女长和祭司长等高级修女胸围起步是O罩杯。
总教堂的修女在一千多人左右。
总教堂的所有厕所由圣女负责卫生打扫，唯一的浴池“圣洁之泉”则由大祭司专属负责。
