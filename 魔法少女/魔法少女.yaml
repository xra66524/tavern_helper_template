      - 名称: MVU变量监控器
        id: 88c91295-14b3-4093-9ded-64f41073062a
        启用: true
        类型: 脚本
        导出时携带:
          数据: true
          按钮: true
        文件: 脚本\MVU变量监控器
        介绍: |-
          MVU(MagVarUpdate)变量实时监控/调试面板。把它当作开发期的「数据透视镜」。
          · 变量树：实时展示 stat_data 全树，[值,"说明"] 自动拆为「值＋ⓘ悬浮说明」，悬停查看更新条件。
          · 更新日志：每轮 AI 回复中解析到的 _.set / insert / delete 命令逐条显示（路径 旧值→新值 // 原因），一眼看出 AI 有没有正确记账。
          · 数据源：window.Mvu + TavernHelper.getVariables，监听 COMMAND_PARSED / VARIABLE_UPDATE_ENDED / VARIABLE_INITIALIZED 事件自动刷新。
          · 面板可拖动、折叠、搜索过滤、一键复制 stat_data JSON；关闭后点右下角 🔮 圆钮重开。
          · 依赖：需先启用 MVU 脚本(MagVarUpdate bundle.js)与含 [InitVar] 的世界书条目；未装 MVU 时降级为只读展示。
        按钮:
          启用: true
          按钮列表:
            - 名称: 🔮 变量监控
              可见: true

      - 名称: MVU人物控制板
        id: 9eb273bf-e3a6-48dd-9758-b495d4301d43
        启用: true
        类型: 脚本
        导出时携带:
