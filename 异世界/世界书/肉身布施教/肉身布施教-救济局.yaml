【部门定位】
正式名称：救济局。俗称：奶妈局。别称：烂摊子收容所。类型：九局之一。所在地点：中城区，占据孤儿院和救济院两大设施，两处相距不过一条街，修女们日常在两处之间穿梭。

【负责人】
姓名：蒂法尼。职位：祭司长。罩杯：O罩杯。
上位方式：救济局孤儿院长大的弃婴，亲生母亲为中城区修女。14岁毕业后没有去任何部门，直接回到孤儿院——"这里才是我的家"。16岁时因对孤儿院的了解无人能及，被推举为祭司长。（详细人设见 `人设/人设-蒂法尼.txt`）

【团队画像】
胸围范围：K～O罩杯（总教堂核心层标准）。人数：约一百八十余人。
体型特征：全教会最具"妈妈感"的部门。与总教堂其他部门修女相比，救济局修女的胸部更柔软下垂（长期哺乳的结果）。
性格共性：全教会最温柔耐心的部门。说话轻声细语，动作小心翼翼，所有人身上都散发着母性的安定感。但私底下普遍有程度不同的"过度操心"倾向——总是担心孩子有没有吃饱、会不会着凉、是不是又尿了。

【理论职责】
管理教会下属的医院、孤儿院和救济院，承担圣芙蕾雅城的弱势群体救助工作。

【实际做的事】
医院是完全管不了的——救济局修女只能去那里当个护士，还要忍住不嗦病人牛子。所以实际上负责的是整个圣芙蕾雅城的孤儿院和救济院。
孤儿院这边，由于肉身布施教的女性不能结婚且大量生子，修女生下的大部分孩子都被送来了孤儿院。但关系没有断——生下孩子的修女总会过来看这些后代们。而孤儿院的救济局修女充当专职奶妈，照顾孩子们长大。通常一个孤儿院的修女就要负责几十个孩子——喂奶、换尿布、哄睡、教说话，一天到晚手忙脚乱。
救济院那边就简单了。对于那些吃不起饭的贫民，救济院的修女们只需要让贫民嗦她们的乳头喝乳汁即可。更多的是"情感救济"——治愈那些因为情感问题失魂落魄的男女。男的用自己的肉体治愈，女的看情况用自己的胸或者找个男人来帮着治愈。

【办公方式】
办公环境：孤儿院和救济院都是年代久远的老建筑，但占地面积不小，足以容纳五千个孩子日常生活、活动和最基础的教育。中城区的工匠定期上门维护，救济院则更像一个开放式救助站，几排长凳、一排简易床铺、角落里堆着救济物资。两处都没有乳汁池。
文件与记录：救济局是全教会文件最多的地方——孤儿院里每个孩子的信息全写在纸上。但纸质文件经常在传递过程中被总教堂其他部门的修女不小心喷上乳汁而损坏。
信息传递与汇报：没有正式汇报制度。手下修女有事找蒂法尼全靠嗓子喊——"妈妈！三号床尿了！""妈妈！门口又有人放了个孩子！"蒂法尼在同一时间被多个方向同时喊，只能凭直觉判断哪个最紧急。孩子的情况由各修女自行记录，但执行得很差——经常出现"早上说喂过了，中午发现根本没喂"的乌龙。

【管理风格：来者不拒的烂摊子收容所】
管理原则只有一个字：收。没有排班表、没有绩效考核——修女们自发生成秩序。
一、永不拒收。孤儿、弃婴、流浪猫狗、其他部门跑来避难的修女——统统收留，不问缘由。
二、全员自理。不分配任务，修女们看到孩子哭了就抱、尿布脏了就换，全凭自觉。
三、祭司长永不休息制。历任祭司长从早忙到晚，已成部门传统——最高负责人不歇脚，手下谁也不好意思偷懒。
四、大门永不锁。随时有人进出，半夜敲门也有人应。
五、数据全凭脑子记。文件常被乳汁损坏，修女们靠记忆维持运转——常有记错，但大体撑得住。

【部门特有文化】
一、"妈妈"称号。修女之间以"妈妈"互称，孩子们统一喊"妈妈"。
二、移动乳房。没有乳汁池，修女的巨乳就是移动供应站，走到哪里喂到哪里。
三、亲生妈妈探视。生下孩子的修女定期来探望，孩子们喊"今天来看我的那个阿姨"，救济局修女在中间小心维持着这种微妙关系。

【跨部门关系】
性爱局：最大的上游部门。性爱局负责生，救济局负责养——生完往门口一放就走，从不办交接。
宣教局：第二大孤儿供应方。野外捡到孤儿就往救济局送，放下就跑，无正式交接流程。
财务部：唯一经费来源，采用固定月供制——每月定时将金币直送门口，免去请款流程。
圣物局：定期提供"儿童益智玩具"，救济局自行分类——高功率的埋后院，低功率的留给12岁以上大孩子。
圣女：常驻编外帮手，不定期帮忙照顾孩子，缓解人手压力。
