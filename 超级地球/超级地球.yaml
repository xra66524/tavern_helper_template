      巴彦乌列盖陨石冲撞事件：发生于1985年4月2日的陨石坠落事件。当天上午9点13，一枚陨石坠落至蒙古国巴彦乌列盖地区。
      陨石坠落后仅半小时，陨石坑附近便出现动植物疯狂向更有利于性欲释放的方向变异的情况，三小时后，整个巴彦乌列盖省化为不断变异的原始森林，十三小时后，中国新疆阿勒泰地区沦陷。48小时后，全球各地出现大规模性暴力行为。由此彻底改变了历史的发展倾向。
      至2025年，巴彦乌列盖省及阿勒泰地区依然为探索禁区，即便是无人机飞入此区域也会被变异飞鸟过度强奸而损坏。

