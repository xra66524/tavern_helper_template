<设定·格斗者·第三限度>
（破妄虚之境，对应魔法少女精英(Lv.26~40)。适用于角色处于第三限度或涉及精神修行、生物场域战斗的剧情场景。）
【第三限度·破妄虚】
· 特点：有才能者至此能"见常人之所未见，闻常人之所未闻，感常人之所未感"——感知力突破人类常规。旧时因此被视作能与神沟通之人，也是古时格斗者常与密教邪派勾连的根源。
· 核心要义：「攫精血，驻神常」。
精血——人身之元气，一个稳固的"锚点"，保持物质存在不产生不可知变化。服药后从异化组织中提炼，积蓄于心脏，战斗中持续消耗，也可用于加速伤势复原。其源头在于心。
神常——"常存之神"，让神思敏锐、周身畅达，稳固自身不使精神偏移，成为自身真正之主宰。需时时养炼、保其驻守不失。驻守深处可控制身体生长、青春不失、寿数绵长。其源头在于脑。
两者相辅相成，必须齐头并进，不可偏废。
· 脑部异化：身体异化组织强壮到一定程度后的必然标志。作用为加快异化组织生长、接收收束、修复伤势。硬指标——达到第三限度的格斗者，异化组织覆盖率至少 45% 以上。
· 生物场域：人人都有，是生命信息的集合。普通人微弱内收难以感知；格斗者因异化组织而场域张扬强势，能影响一片范围。核心能力——不用感官凭场域辨别人物，不通过旧有学习方式即可传递与接收信息。场域较量——高手兼具谨慎与冲动，场域碰撞肆无忌惮但看不透底细则绝不出手；最高技巧是即便暴露自身信息，对手看到的也不是破绽而是"无法超越的绝望"。深层次冲击可让对方精神绝望、丧失一战之勇气。
· 精神特质：第三限度格斗者（尤其是服药修行者）精神上普遍存在一定偏执——某些事完不成就心心念念，无法释怀。
· 破限方法：
旧法（主流，多为个人格斗者所用）——称"觉悟"或"开慧"，不强行突破，等一个契机。需呼吸、身体、精神三者配合，辅以特定药物。关键在于找到真正激发兴趣之物或全身心追逐之事，拂去心中挂碍，以自我意志的完满实现精神升华，自然迈过门槛。精神与身体必须交融，以自我意志为主导。
新法（多为大企业、政府格斗者采用）——服用按个人体质量身定制的药物，以药物力量帮助突破阻碍。代价是提供药物一方（企业或政府）掌握身体的详细数据。
· 精神修行：
定心——欲定先需静，第一步「辟空守虚」清空杂念；念头跳脱如猿，安静后再一个个缚住，谓之「缚心猿」；再「存意于一」，观想一物守住初念。
凝神——精神汇聚后，心念智识、过往记忆、神思性情收束成一团，外人无从侵略。若此神团崩开，可能失去自我，沦为行尸走肉——精神攻守之凶险不亚于肉身相搏。
淬炼——反复磨练，淬去杂质，纯留精粹，成"宛煞晶质，光玉琉璃"。
· 养神常：冥想法配合妥帖药物，高明的冥想法配特殊药香事半功倍。
· 炼神谛：寻到心中最执着的目标作为精神依托，如同根扎泥土。必须真正认清自我、为之践行。精神修行的前提是执着的信念与强固的身躯。
· 磨炼：有祈拜法、观相法、持坐法、身势法、声音法等。最直接有效的是「锤炼法」——以他人强猛之神攻伐锤炼自身心玉，琢磨杂质、使之坚固凝练，分外炼与内炼。风险在于长久磨砺易沾染他人精神意念，攻击方须懂得收敛且不带敌意。
· 第三限度阶段：
第一阶段·基础——脑部初步异化，精血开始积蓄，神常初驻，生物场域觉醒。
第二阶段·心劲——精神力量修行到一定境地后，与自身劲力结合。关键在于信念与意志，运炼出何种心劲取决于既往劲法和自身所求，最适合自身战术特点的才是最好的。心劲若套用魔法少女体系，已相当于"中技能"级别。但格斗者上下限差距极大——强大的第三限度格斗者可将心劲当平A来打，而刚掌握心劲的普通第三限度格斗者连一些强力魔法少女都打不过。
第三阶段·灵觉——"一点灵明知我性，真觉渡世重换命"。精神修行圆满后，能以精神牵动精神世界的精粹，有微微光亮闪烁。可将灵觉之力凝聚到兵器上。灵觉之力只有灵觉之力可以对付。若套用魔法少女体系，灵觉相当于"上位魔法/秘奥义"级别，是第三限度的巅峰战力——心劲是"中技能"，灵觉则是压箱底的杀招，即便强者也难以随意连发。</设定·格斗者·第三限度>
