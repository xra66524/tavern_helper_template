【性爱运动会概述】
性爱运动会是肉身布施教全年唯一正经举办的大型活动，由圣职局和总务部联合主办，每年十二月举行，持续两周。这也是修女们全年唯一会认真对待的事情。肉身布施教上下都特别重视这个活动，从教会高层到基层修女，无人敢怠慢。

【参赛单位】
城内以城区为单位组队参赛，一般每三个分教堂（主要教堂）合并组成一支代表队；总教堂各部门各为一队，外加城防卫军和教会骑士团也各为一队。此外，还有一支特殊的队伍——海外朝圣者联队。全城共计三十三支代表队，各队详情如下：

城区代表队（每三个分教堂一队）：
- 上城区四队：上城区一队～四队（上城区十二座分教堂，每三座一队）
- 中城区八队：中城区一队～八队（中城区二十四座分教堂，每三座一队）
- 下城区四队：下城区一队～二队（下城区六座分教堂，每三座一队）、下城区三队（角斗场修女）、下城区四队（魔兽事务修女）

总教堂各部门代表队（每部门一队）：
- 一楼：财务部、建设部、圣职局
- 二楼：文献部、总务部、后勤部、救济局
- 三楼：外交部、教法局、教义局、教育局
- 四楼：圣物局、宣教局
- 其他：性爱局、城防卫军、教会骑士团

海外朝圣者联队（一队）：
- 由大陆各地零星教堂的修女跋山涉水赶来临时拼凑的队伍。她们平时在别国受限于当地规模无法彻底放纵，把运动会当成最高规格的"麦加朝圣"。这支队伍战斗力极不稳定，但因为憋得最久，往往一上场就展现出极其恐怖的战斗力。

参赛修女以队伍荣誉为最高目标——平时再散漫的修女到了运动会上也会拼尽全力，因为输给别的部门是全教会最丢脸的事。

【比赛地点】
圣芙蕾雅城城外。总务部会在城外提前一个月搭建赛区，包括主竞技场、各分项赛场、观众看台、兽栏及临时乳汁补给站。由于总务部修女搭建到一半往往就地开始群交，最终交付的赛区通常与设计图毫无关系，但历年也没出过什么大问题。

【主要项目】
运动会设十四大项、二百五十七小项，每年由圣职局和总务部协商微调，但十四大项框架历年不变。具体小项浩如烟海，此处仅列大项名目：

1. 耐力类——比拼持久力，谁能撑到最后不倒、不射、不昏。
例：不倒金身（修女站立不动，任男人轮流冲刺，谁先腿软倒下谁输）。
2. 竞速类——比拼单位时间内的数量，谁榨得多、喷得远、做得快。
例：百人斩竞速（限定时间内谁榨干的男人最多）。
3. 引诱类——比拼不靠主动动手，仅凭身体、语言、气场让男人扑上来。
例：禁手魅惑（双手被反绑，仅凭眼神、声音和身体扭动让观众席上的男人主动冲上场扑倒自己，被最多人扑者胜）。
4. 环境类——在特定地形或场景下完成性爱，如野外、水域、高空、废墟等。
例：瀑布交合（在瀑布冲刷下完成性爱，谁先被水流冲散注意力分心谁输）。
5. 传统类——正常运动会的田径项目，如短跑、长跑、跳高、跳远、投掷等。
例：乳汁负重跑（手捧满满一杯自己的乳汁跑四百米，洒出最少者胜）。
6. 技巧类——比拼性爱技巧的掌握程度，涵盖基础技巧、进阶技巧与高阶技巧。
例：骑乘位精准控精（用骑乘位让男人始终维持在临界点但不得射，坚持最久者胜）。
7. 胸部类——一切以乳房为主的项目，如乳交、乳汁、乳房对决等。
例：撑破罩杯（比拼一定时间内谁撑破的合身罩杯最多，U罩杯的撑U罩杯，K罩杯的撑K罩杯）。
8. 口技类——一切以嘴、舌、喉咙为主的项目。
例：真空喝水（比拼谁能用真空口交最快喝光一整桶水）。
9. 兽奸类——与魔兽或兽类配合的项目，下城区修女的传统优势领域。
例：触手反制赛（被三只触手魔兽同时缠绕后，比拼谁最快反客为主让触手先交出精液）。
10. 小穴类——一切以阴道为主的项目，如紧度、夹力、吞吐量等。
例：阴拔河（两人阴道同时含住一根双头假鸡巴，谁先把假鸡巴从对方体内拔出来谁赢）。
11. 菊穴类——一切以肛门为主的项目。
例：肛塞障碍跑（塞入同尺寸肛塞后完成障碍赛道，先掉落者淘汰）。
12. 极限类——挑战生理与心理极限的高危项目，如巨物、多人数、超时长等。
例：全能基础十二项（修女用一种基础姿势榨干三十个男人，换下一种姿势继续榨，直至完成全部十二种基础技巧）。
13. 装扮类——以服装、道具、角色扮演为核心要素的项目。
例：制作胸罩（最短时间内用魔兽皮等劣质材料为对手制作胸罩，且不能让对手轻易撑破）。
14. 团体类——团队协作项目，如接力、对抗、大型混战等，含金量最高的大项。
例：修女人墙对抗（全队修女手挽手排成人墙，任对手队伍冲锋破阵，人墙保持最久不散者胜）。

【赛场纪律】
性爱运动会是肉身布施教少数真正有纪律的场合——赛场上比赛第一、友谊第二，严禁因个人交情放水，违者取消比赛资格。修女一律全裸参赛，不得穿戴任何衣物。圣职局负责计分，但圣职局积分的时候不用纸——她们让建设部直接扛石板过来，和建设部的修女一起当场刻积分数据。这活很累，刻错或记错分是常有的事，但计分基本上都被保存下来了。

【观众】
全城男性居民均可免费观赛，并可自愿作为"道具"上场配合修女完成比赛项目。外来男性游客也可参加。十二月的运动会期间是圣芙蕾雅城全年的旅游最高峰，全大陆只要有钱买船票或车票的男性（商人、佣兵、贵族、甚至别国微服私访的王室），都会把来这里看运动会当成年度终极旅游目标。这半个月里，圣芙蕾雅港和城内旅店会被各国的船只和游客彻底挤爆，一房难求，许多人只能在城外赛区搭帐篷（然后半夜被修女夜袭）。

【奖品】
各小项比完后即当场决出冠亚季军，奖品由圣物局统一打造——冠军获超高频跳蛋，亚军获高频跳蛋，季军获中高频跳蛋。颁奖时由圣物局修女当场将跳蛋塞入获奖者小穴并开到对应档位，获奖修女被震到瘫软在地、双腿抽搐即为授奖完毕。跳蛋赛后不回收，归获奖者个人所有——至于她们拿回去是自己用、对上司恶作剧还是拿去黑市换钱，圣物局一概不管。

【闭幕式】
两周所有小项结束后举行闭幕式，圣职局对全部小项积分进行总清算并宣布三十二支代表队的最终排名。得益于石板计分制度，积分数据基本完整保留，但圣职局修女宣布排名时偶尔会被质疑，被质疑时就当场吵一架。总积分排名第一的队伍没有额外奖励——"荣誉本身就是最大的奖励。"但输了的队伍会被全教会嘲笑一整年，直到下一届运动会翻盘为止。
