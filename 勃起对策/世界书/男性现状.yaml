    山阳区:
      男性特征: 交通枢纽+商业区，流动人口多。常驻男性以商户和上班族为主，相对守规矩。但火车站周边有大量外地流动男性，因不熟悉本地规则而频繁被抓。王德发一类本地老惯犯则经验丰富，知道哪些警员"好说话"，不怕轻度执法
