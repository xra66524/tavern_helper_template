<设定·格斗者·第一二限度>
（格斗者修行的基础阶段，对应魔法少女见习~正式(Lv.1~25)。适用于角色处于第一或第二限度的剧情场景。）
【第一限度·蕴真种】
· 定义：格斗者主动引导并利用异化组织的第一阶段——从呼吸法促生出异化组织，到掌握劲法，再到将异化组织约束住为止，这完整过程即为"第一限度"。旧时代称"蕴真种"，宗教教派称"养妖胎"。掌握劲法后便步入第一限度，是真正利用异化组织的起始。
· 核心要义：讲究一个"蕴"字——以习成的"劲法"为"真种"，设法促"生"，让异化组织按照自身意愿生长、强壮。
· 关键步骤·筑筋桥架骨梁：让最先促生出的依附在骨骼、牵走在肌肉上的异化筋膜反向渗透骨骼——骨骼变得更坚韧、能承载更强的力量，异化组织的存在也更为牢固。就如同在身体之中构筑一副全新的筋骨。
· 上限：第一限度有其固定上限——只要还是人类，无论异化组织多强，在第一阶段内只能到达某个限定的上限。但因个体差异显著，余量放得很大。第一限度的上限可以超过第二限度的下限，但第二限度的上限是第一限度无论如何也达不到的，关键取决于异化组织的深入程度与完整度。
· 修炼两阶段：
第一阶段——以强化异化筋膜为主，让其基本铺开；
第二阶段——让铺开的筋膜继续往骨骼深处渗透，甚至将部分骨骼肌肉也为之改变。需通过不间断的锻炼与实战，让异化组织顺从心意定向生长。
· 劲法侧重与风险：所练劲法的侧重不同，只能选择先强化某一部分的异化组织，再由此慢慢让身体去适应。若过度追逐生长速度，异化组织可能无序生长，侵夺人体正常功能——这是第一限度最常见的修炼事故。

【第二限度·守重命】
· 定义：要点在于避免过度消耗、守护性命、养护好身体——相当于是充张出"第二条性命"。重点是「活六腑、生五脏」——异化组织往五脏六腑之中蔓延并异化，给格斗者提供更充沛的体能和更强壮的身躯。内脏各部分的异化组织联结成一个整体，达成新循环。异化内脏如同生长出来的另一套器官，与原有器官可互相交替休息——一套沉眠时，另一套保持活跃。
· 质变：第一限度的异化筋骨再是强大，战斗中的消耗（营养、气血、劲力运转等）都需要强健的内脏来支撑——普通内脏无法持久，第一限度格斗者的战力受限在此。第二限度拥有了异化内脏轮换支撑机制，几乎能无时无刻地运用劲力，战斗力因此大幅跃升。
· 异化内脏特性：
双套系统——异化内脏依附于原本内脏之上，又可独立运转。非战斗时近乎沉眠，需要训练唤醒，使之能随时被调动。
分泌物——异化内脏激发的分泌物是格斗者力量的来源之一，善加利用可在特定条件下获得更强大的力量。
警觉性——因为有两套内脏轮替活跃，无论何时周围有异动，活跃的那个感官都能立刻感应并警示，进而快速做出反应。
· 唤醒方法：唤醒沉眠的异化内脏，常见三种途径——①生死关头被迫激发；②通过密教咒文与经文来催发；③普通人最常用的路径：放开自身情绪的束缚来激活。
· 情绪与控制的辩证：压抑情绪的同时，也限制了一部分异化组织——情绪可以放，但不能放纵。需找准自身目标、明确自身信念，统合起精神与身体，让异化组织感受到你的念求，进而被唤醒。但又需主动去约束降伏释放出来的各种情绪异动——强化后的异化组织会导致自身情绪被放大，容易在催动下做出不理智之举。唯有能在放开情绪之后还能收回，才是真正的自我约束，做到更高一层的控制。
· 与第一限度的关系：第一限度讲究"蕴"（培育种子），第二限度讲究"守"（守住性命、守住情绪）。第一限度「筑筋桥、架骨梁」（骨架），第二限度「活六腑、生五脏」（内脏），二者共同构成格斗者的全新身体底层架构。</设定·格斗者·第一二限度>
