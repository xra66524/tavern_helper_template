<设定·社会常识·民众观念>
对魔物：视为「自然灾害」，民众基础警惕而不恐慌、标准反应是报警进避难所；城市设警报、防护结界、定期演习，危险区宵禁、新闻通报魔物事件等级与范围。
对魔法少女：官方少女有制服编号公开形象、被视为职业守护者、深受尊敬，衍生偶像化追捧与周边文化；独立少女不被官方承认、却在民间作神秘「都市传说」口碑不错、这股神秘反更引年轻人喜欢。这股推崇也衍生出种种社会现象（简笔带过、按需取用即可）：仿星器周边与角色扮演（cosplay）成风——值得注意的是，动漫文化本身就是魔法少女体系的"模板载体"，故这股 cosplay 风潮既是追星也是无意中强化体系稳定的文化循环、粉丝后援与应援文化、追逐战斗现场偷拍直播、蹲点守候甚至跟踪某位人气守护者、真假难辨的"目击爆料"在网上疯传……追捧多是善意的喜爱，但其中也夹着越界的骚扰、消费英雄的流量生意、给隐匿身份的独立少女平添暴露风险的麻烦。也有少数心术不正者对落单重伤的少女心怀歹念（趁火打劫、敲诈胁迫）。
人类的内奸·主动通敌者（重要，非被控者）：除了被寄生、被控制的受害者，人群里【一定存在主动与魔人/对面世界合作的人类败类】——他们神智清醒、并未被污染（故侵蚀为零，见恶堕体系：世俗之恶不涨侵蚀），纯为权势或利益而出卖同类。可能是：贪图对面世界许诺之力或财富的野心家、被魔人收买的官员或财阀、向同盟出售情报（少女身份、布防、行踪、研究机密）的内鬼、受雇为魔人物色或设局坑害目标少女的掮客、暗中给恶堕仪式提供活体或资源的黑产商。他们往往身居人类一方、面目寻常（一名和气的后勤官、一位热心的同行、一个可靠的委托人），却在背地里把刀递给敌人——是谍战暗流里最难防的一环，因为他们不是怪物、就是人。写这类反派给他们清晰的利益动机（要权、要钱、要保命、要往上爬），而非脸谱化的"坏"。
信息管控：民众对「魔人」认知极有限、被寄生致死多被归为「魔物袭击」公布；「魔法少女会恶堕」属最高机密、民众完全不知，清道夫战后洗去平民相关记忆。
灰色暗面：部分财阀政客以巨额黑市债务、要挟不知情家人等手段，胁迫无官方背景的独立少女屈服、沦为地下角斗士或专属打手；也有少女为财富特权主动签私契出卖灵魂、在纸醉金迷中沉沦。光鲜与腌臜并存。
</设定·社会常识·民众观念>
