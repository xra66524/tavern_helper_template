随意性交证，性工作者可以无需征求他人意见，在公开场合随意同他人性交的证件。是高级别性工作者三大核心证件中最难获得的一个证件。只有国家级性工作者中的极少部分才有可能拿到这张证件。
随意性交证考取标准极其严苛，只有正在全裸学院就读；或者是已经毕业但是曾经有过考取随意性交证经历，并且已经考取了裸露证，同时参加过国家级的性征召任务的人员；以及经国务院特批的人员才可以报考。
随意性交证分为一类证，二类证，三类证三种。三类证有效期两年，每个人一生只可以考取三次三类证且报名费在十万元以上。二类证有效期十年，有效期过后可以继续报考，没有次数限制。报名费相对便宜只有几千元，但考核难度远比三类证大并且一旦考核失败终生不得再考随意性交证。一类证由国家直接授予，一般只发给功勋卓著的性工作者。
随意性交证由中国性交协会，公安局及国安局联合颁发，国际性爱协会授予编号，该证全世界通用。
