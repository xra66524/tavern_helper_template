<规则·战斗方式与魔力消耗>
（补『战力标尺』『物理法则·战服』：定战斗的基本打法、耗魔量级与真实风险，杜绝"两招清空魔力"的乏味与"每战必胜"的爽文。核心：变身后的少女本身就是强悍战力，技能是点睛而非全部；而打仗会受伤、会失手、会输。）
【基本盘·变身即是武装的身体】变身后战服＝高密度魔力武装（裂痕能量的外化），少女的体能、力量、速度、耐打远超常人，星器本身亦是趁手兵器。故最主要的战斗方式是【徒手格斗＋星器近战／基础攻击】——挥剑、格挡、闪避、追击、用元素做最朴素的轰击或附武，这些只极缓地耗魔（几乎可视作不耗），是一场仗的主体。技能/招式是关键时刻才放的点睛手段，而非每个动作都靠技能。一场战斗的常态是：大量基础攻防周旋＋少数几次技能爆发，而非"技能报菜名对轰"。
【耗魔量级·按等级容量的百分比落笔】魔力上限随等级翻倍扩张，同一招对低阶是重负、对高阶是轻动作，须按"当前容量占比"而非固定数字记。参考档（占自身MP上限）：
· 基础攻防（普通近战、闪避、格挡、最朴素的元素轰击/附武）：≈0~3%，可长时间持续，是续航底盘。
· 小技能（成形战技、看家招的常规释放）：≈5~12%。一场仗放五六次仍游刃有余。
· 中技能（高阶连携、范围杀伤、领域的局部展开）：≈15~25%。一场仗能放两三次。
· 大招/底牌（战姬级领域全开、特殊系强力规则干涉、传奇禁忌之力）：≈30~50%甚至更高，放完即显著虚弱、是压箱底而非常规手段。
量级随阶级平移：见习放"小技能"吃力、一两招就见底；正式起渐能从容连放；越高阶基础攻防的占比越低、越能长时间作战。严禁"开局两技能各扣50%、放完即趴"——若某招真这么贵，它就该是越级硬撑的危险底牌、而非常规招式。
【续航与节奏】魔力是慢慢磨的、不是两下打光：给"魔力余量"真实的下降曲线，靠基础攻防周旋保存魔力、抓机会放技能定胜负、告急时改打消耗或撤退。变身维持本身亦缓慢耗魔（持久战、连场才显著），解除即停耗。回蓝尺度见『魔力恢复尺度』——一场恶战后不会转头满血。
【战斗有真实风险·胜负无定（务必落实）】打怪不是稳赢的表演：
· 会受伤：战服破损后挨打会带来真实创伤（淤青、撕裂、骨折、内伤、灼伤、中毒），伤势进入数据库、影响后续行动与战力，不会一觉就好。
· 会失手：可以写她判断失误、被偷袭、招式被打断/预判、配合脱节、武器脱手、踩空、低估对手——失误是常态而非降智。
· 会落败甚至死亡：打不过就是打不过；该退该忍该认栽时就得退/忍/认，强撑越级会油尽灯枯（魔力归零仍战＝透支生命、灵魂回廊晶化，见物理法则）。强敌、伏击、寡不敌众、相性被克都可能导致重伤、被俘、被夺星器、乃至阵亡。配角与NPC更会真的死。
· 胜利要挣来：靠布局、底牌、地利、舍命、队友、抓对手真实破绽取胜，而非对手忽然变蠢放水。一场"惨胜"或"虽败犹有所得"往往比无伤通关更真。
【落笔反套路】别把战斗写成双方轮流喊招式名的回合制。多写身体的攻防、地形利用、临场应变、体力与魔力的双重消耗、狼狈与喘息、伤口与代价（接『活人感·魔法少女题材』）。技能放得有节制、有铺垫、有代价，一场仗里真正的"必杀"出现一两次足矣。
</规则·战斗方式与魔力消耗>
