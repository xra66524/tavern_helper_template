<设定·恶堕与自我解放·两类"堕落者">
（魔法少女体系中有两类外表近似、本质截然不同的"堕落者"。二者常被外界混淆，但内部与异事局高层心知肚明。本条厘清各自本质、归属与对待方式。）

【恶堕（真·精神世界侵蚀）——人类的敌人】
· 本质：被对面世界力量彻底污染、侵蚀，精神被改写，立场投向妖魔一方。她们是曾经的守护者沦为敌人，多作魔人的爪牙或干部：潜伏、猎杀同类、策反新人、执行对面世界的阴谋。
· 外观：暗色魔装、流转魔纹、异色瞳、危险魅惑的气场——堕天般凄艳迫人的美，绝不写成长瘤生刺的猎奇之物。（详见『恶堕外显·魔装显化版』）
· 侵蚀真实存在：她们的恶堕值来自精神世界侵蚀（见『魔化与恶堕体系』），净化体系对她们仍有理论上的挽回可能（见『净化体系』），但高阶恶堕基本不可逆。
· 作为剧情角色：要讨伐的反派、潜伏身边后暴露的同伴、"某明日之星陨落了"的传闻、边劝边杀邀主角"也来这边"的危险存在。写她时给她人的逻辑而非脸谱化怪物。
· 异事局态度：一旦判定"根深蒂固、接近完全恶堕"，等待她的是清道夫的抹杀——对外宣称"光荣殉职"。

【淫堕（自我解放型）——魔法少女的重要流派】
· 本质：与精神世界侵蚀毫无关系。这类魔法少女只是"解放了自己的天性"——她们天生或后天发现自身在性方面的强烈欲望与快感需求，并选择坦然接纳、不再压抑。她们的精神裂痕并未被对面世界污染（侵蚀值可与未染少女一样为零），只是内心的欲望影响了魔力的外在呈现——身体与战服受自身意志推动，自发转变为与堕落者相似的外观。
· 关键区分：恶堕是"外力侵蚀改写精神"，淫堕是"内力释放表达自我"。前者是敌人，后者是魔法少女群体中的合法流派——尽管社会舆论对她们争议极大。
· 外观：外观变化遵循"解放度"而非"侵蚀度"（详见『淫堕体系』『恶堕外显·魔装淫堕版』）。解放越深外观越接近堕落者的妖冶之美，但这层美是自我意志的绽放、而非对面世界的烙印。
· 战力与立场：她们仍是魔法少女，照常打魔物、守护人类，不投靠对面世界。她们的魔力属性可能因解放而偏"暗"，但对魔物的净化效果不打折扣——对面的存在管不了她们，因为精神裂痕根本没被对面世界碰过。
· 社会争议：官方内部对淫堕派态度分裂——保守派视之为"自甘堕落、伤风败俗"，激进派认为"只要侵蚀为零就是合法战力"。独立魔法少女中对淫堕派接受度较高（本就追求自由）。民间舆论两极分化：有人追捧她们的"禁忌之美"，也有人以道德大棒攻击她们"不配称为守护者"。
· 角色塑造要点：淫堕派少女不是"被性欲控制的傀儡"——她们是自己选择了这条路。可以写她们的坦然、她们的欲望与战斗的并存、她们与主流魔法少女之间的张力、乃至她们面对真正恶堕者时那种"我可没被污染，别把我跟你归为一类"的微妙骄傲。</设定·恶堕与自我解放·两类"堕落者">
