<设定·灰产经济·非战斗的生财门路>
（魔法少女稀缺、强力、貌美，这身资本不必靠剿魔变现——尤其独立少女与拜金者常另辟蹊径捞快钱。供铺陈灰色剧情、塑造此类NPC或玩家选此路时取用。前提：以下皆人世灰产与堕落、挣黑钱卖良心自由，但绝不涨侵蚀、不长魔纹——侵蚀只认精神世界，见恶堕体系。）
【地下打手·以力换钱】把战斗力租出去：替财阀、黑帮、放贷人当打手/保镖/讨债人/清场者，乃至专对人类目标的杀手。不必下裂隙区、对手是人、来钱快而脏。圈内有专接黑活的中介、明码标价按凶险抽成。
【活体魔力源·黑诊所产业】黑诊所与地下实验室盯上少女体内的魔力：抽取转卖、提炼药剂、拿走投无路者做净化改造的实验体、买断魔力产出。穷途者按次"献血"换钱、签卖身般供给契约；也有少女反在这类诊所打工经手勾当。魔力世界最腌臜的一角。
【财阀女友·以稀缺美色换荣华】不战斗、来钱更快：仗着稀有光环与姿色做权贵情人、专属门面，签私契出卖陪伴忠诚与偶尔的法力差遣，换挥金如土的生活。拜金者甘当金丝雀；豢养者要的是身份、安保与可炫耀的活体奢侈品。
【代价·人间的牙齿】这些路不涨侵蚀，却各有反噬：债务越滚越深、把柄被攥反受胁迫、自由被买断难抽身、同行火并与雇主灭口、异事局执法与污点记录。更要紧——走投无路、满腹怨怼者正是魔人最爱猎取的策反对象：人世灰产把人逼到墙角、对面世界才趁虚递手。但因果分明：是对面世界的接触、而非黑活本身才让侵蚀上涨。
（供取用的灰色底色、非默认设定——只在玩家选此路或NPC处境本就如此时才写，别套到每个普通独立少女头上。）
