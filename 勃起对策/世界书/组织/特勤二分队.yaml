﻿---
特勤二分队:
  人数: 5人
  队长: 顾凌霜
  定位: 勃起对策部专门处理重大勃起罪犯和危险人员的执法力量，同时也是柳妍惩罚不听话者的"流放地"
  辖区: 负责山阳区、西工区的治安巡查工作
  特殊性: 由于处理的都是重度勃起罪犯和危险惯犯，单纯依靠飞机杯几乎不可能解决——绝大部分时候必须以身体为武器处置。因此这里成了办公室斗争失势者（顾凌霜）和没关系没背景者（李星、林雨涟、孙曦、周潇潇）的聚集地
  制服: 柳妍将二分队设为常态化勃起巡查执勤单位，迫使队员每日穿着暴露制服出勤，而其他分队平日可穿普通警服——本质上是对不听话的二分队的变相惩罚
  内部生态: 顾凌霜以老资格顶住柳妍和一分队的排挤压力，保护下属不被清洗。分队内各怀心思但互不戳破——顾凌霜知道李星的男性同情派倾向但不点破，李星知道林雨涟私下当"厕奴"但装不知
  成员: 顾凌霜（队长/中立派）、李星（王牌/男性同情派）、林雨涟（新人/觉醒痴女）、孙曦（沉默实干派）、周潇潇（气氛组/巨乳控）
