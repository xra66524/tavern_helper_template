      男性特征: 一分队辖区，执法最严。男性在此极度压抑，基本不敢有任何越界行为。但性欲只是被压制住了。
    大学城:
      男性特征: 年轻男大学生为主要群体，是大学城分队"吃拿卡要"的重点猎物。缺乏社会经验和财力，被罗织罪名后只能任由宰割
    清州区/东湖区:
      男性特征: 老城区和普通居民区，男性以保守的本地家庭为主，对勃对持沉默顺从态度，是"习得性无助"最典型的区域
  与勃起对策部的关系: 男性对勃对警员的态度分裂——对一分队（凌若雪）极度恐惧，因执法冷酷且不留余地；对二分队（顾凌霜）、西工分队相对缓和，因执法相对宽松；对李星和林雨涟等个别警员甚至有好感，视其为"福利来源"
