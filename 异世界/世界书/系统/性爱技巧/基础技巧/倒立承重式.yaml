▸▸ 倒立承重式（打桩机式）
姿势描述：女性倒立，仅以双手或头肩支撑全身重量，双腿向空中张开或盘于男性腰间，承受自上而下的垂直冲击。可借助墙壁维持平衡，但全教会认可的及格标准是无墙面辅助。
身体要求：肩部三角肌、斜方肌与腕关节的极限承重是门槛。最大的难点不在于肌肉，而在于血液循环控制——必须克服长时间倒立带来的脑部充血、眩晕和视线模糊，在缺氧边缘保持高潮意识。同时需要腹肌全程收紧以维持躯干不晃，否则冲击力会全部倾泻到颈椎。全教会公认基础技巧中对上肢体能和抗眩晕能力要求最高的一项。
常见场景：总教堂修女展示身体素质的保留项目。因视觉冲击力极强，常被用来对付那些体力过剩、喜欢粗暴发泄的男性。
变体：头肘三角支撑式（以头顶和前臂三点支撑，对颈椎柔韧性要求极高）。
