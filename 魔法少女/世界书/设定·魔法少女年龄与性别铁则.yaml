<设定·魔法少女·年龄与性别铁则>
（题材设定，硬性约束，不可违背。在新设定下，这一现象的成因是"双界共鸣的统计规律"而非"星灵择主"——见『双世界交汇』『魔法少女体系起源』。）
能与精神世界产生足够稳定的共鸣、成为魔法少女者，统计上高度集中于14~25岁的年轻女性——双界距离缩小后，这一区间的女性因思维跳跃、情绪活跃、精神可塑性强，最易与精神世界发生共鸣并稳定接入。具体规则：
· 共鸣起点：最早14岁起可觉醒为魔法少女。低于14岁的自发共鸣极其罕见且极不稳定，官方原则上不招募14岁以下者（例外需特批）。
· 主力区间：14~25岁是魔法少女的黄金年龄，精神可塑性最强、裂痕能量通道最宽、变身最稳定高效。
· 缓慢增长期：25岁后精神力稳定程度随年龄增长而下降，裂痕的通量开始缓慢缩减——25~35岁的魔法少女仍可维持战力，但升级速度明显放缓、魔力上限的扩张变得艰难。
· 35岁硬限制：35岁后，精神已不具备足够的可塑性来维持裂痕通道，无法按照纯粹的魔法少女方式继续修炼。若不采取行动，魔力将随时间逐渐衰减。
· 唯一出路·改修格斗者：35岁后的魔法少女若想保住力量甚至更进一步，必须改走格斗者之路——从零开始学习呼吸法、培养异化组织，将外化的精神能量重新内化为劲气。但这一步极不容易：已经固化在"裂痕外化"模式中的精神，要转型为格斗者的"身心合一"，需要克服巨大的体系惯性，且等级越高改路越难（传奇级几乎不可能成功转型，精神裂痕已经深到无法愈合）。成功改路者可以魔法少女时代的魔力为基础、叠加格斗者的劲气，上限可能远超纯魔法少女，但成功率极低。
故：
· 所有魔法少女（无论主角、队友、对手、恶堕者、独立或官方一线战斗员）的年龄必须落在14~35岁，绝不出现男性魔法少女。
· 14~25岁为最常规区间（绝大多数角色）；25~35岁为缓慢增长期（角色可行但须体现"力不从心"感）；35岁以上的纯粹魔法少女不存在——能留在战场上的必然是已改修或正在改修格斗者的。
· 主角若未指定年龄，默认18岁；指定年龄须在14~35内。
此限制只针对"魔法少女"这一战斗身份。其余角色不受此限：异事局的行政、指挥、研究、后勤人员，财阀、政客、平民、化形魔人等，可以是任意年龄、任意性别的男女（如四十岁的局长、中年男政客、苍老的研究主任）。格斗者与密教者同样不受此限——格斗者成才动辄数十年、高阶者多为中老年人；密教者只看知识传承、无年龄性别之限。
切勿自相矛盾——不要写出"四十岁的纯粹魔法少女"这类违背设定的角色；要表现资历深，就让她是25~35岁缓慢增长期的老兵、战功彪炳却力不从心，或已成功改修格斗者，或已转入管理/教官岗（此时她可视作非一线的管理者，年龄可放宽）。
【改修格斗者·具体难度】魔法少女→格斗者的改修是逆体系而为：精神原本走的是"裂开外放"的通道，格斗者要的是"合拢内化"。等级越高，裂痕越深、越固化，改修就越难——见习~正式级成功率约三四成、精英级约一两成、战姬级极低、传奇级近乎不可能。成功者体内形成魔力与劲气并存的"双通道"，战力上限大幅提升，但过程痛苦且可能彻底失去力量。
【为何不是绝对法则而是统计规律】异事局研究院的立场是：14~25岁女性只是"当前观测到的最高共鸣概率区间"，并非绝对法则——理论上其他人群也可能共鸣，只是概率极低且极难稳定。研究院一直在尝试突破这一限制（人工诱导共鸣、扩展年龄段等），但至今未有可靠成果。故落笔时把它当作铁则遵守，但可在学术讨论或研究院剧情中提及"这只是统计规律、本质未明"。
【主角为魔人 / 魔物时·例外】上述铁则只约束「魔法少女」这一战斗身份。若玩家扮演的是魔人、魔物、化形魔人或寄生体魔人，则其性别、年龄、表观形态一律以角色档案为准，不受14~35岁年轻女性之限——化形魔人可呈任意年龄性别的人形，寄生体魔人取决于所夺躯壳，原生魔物更无人类性别年龄可言。唯「恶堕魔法少女」因本是守护者出身，仍落在14~35岁女性区间。</设定·魔法少女·年龄与性别铁则>
