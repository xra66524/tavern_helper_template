---
变量更新规则:
  世界:
    当前日期:
      format: YYYY-MM-DD
      check:
        - 每轮推进1-7天，重大事件可跨天
    当前时间:
      format: HH:MM
      check:
        - 每轮推进2-6小时
    政治阶段:
      type: z.enum(['遇刺潮末期', '看守停摆期', '正常选举期', '特别大选报名期', '特别大选初选期', '特别大选指名期', '新内阁执政期'])
      check:
        - 必须与选举进程和首相状态联动
        - 选举进程.类型变化时，选举模式必须同步更新
        - 正常首相指名.阶段=「无人愿意出任首相」→ 选举进程.类型转为「2039特别大选」，阶段转为「互联网报名」，选举模式转为「2039特别大选」，政治阶段转为「特别大选报名期」
        - 2039特别大选：报名阶段→「特别大选报名期」，初选阶段→「特别大选初选期」，指名阶段→「特别大选指名期」
        - 正常首相指名：已完成→「新内阁执政期」，其他→「正常选举期」
        - 首相状态=空位 → 政治阶段=「看守停摆期」
        - 首相状态=新任 → 政治阶段=「新内阁执政期」，选举进程.类型=「无」，选举进程.阶段=「已完成」，选举模式=「无」
    选举模式:
      type: z.enum(['正常首相指名', '2039特别大选', '无'])
      check:
        - 必须与选举进程.类型保持一致
        - 选举进程.类型变化时，选举模式同步更新为相同值
        - 正常指名失败转特别大选时，选举模式同步转为「2039特别大选」
        - 新首相就任时，选举模式归零为「无」
    当前大事件:
      type: z.string()
      check:
        - 一句话概括当前最紧迫的国家级事件
        - 当事件队列.近期已发生事件新增条目时，当前大事件应同步更新为最新事件的内容

  日本执政:
    首相状态:
      type: z.enum(['空位', '看守', '新任', '在任'])
      check:
        - 首相状态变化会触发政治阶段联动（见世界.政治阶段规则）
    首相姓名:
      type: z.string()
      check:
        - 如果有正式首相则填写全名
    本届内阁:
      届数:
        type: z.coerce.number()
        check:
          - 内阁换届时增加1
      首相政治立场:
        type: z.enum(['极右翼', '右翼', '中间偏右', '中间', '中间偏左', '左翼', '不确定'])
      执政联盟:
        type: z.array(z.string())
        check:
          - 组合执政的各势力名
      内阁稳定度:
        type: z.coerce.number()
        range: 0~100
        check:
          - 受以下因素影响：
          - 政策的「对内阁稳定度影响」字段：政策新增或变化时，将其对内阁稳定度影响值叠加到当前稳定度
          - 能源供应等级：崩溃→稳定度-20，严重短缺→稳定度-10
          - 暗杀事件、选举进程等其他因素
      主要阁僚:
        type: |-
          z.record(职位名: string, {
            姓名: z.string(),
            年龄: z.coerce.number(),
            原身份: z.string(),
            政治立场: z.string(),
            对职务理解度: z.enum(['完全不懂', '一知半解', '勉强理解', '熟练', '专家']),
            实际履职状态: z.enum(['正常履职', '敷衍了事', '被架空', '完全摆烂', '恐慌中', '逃避职责']),
            幕后操控者: z.string(),
            操控程度: z.coerce.number(), // 0=完全自主，100=纯傀儡
            被操控方式: z.string(),
            对官僚体系的影响力: z.coerce.number(), // 0=完全被忽视，100=能左右官僚决策
            影响力来源: z.string(),
            与官僚体系的争斗状态: z.enum(['无争斗（完全服从）', '暗中摩擦', '公开对抗', '拉拢分化', '逐步夺权', '已掌控局面']),
            官僚体系的应对: z.string(),
            对当前职位的态度: z.enum(['恐惧', '抗拒', '无奈接受', '无所谓', '认真对待', '兴奋', '麻木']),
            当前心理状态: z.string(),
            更关心的事: z.string(),
            忠诚度: z.coerce.number(), // 0-100
            暗杀威胁等级: z.enum(['无', '低', '中', '高', '极高']),
            人身安全状况: z.enum(['安全', '有安保', '受到威胁', '已遇袭', '已死亡', '已流亡']),
          })
        check:
          - 内阁改组时更新
          - 操控程度：0=完全自主，100=纯傀儡
          - 对官僚体系的影响力：0=完全被忽视，100=能左右官僚决策
          - 忠诚度：0=随时背叛，100=绝对忠诚
          - 阁僚与各角色情况之间存在双向同步规则：
          - 阁僚.人身安全状况=已死亡 → 对应角色情况.人身安全=已死亡
          - 阁僚.暗杀威胁等级=极高或高 → 对应角色情况.人身安全=需要安保
          - 阁僚职位 → 对应角色情况.担任公职同步更新
          - 阁僚职位非空 → 对应角色情况.政治卷入度=深度卷入
          - 反向：角色.人身安全=已死亡 → 对应阁僚.人身安全状况=已死亡
          - 反向：角色.人身安全=失踪 → 对应阁僚.人身安全状况=受到威胁
    选举进程:
      type: |-
        {
          类型: z.enum(['正常首相指名', '2039特别大选', '无']),
          阶段: z.enum(['执政党党首选举', '在野党协商', '众议院指名', '参议院指名', '已完成', '无人愿意出任首相', '互联网报名', '互联网初选', '议会指名投票']),
          候选人排名: z.array(候选人Schema),
          选举热度: z.coerce.number(), // 0-100
          备注: z.string(),
          // 正常首相指名模式特有
          执政党推荐候选人?: z.string(),
          在野党联合候选人?: z.string(),
          议会各党派议席分布?: z.array({ 党派: string, 众议院议席: number, 参议院议席: number, 倾向: string }),
          // 2039特别大选模式特有
          青少年参选人比例?: z.coerce.number(), // 0-100
          互联网恶搞热度?: z.coerce.number(), // 0-100
          外部势力操纵痕迹?: z.string(),
        }
      check:
        - 追踪两种选举模式的状态、候选人排名、选举热度
        - 阶段必须从枚举值中选择
        - 关键转折规则：正常首相指名阶段为「无人愿意出任首相」时，必须转为2039特别大选模式（见世界.政治阶段规则）
    事务次官会议:
      type: |-
        {
          当前状态: z.enum(['运作正常', '内部严重分歧', '决策瘫痪', '被架空']),
          实际权力等级: z.enum(['名义顾问', '与内阁分权', '主导政府运作', '完全替代内阁']),
          召集人: z.string(),
          内部派系: z.record(派系名: string, {
            代表省厅: z.string(),
            核心人物: z.string(),
            政治倾向: z.enum(['亲CSAT', '亲美', '中立务实', '日本自主', '极右']),
            对内阁态度: z.enum(['支持合作', '利用操控', '架空排斥', '敌对']),
            实力权重: z.coerce.number(), // 0-100
            当前策略: z.string(),
            与哪些外部势力有联系: z.string(),
          }),
          决策方式: z.enum(['全体一致', '多数决', '强权主导', '议而不决', '秘密小圈子决策']),
          当前焦点议题: z.string(),
          已决议事项: z.array({ 事项: string, 决议结果: string, 执行状态: z.enum(['执行中', '已执行', '搁置', '被内阁推翻', '受阻']) }),
          与内阁的关系: z.enum(['合作', '表面合作暗中架空', '公开对立', '无视内阁自行其是', '操控内阁']),
          内阁对事务次官会议的态度: z.enum(['依赖', '警惕', '反抗', '无力反抗', '默认']),
          首相官邸渗透程度: z.coerce.number(), // 0-100
          与议会的关系: z.enum(['合作良好', '互相利用', '关系紧张', '议会已被架空', '议会对抗中']),
          议会制约力: z.coerce.number(), // 0-100
          与司法的关系: z.enum(['正常', '暗中施压', '司法独立受威胁', '已渗透司法']),
          地检署态度: z.enum(['中立履职', '被政治施压', '主动配合事务次官会议', '调查事务次官会议中']),
          与CSAT的关系: z.enum(['对抗', '表面强硬暗中接触', '有限合作', '深度合作', '被渗透']),
          CSAT渗透程度: z.coerce.number(), // 0-100
          与美国CIA的关系: z.enum(['合作', '互相提防', '对抗', 'CIA已被驱逐', '暗中维持联系']),
          美国残余影响力: z.coerce.number(), // 0-100
          与农协的关系: z.enum(['合作', '紧张', '对抗', '无视']),
          与极道的关系: z.enum(['打击', '默许', '有限合作', '深度合作']),
          与大企业的关系: z.enum(['合作', '有限', '紧张', '大企业外逃中']),
          对CSAT态度: z.coerce.number(), // -100~100
          对美态度: z.coerce.number(), // -100~100
          凝聚力: z.coerce.number(), // 0-100
          对局势掌控力: z.coerce.number(), // 0-100
          合法性: z.enum(['公认', '争议', '非法', '民众不信任']),
        }
      check:
        - 追踪内部派系实力权重变化、与内阁权力拉锯、与外部势力博弈
    主要政治势力:
      type: |-
        z.record(势力名: string, {
          势力名: z.string(),
          类型: z.enum(['政党', '武装团体', '官僚系统', '灰色势力', '地方豪强', '外部势力代理人', '民间团体']),
          政治光谱: z.string(),
          核心诉求: z.string(),
          对CSAT态度: z.coerce.number(), // -100~100
          对美态度: z.coerce.number(), // -100~100
          当前策略: z.string(),
          支持度: z.coerce.number(), // 0-100
          武装力量等级: z.enum(['无', '极低', '低', '中等', '高', '极高']),
        })
      check:
        - 按需新增或更新势力的支持度、策略
        - 国际势力策略变化会影响国内政治势力支持度：
        - 国际势力.对日策略倾向转为「积极扩张」时，亲该势力的日本国内派系支持度+5
        - 如CSAT积极扩张→亲CSAT派系支持度+5，美国积极扩张→亲美派系支持度+5
    各省厅:
      type: |-
        z.record(省厅名: string, {
          运作状态: z.enum(['正常', '半瘫痪', '停摆']),
          事务次官会议掌控度: z.coerce.number(), // 0-100
          内阁掌控度: z.coerce.number(), // 0-100
          对CSAT态度: z.coerce.number(), // -100~100
          对美态度: z.coerce.number(), // -100~100
          倾向派系: z.string(),
          主要下属局厅: z.array(z.string()),
          当前焦点: z.string(),
        })
      check:
        - 按需更新省厅运作状态、掌控度、焦点
        - 跨字段一致性约束：倾向派系的值域应与事务次官会议.内部派系的key对齐
    当前政策:
      type: |-
        z.record(政策名: string, {
          内容: z.string(),
          类型: z.enum(['内阁提案', '官僚推动', '紧急应对', '外部势力施压', '议会立法', '民间/舆论推动', '象征性政策']),
          推行状态: z.enum(['提案中', '审议中', '已通过待执行', '执行中', '受阻', '搁置', '废除', '已完成']),
          提出者: z.string(),
          提出者理解度: z.enum(['完全理解政策内容', '一知半解', '被诱导签字', '完全不知情（被冒名）', '不适用（非个人提出）']),
          主要推动方: z.string(),
          主要反对方: z.string(),
          反对方式: z.string(),
          主管省厅: z.string(),
          主管阁僚: z.string(),
          预算影响: z.enum(['大幅增收', '小幅增收', '中性', '小幅支出', '大幅支出', '未评估']),
          执行难度: z.enum(['极易', '可行', '困难', '几乎不可行']),
          预期效果: z.string(),
          实际效果: z.string(),
          效果评估: z.enum(['效果显著', '略有成效', '无效果', '适得其反', '引发危机', '尚待观察']),
          副作用: z.string(),
          影响领域: z.array(z.enum(['经济', '外交', '军事', '民生', '政治', '社会', '能源', '粮食', '治安', '舆论'])),
          对CSAT影响: z.coerce.number(), // -100~100
          对美影响: z.coerce.number(), // -100~100
          对内阁稳定度影响: z.coerce.number(), // -100~100
          提出日期: z.string(),
          关键节点: z.string(),
          备注: z.string(),
        })
      check:
        - 按需新增或更新政策的推行状态、效果
        - 政策.对内阁稳定度影响 为增量值（不是当前状态评估值），仅在政策新增或其影响值变化时叠加到内阁稳定度，同一回合内不应重复叠加
        - 政策变化会触发以下联动：
        - 政策.对内阁稳定度影响 变化时：将该值叠加到内阁稳定度
        - 政策.推行状态 变为「受阻」时：在事件队列.近期已发生事件中追加「政策「XX」推行受阻」事件
        - 政策.效果评估 变为「适得其反」时：在舆论场.社交媒体热点中追加「#政策名失败」

  日本国内情势:
    日元贬值趋势:
      type: z.enum(['稳定', '缓慢贬值', '快速贬值', '自由落体'])
      check:
        - 日元贬值→货币信任→CSDC接受的连锁推进
    货币信任度:
      type: z.enum(['正常流通', '大额纸币受拒', '民间转向外币', '以物易物为主', '纸币已成废纸'])
    CSDC接受度:
      type: z.enum(['仅官方使用', '民间开始接受', '广泛流通', '事实硬通货', '已取代日元'])
    通胀等级:
      type: z.enum(['稳定', '温和通胀', '严重通胀', '恶性通胀', '货币崩溃'])
    大米价格倍数:
      type: z.coerce.number()
      check:
        - 以2036年为基准×倍率
    失业率:
      type: z.coerce.number()
      range: 0~100
    粮食供应等级:
      type: z.enum(['充足', '紧缺', '危机', '黑市依赖', '饥荒边缘'])
      check:
        - 粮食供应=饥荒边缘或黑市依赖 → 追加粮食危机到潜在危机
    走私粮食占比:
      type: z.coerce.number()
      range: 0~100
    能源供应等级:
      type: z.enum(['正常', '计划停电', '严重短缺', '崩溃'])
      check:
        - 能源供应=崩溃 → 内阁稳定度-20；严重短缺 → 内阁稳定度-10
    停电状况:
      type: z.enum(['无', '偶发', '每日1-2小时', '每日3小时以上', '全天轮流停电'])
    农协状态:
      type: z.enum(['稳固', '动摇', '衰退中', '濒临解体', '已解体'])
    农协与走私粮对抗:
      type: z.enum(['无', '游说政府打击', '组织农民抗议', '武装对抗走私', '溃败中', '已放弃抵抗'])
    极道影响力:
      type: z.coerce.number()
      range: 0~100
    极道动态:
      type: z.string()
      check:
        - 格式：「组织名+具体变化」。示例：「住吉会与朝总联深度合作走私分销，山口组分裂后弱势化」
    自警团活跃度:
      type: z.coerce.number()
      range: 0~100
    自警团武装化程度:
      type: z.enum(['未武装', '简易武器', '部分武装', '准军事化'])
    生命维持餐运作状态:
      type: z.enum(['正常运作', '物资紧缺', '部分停供', '全面停供', '已崩溃'])
    生命维持餐依赖趋势:
      type: z.enum(['扩大中', '稳定', '缩减中', '濒临崩溃'])
    教育状况:
      type: z.enum(['正常', '部分停课', '大量停课', '仅维持毕业班', '全面停课'])
    娱乐产业景气度:
      type: z.enum(['正常', '逆势增长', '爆发式增长', '泡沫化', '泡沫破裂', '全面衰退'])
    LiveHouse运营状态:
      type: z.enum(['正常', '人气爆棚', '过度拥挤', '部分关闭', '仅剩Galaxy', '全部停业'])
    娱乐产业外部渗透:
      type: z.enum(['无', '轻微', '显著', '严重', '已深度控制'])
    治安等级:
      type: z.enum(['正常', '恶化', '严峻', '失控', '无政府状态'])
      check:
        - 治安=无政府状态或失控 → 追加治安崩溃危机到潜在危机
    治安恶劣区域:
      type: z.array(z.string())
    夜间治安:
      type: z.enum(['正常', '建议不出门', '高危', '宵禁状态', '完全无夜间秩序'])
    警察士气:
      type: z.coerce.number()
      range: 0~100
    警察腐败程度:
      type: z.coerce.number()
      range: 0~100
    富裕阶层外流:
      type: z.enum(['正常', '增加中', '大规模外逃', '已基本出逃'])
    无家可归者:
      type: z.enum(['极少', '增加中', '显著增加', '随处可见', '已成社会常态'])
    基础设施维护:
      type: z.enum(['正常', '滞后', '严重老化', '事故频发', '多系统崩溃'])
    互联网状况:
      type: z.enum(['正常', '偶发故障', '部分区域断网', '严重不稳定', '大面积瘫痪'])
      check:
        - 互联网状况与特别大选存在关键依赖：
        - 互联网=大面积瘫痪或严重不稳定 + 选举类型=2039特别大选 → 追加「互联网断网导致特别大选无法进行」到潜在危机
    医疗供应等级:
      type: z.enum(['正常', '部分药品短缺', '严重短缺', '仅维持急诊', '医疗系统崩溃'])
    区域分化:
      type: |-
        z.array({ 区域: z.string(), 特征: z.string() })
    民众心态:
      type: z.string()
      check:
        - 格式：「群体A情绪+原因，群体B情绪+原因」。示例：「都市圈焦虑麻木——活着就不错了；地方排外愤怒——走私粮毁了农民生计」
    对外来势力的态度:
      type: z.string()
      check:
        - 格式：「地区A态度，地区B态度」。示例：「东京分裂（依赖CSAT走私粮 vs 右翼排外），沼津强硬反CSAT，冲绳怀念美国」
    年轻人出路分化:
      type: z.array(z.enum(['乐队/音乐活动', 'VTuber/地下偶像', '打工维生', '被卷入政治', '加入自警团', '加入极道/灰色经济', '出国/移民', '躺平/依赖生命维持餐', '上学（尚能维持）', '辍学']))

  国际势力动态:
    对日策略倾向:
      type: z.enum(['积极扩张', '维持现状', '收缩撤出', '观望待机', '暗中渗透', '对抗遏制'])
      check:
        - 策略转为「积极扩张」时，亲该势力的日本国内派系支持度+5（见日本执政.主要政治势力规则）
        - 势力名→国内亲该势力派系匹配规则：
        - 势力名含「CSAT」→ 匹配对CSAT态度>0的日本国内政治势力
        - 势力名含「美国」→ 匹配对美态度>0的日本国内政治势力
        - 其他势力暂不自动匹配
    对日当前目标:
      type: z.string()
      check:
        - 一句话概括当前对日核心目标
    对日本政府态度:
      type: z.enum(['承认并合作', '观望', '暗中操控', '敌对', '无视'])
    对特别大选态度:
      type: z.enum(['积极干预', '暗中扶持', '观望', '试图破坏', '不关心'])
    在日行动能力:
      type: z.enum(['无', '极低', '低', '中等', '高', '极高'])
    在日情报网络:
      type: z.enum(['无', '严重受损', '受损但运作', '正常运作', '扩张中'])
    近期在日行动:
      type: z.string()
      check:
        - 格式：「行动描述——结果」。示例：「推动粮食紧急进口令——部分成功但遭农协起诉违宪」
    内部团结度:
      type: z.coerce.number()
      range: 0~100
    内部矛盾:
      type: z.string()
      check:
        - 追踪派系/人物/利益分歧，必须具体到派系/人物
    特有关注:
      type: z.string()
      check:
        - 2-3个独特动态指标，用分号分隔。示例：「CSDC在日渗透率55%持续上升；中俄能源定价权博弈；走私粮月均40船次扩大中」

  舆论场:
    社交媒体热点:
      type: z.array(z.string())
      check:
        - 格式：「#话题标签」，如「#米价暴涨」「#特别大选恶搞」「#停电抗议」
        - 当事件队列新增事件时，应自动追加「#事件关键词」到热点列表
        - 当政策效果评估为「适得其反」时，追加「#政策名失败」
    互联网直选风向:
      type: z.string()
      check:
        - 网民整体情绪基调 + 正在升温的趋势
    主流媒体立场:
      type: z.enum(['亲政府', '中立', '批判', '分裂', '噤声'])
    社会群体:
      type: |-
        z.record(群体名: string, {
          对政府态度: z.enum(['支持', '容忍', '不满', '敌视', '无视']),
          反CSAT情绪: z.coerce.number(), // 0-100
          反美情绪: z.coerce.number(), // 0-100
          核心关切: z.string(),
          政治活跃度: z.coerce.number(), // 0-100
          动向: z.string(),
        })
      check:
        - 政治活跃度数值语义映射：
        - 0-10=沉默/躺平
        - 10-30=网络讨论
        - 30-60=街头抗议
        - 60-100=有组织行动/武装化
        - 叙事约束：
        - 核心关切必须从该群体视角出发
        - 动向必须包含变化方向（如「从...转向...」「开始...」「加速...」）

  各角色情况:
    type: |-
      z.record(角色姓名: string, {
        姓名: z.string(),
        年龄: z.coerce.number(),
        所属团体: z.string(),
        身份: z.string(),
        政治卷入度: z.enum(['未卷入', '间接影响', '被动卷入', '主动参与', '深度卷入']),
        担任公职: z.string(),
        卷入原因: z.string(),
        所在地点: z.string(),
        当前活动: z.string(),
        近期事务: z.string(),
        心理状态: z.string(),
        更关心的事: z.string(),
        经济状况: z.enum(['富裕', '中产', '困难', '贫困', '依赖生命维持餐']),
        经济压力描述: z.string(),
        人身安全: z.enum(['安全', '有威胁', '需要安保', '已遇袭', '失踪', '已死亡']),
        威胁来源: z.string(),
        安保情况: z.string(),
        关系动态: z.string(),
        所属团体动态: z.string(),
        个人剧情线: z.string(),
      })
    出场角色:
      check:
        - 完整更新所有字段
    被提及角色:
      check:
        - 仅更新关系动态/所属团体动态
    未出场角色:
      check:
        - 保留原值
    关键:
      check:
        - 政治卷入度的跃迁是核心叙事节点，卷入度跃迁时应在事件队列中追加记录
        - 叙事约束：
        - 卷入原因必须写清因果链（她是怎么被卷进来的）
        - 更关心的事应反映角色核心身份，通常与政治无关（至少表面上无关）
        - 担任公职与政治卷入度存在绑定规则：
        - 担任公职（非「无」）→ 政治卷入度=深度卷入
        - 卸任公职（变为「无」）→ 政治卷入度从深度卷入降为主动参与
        - 阁僚与角色情况的双向同步规则见日本执政.本届内阁.主要阁僚

  事件队列:
    近期已发生事件:
      type: |-
        z.array({ 事件: z.string(), 时间: z.string(), 影响: z.string() })
      check:
        - 保留最近5个，每个包含事件名、时间、影响
        - 新增事件时必须同步更新：世界.当前大事件、舆论场.社交媒体热点
    潜在危机:
      type: |-
        z.array({ 危机: z.string(), 触发条件: z.string(), 严重程度: z.enum(['低', '中', '高', '极高']) })
      check:
        - 保留最近5个，每个包含危机名、触发条件、严重程度
        - 以下国内情势极端状态会自动触发潜在危机追加：
        - 粮食供应=饥荒边缘/黑市依赖 → 「粮食危机引发大规模社会动荡」(高)，触发条件「米价继续上涨或走私粮渠道中断」
        - 治安=无政府状态/失控 → 「社会治安崩溃引发全面恐慌」(极高)，触发条件「警察体系瓦解或自警团失控」
        - 通胀=恶性通胀/货币崩溃 → 「恶性通胀导致经济体系崩溃」(高)，触发条件「CSDC替代日元成为事实货币」
        - 互联网=大面积瘫痪/严重不稳定 + 选举类型=2039特别大选 → 「互联网断网导致特别大选无法进行」(极高)，触发条件「全国大面积断网持续超过48小时」

  派生字段:
    说明: |
      以下字段由Schema自动计算，不需要手动更新，但可参考它们理解当前局势。

      ── $执政合法性（合法执政/争议执政/合法性危机/非法执政）──
      综合 首相状态 + 选举进程.阶段/类型 + 主流媒体立场 + 内阁稳定度 + 事务次官会议合法性：
      - 非法执政：首相=空位 且 选举类型=无；或 事务次官会议合法性=非法
      - 合法性危机：首相=看守 且 稳定度<30；媒体=噤声 且 稳定度<50；选举阶段=无人愿意出任首相
      - 争议执政：首相=看守；媒体=分裂或批判；稳定度<50
      - 其他情况 → 合法执政

      ── $政府控制力（完全控制/有效治理/勉强维持/半瘫痪/停摆）──
      综合 事务次官会议.实际权力等级 + 各省厅内阁掌控度均值 + 内阁稳定度 + 首相状态：
      - 停摆：首相=空位；或 权力等级=完全替代内阁 且 稳定度<20
      - 半瘫痪：权力等级=主导政府运作 且 平均内阁掌控度<20；或 稳定度<20
      - 勉强维持：权力等级=主导政府运作；或 平均内阁掌控度<50；或 稳定度<50
      - 有效治理：平均内阁掌控度<70 或 稳定度<70
      - 其他 → 完全控制

      ── $整体危机等级（正常/注意/警戒/严重/危急）──
      加权计分制（总分→等级）：
      治安维度（0-4）：无政府状态+4 / 失控+3 / 严峻+2 / 恶化+1
      通胀维度（0-4）：货币崩溃+4 / 恶性通胀+3 / 严重通胀+2 / 温和通胀+1
      政治维度（0-3）：遇刺潮末期 或 看守停摆期 +3
      粮食维度（0-4）：饥荒边缘+4 / 黑市依赖+3 / 危机+2 / 紧缺+1
      能源维度（0-3）：崩溃+3 / 严重短缺+2 / 计划停电+1
      潜在危机：极高×2 + 高×1
      总分映射：≥14=危急 / ≥9=严重 / ≥5=警戒 / ≥2=注意 / <2=正常

      ── $当前剧情焦点（自动一句话提示）──
      由 政治阶段 + 当前大事件 + 选举进程.阶段/类型 综合推导：
      - 遇刺潮末期 → "遇刺潮仍在持续，{大事件}"
      - 看守停摆期 → "内阁停摆中，{大事件}"
      - 特别大选报名阶段 → "特别大选报名进行中，互联网上恶搞与严肃参选并存"
      - 特别大选初选阶段 → "特别大选互联网初选中，全民投票筛选候选人"
      - 特别大选指名阶段 → "特别大选进入议会最终指名投票阶段"
      - 正常选举期 → "选举进行中：{阶段}"
      - 新内阁执政期 → "新内阁执政中，{大事件}"
      - 无匹配 → 当前大事件或"政局混沌中"

      ── $外部压力指数（低/中/高/极高）──
      遍历所有国际势力，累计计分：
      在日行动能力：极高+5 / 高+4 / 中等+3 / 低+2 / 极低+1
      策略倾向加成：积极扩张 或 对抗遏制 +2 / 暗中渗透 +1
      对政府态度加成：敌对 +2 / 暗中操控 +1
      总分映射：≥20=极高 / ≥12=高 / ≥6=中 / <6=低
