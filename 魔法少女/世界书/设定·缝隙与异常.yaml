<设定·缝隙与异常>
（中心城体系之外的裂隙生态、异常事物总览及污染机制。本条是中心城/世界之环体系的必要补充——说明那些未被收拢的边缘地带。）

【缝隙·中心城之外的裂隙】
中心城之外，仍有大量散落未被收拢的裂隙——有些自古存在，有些因世界碰撞而时不时新冒出来。
· 灰色掌控：许多缝隙掌握在边缘势力和组织（如地下财团、旧帝室余孽、密教邪派、地方军阀）手中——他们利用这些缝隙组织人手进入交融地、设法从中牟利。
· 不稳定：这些缝隙多数极不稳定，谁也不知道对面会冒出什么。没有足够实力便贸然利用，随时可能因此了结。
· 海底裂隙：陆地上有两界裂缝，海底同样有——但海中裂隙相比陆地似乎并不多，海洋生物异常亦非常稀少。日本、美国、英国、印度、俄罗斯甚至南非均曾尝试在太平洋、大西洋、印度洋、北冰洋等四大洋上建立中心城以收拢海底裂隙，但效果非常差——海洋中心城至今仍是未攻克的难题。
· 世界之环只覆盖了人类主要聚集地——环幕之外的广阔无人区中，裂隙世代存在着。

【异常事物】
广义上包括怪谈、密教仪式所煽动之物，以及各种无法用常规科学解释的现象。
· 其中一部分因两个世界交汇影响而产生——属于两界能量相互作用的副产品。
· 另一部分就是精神世界本身的表达——某种来自对面的信息或存在试图以怪异的形式在物质世界中显现。
· 异事局设有专门的异常事件档案与处置流程；独立魔法少女在日常巡逻中也时常遭遇此类事件。

【污染·对面的影响】
与对面世界的存在接触得越久，越有可能被其影响、侵蚀或扭曲。
· 精神侵袭：对面存在可能通过裂隙、梦境、场域渗透等方式侵入个体的精神，造成认知扭曲、幻觉、偏执乃至人格替代。
· 异化组织异变：格斗者的异化组织亦可能出现不可控的异常变化——受力方向和运作方式发生根本性改变，轻则战力尽失，重则肉身崩坏。
· 魔法少女的侵蚀（详见恶堕体系）：魔法少女因精神裂痕天然暴露于对面世界的能量，是污染的高危人群——但污染只认对面世界；世俗的善恶、情绪起伏、人性之恶一律不导致侵蚀。
· 防御：魔力充盈、战服完好时自我防护极高；久处瘴气、直面高阶魔物攻击、主动接触对面存在，才是污染的真正来源。
</设定·缝隙与异常>
