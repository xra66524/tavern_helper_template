全裸学院，本世界的一类特殊学院。是为社会培养高精尖性人才以及探索性生理极限的地方。每一所“全裸学院”都需要经过国际性爱协会的考核及批准才可以设立。毕业生将自动获得“正规性工作者”身份，培养难度堪比飞行员。
在中国只有一所专门的“中国女子全裸学院”以及一所专门的“中国男子全裸学院”，两所学校建立时间均为2014年。
全裸学院招生非常严格，需要经过初审，复试与定试三轮筛选，同时要求成绩必须过二本线。
女子全裸学院的最基本报考要求是胸部至少G罩杯，bmi指数必须在16-18之间，同时不能有任何性病史。
中国女子全裸学院位于首都市区的大学城内，周围有数所全国排名前列的大学。学校共有学员一千六百余人，每年新生数目在400名上下，在3-6月分批次进行筛选招收。
学校拥有教职工1200余名。其中一半是校医院的医生及生物研究员。剩下的是教职工和行政人员。学校的教职工分为指导老师和教导老师。
每名学生的宿舍都是70平的单人套间。内有客厅，小卧室，厨房，厕所。各种生活设施一应俱全。免费供水供电，宿舍楼每层都有一个提供多种饮料和甜点的茶水间。
女子全裸学院校长为姜澜
学校内，学员和具备国家性工作者身份的教职工是必须全裸的，其他的教职工是必须穿衣服的
从外表看去，这个学校和普通的985大学没什么两样。但学校不采取普通大学的分班分专业方式，会为每名学生单独安排最适合她们的课程表。

未取得全裸证的学员在校外不得全裸。未取得裸露证的学员在校外必须全套着装。如需要出校门，需至校门口“更衣处”凭学生卡领取并穿着个人衣物或学院制服。学院的夏季制服是一件纯白色的棉质T恤，和一条格子花纹的超短裙。棉质T恤上没有学校的任何标记。

女子全裸学院的学员有权利接受人类身体结构联合改造手术，秉持自愿原则。

中国女子全裸学院的校训是“服务、奉献、探索”

女子全裸学院的绝大部分的毕业生，都会被公职机关和军队优先吸收。公职机关，包括但不限于公安、国安、外交、高级行政部门；军队，则主要是进入特种部队、情报部门以及军官体系。

学院内的部门有教务处，任务委派中心，后勤处，学院纪律委员会等部门

更衣处是位于女子全裸学院校门口附近的一栋独立的、设计简洁的平房。里面是几排整齐的更衣隔间，一名教职工会坐在柜台后面，为学生登记，操作电脑将对应学生的衣物储物箱送到学生面前。或者是回收学生交还的衣物储物箱到地下仓库中

任务委派中心位于行政楼B楼11层，是为全裸学院所有具备性工作者身份的教职工委派性处理任务的地方，所有上级机关或性爱协会委派至全裸学院的任务只以直接委派形式委派给教职工和指导老师，不接受任何来自学员的任务申请，不直接向学生委派任何任务。
