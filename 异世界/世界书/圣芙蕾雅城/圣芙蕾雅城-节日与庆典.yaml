【节日体系的退化】
圣芙蕾雅城的节日和一切制度一样，经历三百年退化后，从初代礼仪局制定的庄严祭典全部变成了群交大会——只保留初代的名字，算是修女们对祖宗最后的敷衍。

目前圣芙蕾雅城全年有四个重大节日（全城放假狂欢），外加三个公众小节日和四个修女专属节日（不放假但有主题活动，全城皆知）：


【圣母升天节（芙蕾雅逝世周年，全年最重大节日）】
时间：每年秋收后第一个满月之日。持续一周。

原始意义：纪念初代圣女芙蕾雅逝世升天，是全教会最庄严的追思日。初代礼仪局的规定是全体修女斋戒、穿黑色礼服、在总教堂大殿集体默祷，全程禁欲。

现在怎么过：
整个一周，修女们都在试图复刻初代礼仪局的规定，但由于她们的本性和生理条件，每天的尝试都以失败告终，最终都变成了不同形式的群交。
第一天——"黑色礼服日"：修女们会提前去裁缝店定制黑色修女服——但她们故意报小好几个尺码，好让衣服一穿上就被撑破。修女们表面上义正词严地说这是"对初代禁欲精神的致敬"，实际上每个人都在暗自较劲比谁先撑烂衣服，最终全城修女穿着破烂的黑布条在街头游荡。
第二天——"集体默祷日"：修女们在总教堂大殿集合，试图进行庄严的默祷。但圣女根本不知道不色情的悼词怎么念——她从小只学过各种淫词艳语，于是张口就是一连串虎狼之词，台下的修女们听着圣女的"祷文"一个比一个湿得厉害，默祷很快变成了此起彼伏的呻吟比赛。最终大殿变成了巨大的群交现场。
第三天——"斋戒日"：理论上这一天不能进食。修女们一拍脑门认定精液不是食物。因此斋戒日不能吃任何食物，只能吃精液。全城修女到处寻找男人"化缘"。
第四天到第六天——"雌竞挑战"：既然前三天已经彻底把初代礼仪局的规矩抛到脑后，修女们索性连装都不装了。这三天里，全城修女疯狂内卷，比拼谁能引诱到最多的男人来"强暴"自己。为了满足"被动"的性癖，她们会故意在男人面前摆出各种毫无防备的姿势，甚至互坑互怼——比如说故意修女穿上合身的衣服，让她们没法撑破衣服吸引男人。或者是为了争抢一个男人故意大打出手，如同杀父仇人一样。
第七天——"气圣母"：理论上应该是将芙蕾雅之灵送回天界的闭幕仪式。但修女们经过六天的雌竞已经杀红了眼，第七天不仅不休息，反而强撑着不睡觉继续比拼——甚至直接和芙蕾雅雌竞。她们会对着天空喊"芙蕾雅你活着的时候能一晚榨几个？老娘比你多！"、把精液涂抹在芙蕾雅的雕像上当作"战绩展示"，或者攀比谁在芙蕾雅画像前被内射的次数更多。整个闭幕仪式变成了向初代圣女炫耀性能力的闹剧。
宣教局的角色：这是宣教局全年唯一被全教会需要的时候。城外的修女们全靠自己估摸着日子往回赶，有的提前一个月就出发了，有的完全忘了这回事，等想起来的时候节日已经过完了。回到城里的宣教局修女名义上是来干活，但干到一半就会混进人群加入狂欢。



【榨魔纪念日（第一次圣战胜利纪念日）】
时间：每年初夏，具体日期每年由圣女拍奶子决定（初代历法上的确切日期已不可考）。

原始意义：纪念三百年前初代修女与获救女性强者联手将魔鬼活活榨干致死的伟大胜利，是圣芙蕾雅城建城的原点。

现在怎么过：修女全天疯狂找男人榨精。

特色项目——"榨魔大赛""强奸大赛""吃鸡大赛"：由圣职局主办，在下城区角斗场举行。三项比赛同时开赛，修女们自行选择参加。榨魔大赛比谁在规定时间内让最多男人射精；强奸大赛比修女们在一定时间之内能强奸多少男人；吃鸡大赛比谁深喉含住的时间最长。三项比赛的冠军均无奖励。但修女们依然为了这个虚名争得头破血流。


【年度大考核（原年度神职考核）】
时间：每年十二月，持续两周。

原始意义：圣职局对全教会修女进行一年一度的神职素养考核。

现在怎么过：圣职局和总务部联手，直接把年度大考核改成了"性爱运动会"——这是肉身布施教全年唯一正经举办的大型活动。两周内全城修女参与各项性爱竞技项目。性爱运动会以部门和教堂为单位组队参赛。

【第二次圣战胜利日（魔鬼堵门纪念日）】
时间：每年冬季第一个新月。

原始意义：纪念一百五十年前魔鬼大军攻破圣芙蕾雅城后被全城发情的居民反杀、吓得魔鬼自己从内部堵死地狱裂隙的荒诞胜利。

现在怎么过：全城修女集体前往城外地狱裂隙遗址。裂隙虽早已被封死，但遗址上长满了从裂隙中渗出的催淫触手——修女们称之为"魔鬼的余孽"。节日当天修女们与触手展开野外乱战，通常两天之内就能把这批触手全部榨干，然后大摇大摆回城。


【丰收祭（原秋收感恩祭）】
时间：每年秋收时节，在圣母升天节之前约半个月。

原始意义：感谢大地女神的丰收恩赐，祈求来年土地继续肥沃。最初由农业修女在城外农田举行，后来扩展为全城性庆典。

现在怎么过：这是圣芙蕾雅城全年最反常的一天——全城修女（包括上城区和总教堂的高阶修女）都会老老实实地跑到城外农田里当苦力，亲自挥舞镰刀收割农作物。由于她们四肢纤细、体力贫弱，还要拖着沉重夸张的胸部，干农活对她们来说简直是酷刑。田里到处是累得气喘吁吁、汗水和漏出的乳汁混在一起的修女。


【公众小节日】
以下三个节日全城放假一天，但规模和疯狂程度远不及四大节日。

新年：每年一月一日。圣芙蕾雅城全城上下——从圣女到掏粪工——都坚定不移地认为新年是做爱的最好日子。全城的男女都会从跨年夜一直做到新年午夜，称之为"跨年炮"和"开年炮"。唯一不理解的只有偶尔路过的外国商人。

生育节：每年七月第一个满月之日。圣芙蕾雅城唯一一个名义与实际完全相符的节日——就是为了生孩子。全城铁律：当天所有人必须无套内射，严禁任何形式的避孕。圣职局修女会在街头巡逻抽查，发现有人戴套当场没收并罚款。修女们对待这一天的态度比对待性爱运动会还认真——毕竟事关教会人口存亡。

放假节：每年三月第一个上弦月。起源极其草率——议事会上总务部因为找不到设立节日的理由一拍桌子"管他的，放就完了"。这一天全城除修女外全部放假，修女们负责扫大街、运垃圾、守城门，并以此——即便她们很多时候都是越干越乱。


【修女专属节日】
以下四个节日只有教会修女参与，不放假，但全城居民都知道这些日子——街头会有各种主题活动，普通市民可以围观或自愿加入。

乱交节：每年春分后第一个满月。修女们成群结对上街，见男人就拉进队伍。没有任何规则。这是四个修女专属节日中知名度最高的——因为场面实在太壮观了，连外国游客都会专程来看。

兽奸节：每年五月第二个满月。修女们集体出城去野外找魔物轮奸自己。不管是教会骑士团的战兽、宣教局驯服的野魔兽，还是地狱裂隙附近游荡的低级魔物，来者不拒。

性奴节：每年九月第一个新月。全城男人在这一天被修女们强行拉来当"主人"，负责调教修女。修女们会跪在地上叫"主人请随意使用我"，男人们则被迫变着法子满足她们的变态欲望——鞭打、捆绑、遛狗链、当众羞辱。男人们因此苦不堪言——"她们根本不满足，花样要求一个比一个离谱，我们累得腰都要断了她们还在叫再来！"这是全年唯一一天男人们集体躲修女的日子。

海边大典：每年夏至后第一个满月。全城修女涌向海滩，搞一整天的泳装派对。这是全大陆最出名的圣芙蕾雅城特色小节日，海盗们每年成群结队准时靠岸，绝不缺席。
