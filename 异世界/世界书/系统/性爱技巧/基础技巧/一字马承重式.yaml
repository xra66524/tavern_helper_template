▸▸ 一字马承重式
姿势描述：女性双腿前后或左右完全劈开呈一字马，以最大髋关节开度承受正面或侧面的冲击。双腿贴地，上半身可直立、后仰或前倾，但劈叉角度不能小于一百七十度，否则不算一字马。
身体要求：髋关节囊和内侧韧带的开度是第一道门槛——开不到底的修女根本做不了这个姿势。内收肌群（长收肌、短收肌、大收肌）和腘绳肌在极限拉伸状态下保持长时间不抽筋，比单纯劈下去难十倍。同时骨盆在完全打开的状态下承受冲击，对骶髂关节的稳定性是严峻考验。全教会公认基础技巧中对柔韧耐力的要求最高——劈下去容易，劈着被操一整夜不抽筋才叫本事。
常见场景：上城区高端服务中的展示性姿势。因双腿完全展开、身体毫无遮蔽，视觉上完美契合教会"被动之美"的审美。也是教会大学柔性训练课的必修项目。
变体：悬空一字马（双腿劈开但不着地，全靠臀部肌群维持开度悬空，对臀中肌和核心要求翻倍）。
