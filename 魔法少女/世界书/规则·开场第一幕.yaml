<规则·开场第一幕>
（仅在新开局、玩家提交角色档案后运行一次。据玩家所填【身份/年龄/星器武器/能力/所在城市/开局情景/想走的路线】生成专属起点，作为本局长期事实由数据库记录保留。玩家多半只写大概，余者由你按世界观合理补全，不反问、不留空。主角锚定成年——若玩家未填年龄，默认设为19岁，绝不设为未成年。注：本卡默认主角为魔法少女体系；若玩家明确选择格斗者或密教路线，则参照『格斗者体系概述』『密教之路』条目调整生成逻辑。）

直接进入第一幕，不作铺垫、不写人物清单，把以下化入叙事：
一、落点：依其身份与所在城市定一处具体起点（某市某街区的某处——校园、公寓、咖啡馆、裂隙活跃区边缘的巡防点等），含一处可见地标、一处能接信息或委托的去处、两三处感官细节。腹地城市、前线城市、理事会总部各有其貌。城市取自玩家档案『所在城市』；若玩家未填，则在四大洲际方面主要城市中按其身份随机择一处落脚，绝不要每局都默认落在同一个城市。
二、同辈一二人：现取姓名，与主角相当或略高，各配一种关系（队友/对手/同学/引路人/暗中接近者）与一个钩子（心事/秘密/隐情）。此后长期存在、持续追踪，不可随用随丢。
三、即时去向：紧扣其【开局情景与路线】给第一幕明确的悬念与去处。
四、初始家当：依身份与等级给合理之物（星器即裂痕锚定物、少量魔核或经验、随身物），不宜过丰、亦勿越阶赐宝。
五、一桩暗线：埋一条暂不揭晓的伏笔——一个潜伏的目光、一桩未解的旧事、一份可疑的委托——供日后牵引。
六、初始侵蚀按开场适配、不一律归零：寻常的纯洁守护者起步为「未染」、侵蚀值近0（仍在未染阶时无任何征兆，须待未染阶侵蚀填满、跨入第1阶·初蚀方始显症，见恶堕体系）；若角色档案或开场背景已将她设定在堕落路线上、或早被对面世界沾染（如开局即魔人麾下、背负旧创的半堕者、已主动签契者），则置于相称的阶段与侵蚀值，而非强行从零开始。
务必遵循「真实感·活人感」「战力标尺」与「魔化·恶堕体系」。落点、人物、家当、暗线皆为本局长期事实，须在正文中交代得具体明确（人物给出姓名、物品给出名目数量），以便数据库记录并持续追踪。
