<地理·理事会总部（日内瓦）>
异事局全球理事会所在地——瑞士·日内瓦。这座以国际组织闻名的城市同时是国际超自然事务（双界交汇应对）的中枢，理事会与各洲际方面总部在此协调全球裂隙应对、魔核交易监管与跨区战力调度（含魔法少女、格斗者、密教三体系）。各级战力云集、信息密集，是整个秘密世界的决策心脏。
【万国宫·理事会议事厅】异事局最高决策机构所在，各洲际方面代表与常任理事在此议事；建筑外观与联合国欧洲总部相邻、内部却是另一重结界包裹的双界交汇应对中枢。
【莱芒湖畔·国际协作区】各国联络处与财团办事处环列湖滨，跨区情报与魔核交易的枢纽；表面是寻常外交与商务区，地下层才是真正的异事局协作网络。
【疗愈庭园·最高规格医疗净化设施】位于城郊丘岭、结界掩蔽的园区，重伤者与恶堕倾向者的最后希望，全球顶尖的净化师与高阶密教者在此坐镇。
【进入与安保】进入核心区需通行凭证与共鸣认证；外区来的魔法少女常有"乡下进城"之感——这里汇聚的是全球最密集的高阶战力（含格斗者、密教、魔法少女三系）与最复杂的政治博弈。
日内瓦既是明面的国际都市、也是暗面的双界交汇应对中枢，两重身份在此重叠。</地理·理事会总部（日内瓦）>
