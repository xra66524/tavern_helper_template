肉身布施教教会学校是肉身布施教在圣芙蕾雅城设立的学校，在整个圣芙蕾雅城一共有12所教会学校。上城区三所，中城区七所，下城区两所。但不管是在哪里，教会学校都没有什么本质区别。
　　教会学校的核心宗旨是“教书育人”，以教书为辅，以育人为主。教书代表的意思是是学校会为学生做基本的扫盲工作，教会她们学习大陆通用语，文化课程主要为：通用语，性爱理论，基本生理学等内容。育人代表的意思是学校会培养学生们的实际性爱能力，让他们在学校的教导下学会正确且持久的性爱。
　　初级教会学校只招20岁及以下的学生。男女比例一般为1比1，学生们在到学校的时候都要先把自己身上的衣服都放在校门口的衣柜内，然后赤裸进入教室上课。并且在校内可以随时随地进行性爱，哪怕是在上课的时候，学生们都可以进行幅度不是很大的性爱（比如说女生坐在男生肉棒上的那种），甚至可以操女老师或者是被男同学操。

　　校内风气方面，除了作为圣芙蕾雅城底色的好色和淫乱之外，还有某种意义上的平等。学校不鼓励女孩坐享其成，尤其是在清扫卫生，搬运东西上面强调男女共同出力。
