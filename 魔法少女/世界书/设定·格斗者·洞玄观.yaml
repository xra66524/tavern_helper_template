<设定·格斗者·洞玄观>
（第四限度第三层次，对应魔法少女传奇(Lv.61~70)——魔法少女体系的硬上限。格斗者在这里碾压一切同阶魔法少女。适用于角色处于洞玄观阶段的剧情场景。）
【洞玄观·第四限度第三层次】
· 定位：洞玄观对应魔法少女体系中的传奇(Lv.61~70)——这是魔法少女所能达到的最高等级。但在洞玄观强者面前，传奇级魔法少女处于全方面劣势：无论肉身强度、续航能力、生命力顽强程度还是攻击手段的多样性，洞玄观格斗家都形成碾压。魔法少女的体系上限在此刻暴露无遗。
· 侵染的抗性：到了洞玄观层次，精神世界的侵染威胁已大大降低。真形不灭的本质使得格斗家每一丝血肉都贯穿着自身意志——外染难以在其体内扎根，即便被侵入也可通过"活字诀"将染污的组织剥离再生。洞玄观格斗家可以相对深入地进入精神世界，在环幕外侧猎杀妖魔、获取珍材——这正是他们冲击第五限度的必经之路。当然，"大大降低"不等于"绝对免疫"——与第五限度上层力量不同，洞玄观仍需保持警惕。
· 真形不灭：依托长生观基础，将格斗家本就极其强大的生命力彻底激发，由里到外完成全新蜕变。即便被分尸数段，每一段仍保持强大活性——重续便可立即恢复完整。到了此境，自我在世界上存在的强度达前所未有的境地。与对面世界建立牵连，获得源源不断的能量。每一部分都是自我：异之相被打散只剩一小部分也能长回；神之相些许神气留存便可再度复原。
· 突破关隘："寂真识抄，打破玄机"。长生观更侧重精神，洞玄观更偏重肉身。人之相因为两者兼顾，需在短时间内连破精神和肉身两道关隘（不这么做后续会出现诸多问题），所耗资源数倍于常人。
· 修行·"活"字诀：气活、血活、身活，乃至每一丝每一缕异化组织都活起来——让自身意志与生命印记贯穿入每一丝异化组织。完成后每一丝异化组织都能吸收对面世界的能量，积攒并爆发更强横的力量。即便只剩部分残缺肢体也能重新长回。三种修行路数：先散后整（先部分肢体开始融合）；先内脏气息后筋骨皮肉；整体熔合（"浑一真形"，难度最高但等于提前获得部分洞玄观之力，遭遇重创只要这部分保留就能迅速复原）。
· 释藏→解相：释藏——异化组织全部潜力释放，常态即过去全力释放的状态，能放能收能养，循环壮大异化组织。解相——灵相解脱原先限制，变得更为适应肉身，吞噬能量和抵御异化的能力大幅提升。
· 灵相规模：体型越大持力越强，五十丈以上称"法相"。人之相洞玄观的灵相约八十至一百米。到洞玄观极致后灵相大小不影响实力。最终技巧"人相相合"——灵相与人身融合为一，瞬间战力翻倍。

【洞玄观→第五限度·突破之路】
洞玄观格斗家若想再往上走、冲击第五限度抱元一，必须直面天外妖魔——这是避不开的。突破通常需具备三个外部条件：遗落物、珍材、场所（仙庐）。
· 遗落物：两天相交而成，代表着"阴阳之变"。至少需要一件一级遗落物作为蜕变的引子，但更要看是否契合自身。高等遗落物极度珍惜、极难寻找。
· 珍材（天外精粹·魔核的上位产物）：仅从S级魔物（格斗者称"妖魔"）身上产出——且绝非随便哪头S级妖魔就能产出高质量珍材。魔核是能量结晶（可炼化升级），珍材则是妖魔体内凝聚的"天外精粹"（外神之性），是突破第五限度的核心引子。获取有严苛要求：必须亲手独立击杀妖魔，因为对战一开始就是场域交融，若他人的场域和精神浸入其中，掺入的"杂质"将融合一体、根本不可能去除。有些实力强横的格斗家可能需要不止一种妖魔的珍材。
· 场所/仙庐：代表"护身之命"，在精神世界特定地点更易突破。但并非必须——人之相需要珍材与仙庐两者兼备，少一个便会"神身轻重失衡"；神之相重珍材、异之相重仙庐。然而这些缺陷可能在突破格斗家时就已种下，后面只能修修补补。
· 最后关隘：突破时格斗家以自身场域为护持，但外力逼压会使场域持续变厚。若力量停止提升却未及时离开，可能被自己的场域永久包裹、再不得出。</设定·格斗者·洞玄观>
