<设定·地理与城市>
平行现实地球。约1985年起，人类社会以中心城为核心建立了世界之环（环幕）防御体系——各中心城即环幕的节点，各洲际方面即环幕的区域划分。裂隙活跃区密集处对应环幕承受正面压力的前线地带，远离者则为腹地区域。详见《设定·世界之环与中心城》。
【四大洲际方面·环幕节点区域】以下四大方面界定了环幕的主要覆盖范围，也是对玩家可选的初始出生区域。每方面均有若干中心城作为环幕节点+大型场域生物驻守：
· 东亚·太平洋方面：环幕东亚段密度最高的区域。水乡富庶、商贸繁华（腹地东京/上海/首尔，前沿环幕节点城市）。适合新手开局。
· 东南亚·大洋洲方面：环幕面临裂隙带宽，湿热繁盛、鱼龙混杂、灰产发达（腹地新加坡/曼谷/悉尼，前沿节点城市）。适合灰产/独立路线开局。
· 欧洲·非洲方面：苍茫边塞、资源富集、环幕防线较为稀疏（腹地伦敦/巴黎/伊斯坦布尔，前沿节点城市）。适合高阶战力/组织路线。
· 美洲方面：极寒苦地与温带并存、战事频度不一（腹地纽约/多伦多/圣保罗，前沿节点城市）。各色设定均可兼容。
【城市分级·按距环幕前沿距离】城市不再以「四大洲际方面」的细览划分（相关地理细览已整合精简），而是基于距环幕前沿的远近分为两档：
· 腹地城市：远离环幕正面压力，裂隙压力低，主力是异事局分局正式小队+独立魔法少女。省会和计划单列市通常为中心城，配有大型场域生物——但腹地中心城的环幕段承压较小，驻防节奏相对平缓。
· 前线城市：靠近高活跃裂隙带（即环幕承受正面冲击的区域），设魔法学院与历练场，战事频繁、轮换密集，驻防战力更强。环幕节点在此段承受最大压力。
· 理事会总部设于瑞士日内瓦，是环幕系统的全球调度中枢，各级战力云集。详见《地理·理事会总部（日内瓦）》。
【交融地·环幕的外侧】从裂隙深处可抵达两界交汇的广袤中间地带——世界之环即位于交融地深处靠近精神世界一侧。交融地环境恶劣、万物皆可能活化，详见《设定·交融地》及《设定·世界之环与中心城》。
【大轰撞倒计时】当前各城市（无论腹地还是前线）均处于2028-2030大轰撞的倒计时阴影下。腹地并非安全区——环幕一破，全域同时沦陷。前线城市的紧迫感更强（日常直面裂隙压力），但腹地同样在争分夺秒地建设加强中。这一倒计时是贯穿所有地理设定的底色。
【街区与地点】各城均细分街区。若主角所在城市未在细览中列出，头几幕内应先为它定下 3~5 个契合气质的具名街区，作为该城骨架。街区内具体地点——学校、分局、医院、店铺、车站、公寓等——按街区定位即兴创设。所在区域一律写成「城市·街区」（如 东京·新宿、上海·静安寺），状态栏街区地图据此自动排布。城市名与细节可自由延展，不必困在一城。
