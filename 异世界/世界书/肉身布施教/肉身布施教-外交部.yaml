【部门定位】
正式名称：外交部。类型：六部之一。所在地点：无固定办公室，城内据点位于总教堂二层（长期蹭总务部办公室）。

【负责人】
姓名：梅琳达。职位：修女长。罩杯：T罩杯。
上位方式：原为港口帮外国水手搬货的普通女孩，被前任外交部修女长以"去外国卖淫能天天被不同的男人操"忽悠入教。后发现只有修女长才能名正言顺长期赖在国外不回城，于是死皮赖脸主动出击，当上了外交部修女长。

【团队画像】
胸围范围：K～O罩杯（总教堂核心层标准）。人数：约百余人，绝大部分常驻国外，城内留守不到十人。
体型特征：底子与其他总教堂修女一致——皮肤苍白近乎透明可见血管，四肢纤细，肌肉极少。
性格共性：全员异国风情痴迷者。对圣芙蕾雅城本地男人已经腻了，脑子里一半装的是"下一站去哪个国家"，另一半装的是"那个国家的男人鸡巴长什么样"。同时全员继承了梅琳达的宠男无底线——收钱是顺便的，被操才是正经事。

【理论职责】
负责肉身布施教的对外交往事务，代表教会与周边国家建立外交关系，维护圣芙蕾雅城的外部利益。

【实际做的事】
全教会唯一能带来外部收入的部门。修女们去周边国家与城市卖淫以获取资金。所得资金由对应国家直接护送至圣芙蕾雅城，再由外交部的修女放入财务部金库。本质上是用身体做外贸——至于"外交"两个字原本是什么意思，没人关心也没人记得。

【办公方式】
办公环境：无固定办公室。绝大部分修女常年驻扎在周边国家当妓女，城内仅少数留守人员，日常在总务部办公室蹭吃蹭住。
文件与记录：不存在任何文件。外交部的工作成果只有两种形态——金币和精液。金币送去财务部，精液留在修女体内。没有任何人想过要记录"上个月赚了多少、去了哪些国家"。
信息传递与汇报：绝大部分修女分散在国外，信息传递完全中断。回城的修女在总务部办公室碰到谁就跟谁说两句，说完就算汇报过了。

【管理风格：旅行团式自治】
外交部以"闺蜜旅行团"模式运转，具体制度性行为如下：
一、集体议决目的地。部门从不发布正式指令。每次出国前，在城修女聚集于总务部办公室，口头商量"这次去哪个国家"。少数服从多数，定下大致方向后自行组队出发。
二、收入均分制。卖淫所得由当次出行的修女自行平分，不设业绩考核，不向上交提成。
三、自发结队出勤。修女自行结伴、自定路线、自选目的地，口头相传即为全部行前准备——"听说北边那个国家的骑士特别主动"，当天就有一队人出发。
四、归国即休假期。修女从国外回城后，唯一义务是交金入库。此后进入无限期休息状态，直到自己想再次出国。
五、亏空均摊制。因部门整体存在向外国男人倒贴的惯性，亏空是常态。填补亏空的制度性做法是修女们想办法再多卖一些淫把倒贴的钱挣回来。

【部门特有文化】
异国集邮文化：外交部修女全员痴迷于收集不同国家、不同种族男人的精液，宛如集邮俱乐部。修女们私下交流时互相比较"你集了多少个国家了"，部门内部有非正式的"集邮排行榜"。
驻外本位文化：全教会唯一将"在国外"视为默认状态的部门。其他部门修女以总教堂为家，外交部修女以整片大陆为家。回圣芙蕾雅城反而是临时休整——蹭总务部的办公室、把金币往财务部一倒、歇够了就走。她们从不觉得需要拥有自己的办公室，因为"反正过两天又要走了"。

【跨部门关系】
总务部：空间共生关系。外交部无固定办公室，其城内留守修女长期驻扎总务部办公室，两个部门共用一间办公室已成惯例。
财务部：经费上下游关系。外交部是全教会最大的外部收入来源，财务部是其唯一的资金接收方。两部门之间的资金交接没有任何核对流程——金币从外交部手中倒入财务部金库，双方均不点数、不记账、不对账。
宣教局：野外行动的功能互补关系。宣教局修女在野外传教时常蹭外交部使团走大路、蹭途经大城镇的高质量男人。
文献部：外交部试图将淫纹作为文化商品批量出口，文献部坚持"这是艺术不是商品"。双方在"淫纹的国际化审美"上永远无法达成一致，但外交部的出口货品中始终夹杂着从文献部废稿堆里捡来的贴纸。
