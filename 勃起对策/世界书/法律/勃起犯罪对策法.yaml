---
勃起犯罪对策法:
  全称: 《公共安全与性秩序特别维护法案》
  立法机构: 济北道议会
  通过时间: 大顺57年
  适用范围: 济北道全境，清阳市为重点执法城市
  第一条: 男性在公共场合露出阴茎或勃起，即构成犯罪未遂。执法部门有权对其进行调查、扣分警告。量刑标准与阴茎尺寸及勃起严重程度挂钩——肉棒尺寸越长、勃起越严重，罪责越重
  第二条: 性行为的发起权完全归女性所有。男性若主动向女性提出性请求，直接以猥亵罪逮捕。在性交过程中，女性有权随时撤回同意；女性撤回性同意后，若男性无法证明自己在女性撤回同意后立即停止，按强奸罪论处
  第三条: 被指控勃起犯罪的男性承担举证责任——需自行提供证据证明自身未勃起或未露出，否则推定罪名成立。鼓励女性市民举报勃起犯罪行为，举报查实后可获得奖金，奖金从被举报人的罚款中按比例提取
  第四条: 执法人员在执行本法案时享有执法豁免权。因执法行为导致的男性身体接触、心理不适或社会性死亡，不构成侵权。男性以"正常生理反应"为由的抗辩不予采纳
  执法手段:
    扣分制度:
      描述: 仿照交通违章积分制，每位男性公民在济北道辖区内拥有基础信用分12分，有效期一年
      扣分标准:
        - 轻度勃起（轻微隆起，龟头未露出）：扣1-2分，警告处理
        - 中度勃起（明显隆起，龟头轮廓可辨）：扣3-4分，当场罚款500-2000元
        - 重度勃起（完全勃起，阴茎轮廓清晰可见）：扣6分，强制带回派出所处理，罚款2000-5000元
        - 露出阴茎（不论是否勃起）：扣12分，直接行政拘留，并处5000元以上罚款
      积分清零后果: 信用分清零者，强制参加为期一周的"性别教育再培训"，费用自理；一年内两次清零者，列入性犯罪高风险名单，通报用人单位及社区；一年内连续三次清零或总计清零五次以上者，按猥亵罪处理，移交司法机关追究刑事责任
    罚款标准:
      - 初犯且轻度：警告为主，不予罚款
      - 中度勃起：500-2000元，视阴茎尺寸和勃起程度浮动
      - 重度勃起：2000-5000元
      - 惯犯（一年内三次以上）：罚款金额翻倍，附加社区服务令
      - 阴茎长度超过15cm者，罚款金额自动上浮50%
    强制措施: 执法警员有权对勃起男性实施"现场排泄"——使用警用飞机杯帮助其射精以消除公共危险。抗拒"现场排泄"者，按妨碍公务罪追加处罚
    处罚阶梯总览:
      - 首次轻度违规: 警告 + 扣分
      - 中度勃起: 罚款500-2000元 + 扣分 + 现场排泄
      - 重度勃起: 罚款2000-5000元 + 扣6分 + 现场排泄 + 带回派出所
      - 露出阴茎: 行政拘留 + 罚款5000元以上 + 扣12分清零
      - 一年内两次清零: 列入性犯罪高风险名单，通报用人单位及社区
      - 一年内连续三次或总计五次清零: 转为刑事猥亵罪，移交司法机关追究刑事责任
  国际背景: 该法案在全球范围内由日本东京都率先通过并执行，东京都同时成立了勃起对策部作为专门执法机构，其暴露制服和执法流程经过数年打磨已较为成熟。济北道的立法很大程度上参照了东京都的既有模式
  实施历史:
    第一阶段_大顺57年:
      阶段: 法案在济北道生效，由各市警察局分散执行
      状况: 执行效果非常不理想。大量女性在互联网上反馈称法案毫无作用——男性依然在公共场合对她们凝视，警察局执法意愿低下，法案形同虚设。社会舆论持续发酵，要求更严厉管控的呼声日益高涨
    第二阶段_大顺59年:
      阶段: 清阳市被选为济北道勃起犯罪对策法样板执行城市
      执法主体: 清阳市成立"反性侵害部"作为专门执法机构
      状况: 执法手段极度粗暴——见到疑似勃起者不经调查直接罚款拘禁，大量无辜男性被牵连。女警肆意欺压普通男性，随意找茬、当街羞辱、罚款收到手软；长相俊秀的男性被带回审讯室"特殊照顾"。最终引发男性大规模暴动，冲击警察局，时任女局长被愤怒的男性活活打死。反性侵害部被迫撤销
    第三阶段_大顺60年:
      阶段: 赵曼青出任清阳市警察局局长，重启专门执法机构
      转变: 赵曼青吸取前任教训，并借鉴日本东京都经验——东京都的勃起对策部已运行数年，其暴露制服（深V紧身上衣+乳胶连体衣）作为"泄洪区"与引诱犯罪的诱饵、标准执法流程等均被验证有效。赵曼青照此模式成立勃起对策部代替已撤销的反性侵害部，引入日本方面已经成熟的暴露制服体系，同时制定标准执法流程，避免随意执法引发反弹
    第四阶段_大顺60年至今:
      阶段: 现行体制稳定运行
      状况: 勃起对策部扩编至141人，覆盖全市各区。但内部浮现政治路线与法律路线两条路。腐败问题开始滋生。积分清零的刑事升级条款（连续三次或总计五次清零按猥亵罪论处）被加入法案，进一步强化了对惯犯的打击力度
  执法程序:
    执法主体: 男性警察绝对禁止参与任何勃起犯罪执法事务。普通女警在巡逻中发现勃起行为后仅负责初步取证和现场控制，所有后续执法权专属于勃起对策部。勃起对策部警员到达现场后即全权接管
    现场执法流程:
      - 第一步_发现: 女警在巡逻中发现疑似勃起行为，或接获女性市民举报。男性警察发现后必须立即无线电通知最近的女警或勃起对策部接管，自行回避
      - 第二步_目测评估与取证: 发现女警对嫌疑人裤裆区域进行目测评估，判断勃起等级，同时使用警用记录仪对裤裆区域拍摄取证
      - 第三步_联系勃起对策部: 确认存在勃起违规后，女警立即联系勃起对策部，报告位置和初步评估等级，并控制现场等待勃对成员抵达
      - 第四步_勃对接管: 勃起对策部警员抵达现场后，普通女警移交取证记录并退出。勃对警员接手全部后续事务——当场警告或开具罚单、执行"现场排泄"、或强制带回派出所
      - 第五步_后续处理: 带回派出所后，录入信用分系统，核查累计清零次数。首次清零者执行行政拘留及罚款后释放，通知家属或单位；若累计清零次数已达连续三次或总计五次标准，转为刑事猥亵罪立案，移交司法机关
    疑犯权利: 男性嫌疑人在执法过程中无权保持沉默，必须回答勃起对策部警员关于勃起原因、性幻想对象等问题的询问。拒绝回答视为默认指控成立
  政治滥用:
    打击政敌: 市议会女权派利用法案对付男性政敌及其亲属——捏造"公共场合露出"罪名，不经"现场排泄"直接关押，出狱后迫使其投靠女权派
    经济勒索: 对企业主实施选择性执法，以"涉嫌邀请性行为"或"勃起犯罪"为由突击检查，处以高额罚款。部分罚款不进公账，流入部门领导私人腰包
    内部包庇: 有人脉的违法者可通过塞红包将案件"私下处理"——不记录、不罚款。秦源曾涉嫌收黑钱，证据确凿但被柳妍以"内部消化"压下
    队际矛盾: 特勤一分队指责二分队"执法不严"，常以程序不正义为由抢夺二分队案件和奖金。二分队队长顾凌霜不参与政治滥用，因此二分队在部门内处于边缘地位
