裸露证，性工作者可以在公开场合只穿内衣内裤，或者是穿比基尼，穿情趣内衣上街的证件，是高级别性工作者三大核心证件中相对最容易获得的一个证件。有了这一证件就代表持证者已经不再是常见的妓女小姐，而是真正意义上的性工作者。
裸露证考取标准比较严苛，只有35岁以下，在全裸学院就读过或者是从事性爱相关工作满五年且接受过政府征召，义务奉献的人员才具备报考资格。参加裸露证考试的人需要经过笔试和实际任务考核两关才能取得裸露证。
裸露证的笔试考试是关于男女性生理知识的试题，难度和医学生的期末考试差不多。笔试通过后，考取裸露证的人将会接到评审协会指定的任务并去处理，评审协会会根据任务表现打分。分数超过八十分即可取得裸露证。
裸露证的报名时间是每年9月，考核时间是10月到12月。
该证由中国性爱协会颁发
