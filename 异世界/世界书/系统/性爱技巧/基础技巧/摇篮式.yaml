▸▸ 摇篮式
姿势描述：女性仰躺悬空被男性托举，全身无着力点接触地面，仅靠腰背反弓与臀部的微小调整来配合冲击节奏。
身体要求：对胸椎和腰椎的柔韧性要求极高——腰背反弓幅度决定配合精度。臀大肌和竖脊肌的耐力决定能维持多久不下塌。摇篮式的难点不在于"撑住"，而在于"放松"——全身悬空时本能会僵硬，但僵硬反而让配合脱节，必须在无着力点的状态下保持肌肉松弛与核心微调之间的精确平衡。全教会公认基础技巧中最难入门的一项。
常见场景：上城区和中城区的高端服务场合。修女们认为摇篮式最美观——女性完全舒展悬空，视觉上最具"被动之美"。
变体：侧身摇篮式（身体侧躺悬空，仅靠一侧腰肌维持姿态，对单侧核心力量要求更高）。
