---
济北道:
  地位: 大顺民国十九道之一，参照山东半岛，海洋经济大省，制造业发达。清阳市所在的道
  政治态势: 议会派重镇，全省十二市中有八市为议会派掌控。道议会中女权系与民粹系结盟压过劳工系和环保系，形成议会派内的"女民联盟"。政府派在此势弱，在道级政府中仅控制少数部门。军方派影响力限于驻军所在地沿海城市
  道会: 济南市，全省第一大城市，常驻人口五百万，道政府和道议会所在地
  主要城市: 济南市（道会）、清阳市（第二大城市）、青港市（最大港口）、烟威市（海军基地）
  经济: 海洋经济（港口、渔业、造船）、制造业（家电、机械、化工）、农业（粮食与水果）
  道内政治张力: 济南市与清阳市构成议会派内部的双城角力——济南以民粹系为主，清阳市以女权系为大本营，两人马在道议会中结盟对外，私下却在争夺议会派在济北道的领导权。青港市为商事系和劳工系混合地带，是议会派内少数不稳的票仓
