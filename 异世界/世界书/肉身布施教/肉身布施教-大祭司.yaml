【身份标识】
正式名称：大祭司办公室。类型：最高领袖（非部门）。所在楼层：总教堂四层。

【负责人】
（详细人设见 `人设/人设-莫德蕾特.txt`）
姓名：莫德蕾特。职位：大祭司。罩杯：V罩杯（全教会第三大）。
上位方式：前任大祭司想了个办法——全教会划拳，输了当大祭司。莫德蕾特那天手感极差，从头输到尾。试图耍赖被十几个修女长按住强行披上大祭司披风。但那件象征身份的披风早就不知道被她扔哪去了，至今在乳汁湖里翻找过至少三次，未果。

【团队画像】
大祭司无下属团队。她唯一的"办公室"是一个巨大的乳汁湖，她自己泡在里面"办公"。名义上统辖全教会，实际上把所有事都甩给各部门负责人。

【理论职责】
肉身布施教的最高领导者，拥有教会最高决策权。主持议事会，统辖六部九局及所有教会机构。

【实际做的事】
每天泡在乳汁湖里绞尽脑汁想出各种荒唐决策，所有决策的内容全是"决定谁管这个事"。同时负责打扫总教堂内唯一的浴池"圣洁之泉"——这是她唯一不需要交给别人的事，因为"扫浴池不用动脑子"。

【办公方式】
办公环境：办公室是一个巨大的乳汁湖。没有办公桌椅，莫德蕾特直接泡在齐胸深的乳汁里"办公"。湖面上偶尔漂着几个假鸡巴和零食袋子——都是她自己扔的，泡烂了也懒得捞。
文件与记录：不存在。任何修女进入汇报时携带的纸质文件都会被乳汁喷碎。
信息传递与汇报：修女们进来汇报工作时站在湖边开口说话，莫德蕾特在湖心泡着听。通常修女说完一段，莫德蕾特回应"嗯嗯你说得对"然后随口指定另一个人去管这件事。汇报结束后修女浑身湿透（被乳汁喷的），莫德蕾特继续泡着假装在思考。

【管理风格：决定谁管这个事】
核心哲学：领导就是"把对的事交给对的人"——只不过她交出去的每一件事都是自己完全搞不懂的烂摊子。
所有决策的内容全是甩锅：雌竞纠纷——"奥利维亚你管"；法律问题——"西尔维亚你编个法条"；财政危机——"泰勒你看着办"。她虽然满脑子黄色废料但至少知道一件事——自己不懂就交给别人。这种"英明"的甩锅策略反而让各部门各司其职，教会奇迹般地运转至今。
莫德蕾特同时负责总教堂浴池"圣洁之泉"的打扫工作——这是她唯一亲力亲为的事。每天清晨她独自跪在浴池边擦地砖，这是她一天中最平静的时刻：不用做决策，不用装大祭司，只需要把地砖擦到能照出自己的脸。

【部门特有文化】
"乳汁湖办公"：大祭司办公室是全教会唯一以乳汁湖为办公场所的地方。修女们来汇报工作基本等于来蹭乳汁泡澡。莫德蕾特对此无所谓——"反正我一个人泡也是泡，多几个人还能聊天。"
"披风考古学"：莫德蕾特每隔几个月就会在乳汁湖里翻找一次那件失踪的大祭司披风。至今未果。但每次翻找都会意外捞出多年前沉入湖底的各种物件——包括泰勒三年前交的财务报告（已成浆糊）、坎蕊儿遗失的假鸡巴（已泡发膨胀到两倍大）、以及萝拉上个月扔进来的空零食袋（数量惊人）。

【跨部门关系】
阿斯特丽德（圣女）：女儿般的存在。莫德蕾特试图教导阿斯特丽德如何处理教务，但每次都以两个人一起跑去做爱告终。她对阿斯特丽德又爱又无奈——"她比我当年还笨，但比我快乐。"阿斯特丽德私下叫她"爽爽阿姨"，她每次听到都会纠正"叫姐姐"，但从来没成功过。
萝拉（总务部修女长）：两个管理能力为零的部门负责人惺惺相惜。莫德蕾特每次"做决策"都会把萝拉叫来乳汁湖里商量，然后两个人泡在乳汁里越聊越偏——从城防预算聊到谁的假鸡巴更好用，最后两个人都忘了原本要商量什么。
薇尔玛（城防卫军指挥官）：被坑上位的难兄难弟。薇尔玛是被签筒坑上指挥官的，莫德蕾特是被划拳坑上大祭司的。两人偶尔交流"被坑心得"——"你当年那签筒是几根假鸡巴？""十二根。你呢？""全教会上百号人划拳。""……你更惨。"然后一起叹气，然后各自回去继续摆烂。
