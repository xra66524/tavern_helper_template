【部门定位】
正式名称：宣教局。类型：九局之一。所在地点：总教堂三层，但办公室常年空置——大部分成员分散在圣芙蕾雅城外的蛮荒地区、异族村落和偏远乡村，城内常驻仅祭司长及二十余名小修女。

【负责人】
姓名：英格丽德。职位：祭司长。罩杯：O罩杯。
上位方式：中城区孤儿，教会学校的"反向学渣"——文化课满分，实操课（做爱）次次垫底。18岁毕业后，因她是唯一能去瓦罗利亚等正经国家传教而不把外交官吓跑的修女，被强行塞进宣教局并一路推上祭司长之位。

【团队画像】
胸围范围：K～O罩杯。人数：约一百二十余人（城内常驻约二十余人，城外分散约百人）。
体型特征：与总教堂其他部门修女相比，宣教局修女常年野外奔波，体力更充沛，胸部相对挺拔。
性格共性：全教会最开朗自来熟的一批人。见谁都能聊，三句话之内必拐到性话题。

【理论职责】
向圣芙蕾雅周边蛮荒地区、异族部落和偏远乡村派遣修女传教，传播肉身布施教教义。同时负责圣芙蕾雅城内的教会宣传工作——张贴布告、组织宣讲、让外来者知晓肉身布施教的存在。

【实际做的事】
城外修女：说是"传教"，实际上就是去野外找村子打野炮。修女们三五成群，进村后根本不讲教义、不摆神像、不搞仪式——只报一句"肉身布施教的，免费操"，然后该干嘛干嘛。睡完这个村换下个村，睡完下个村再换下下个村。
城内修女（二十多名小修女）：平时在总教堂到处乱跑找其他部门修女玩。只有教会组织重大活动（详见 `圣芙蕾雅城-节日与庆典`）时才会被想起来，然后被拉去干苦力——搬桌椅、挂彩棚、当人形指路牌。
城内宣传：理论上负责张贴布告和宣讲，实际上布告贴出去三天就被乳汁泡烂，宣讲则因修女说着说着就开始现场演示而变成群交大会——效果反而比正经宣讲好得多。

【办公方式】
办公环境：总教堂三层有一间宣教局名义办公室，常年被当作杂物间使用。宣教局的城内修女们基本上都是到处蹭别人办公室，城外修女以天为被以地为床。
文件与记录：不存在任何文件。修女回城后所谓的"汇报"就是一边做爱一边吹牛。没人记录，没人核实，吹完就忘。
信息传递与汇报：没有汇报制度。出城修女三个月音讯全无，大家也不着急，毕竟总会有修女干脆留在外面当性奴，早习惯了。

【管理风格：活着回来就行】
宣教局的管理制度只有一个原则——修女出城后基本不管，活着回来就行。具体表现为四个标志性制度：
一、出门即放生。修女出城前只被交代三句："注意安全""活着回来""多睡几个"。没有指定传教区域、没有路线规划、没有归期要求。修女爱往哪走往哪走，爱去多久去多久。
二、不报平安不算失踪。修女三个月不传消息回城，不会有人去找——"如果死了会有人来报信的，没人报信说明还活着"。曾有修女在外待了两年突然回城，理由："那个村子太好睡了舍不得走。"
三、回城即休假。修女回城后无需述职、不交报告、不接受考核。回来就是放假——在总教堂蹭吃蹭喝蹭男人，直到自己觉得该出去了再走。

【部门特有文化】
笑容与黄腔的反差：宣教局修女的核心标志。她们能用最灿烂纯真的笑容说出"你的鸡巴看起来很好吃"。
野外即床：对宣教局修女而言任何地形都是做爱场所——树上、河里、悬崖边、魔物巢穴门口，没有不能做爱的地方。
捡孤儿当特产：宣教局修女在野外乱跑时最大的副业是捡孤儿。捡到了就往救济局送，送完就跑，毫无愧疚："我们负责播种，你们负责收割嘛。"
串门成瘾：自家人太少，城内小修女养成了疯狂串门的习惯。他部门已习惯宣教局修女像流浪猫一样在各办公室出没。

【跨部门关系】
外交部：野外行动时常蹭外交部使团走大路、蹭大城镇的高质量男人。使团半推半就——嫌她们野，但危险路段多几个能打的也不是坏事。
救济局：救济局最大的孤儿供应方。宣教局放下孩子就跑，救济局骂完就收，从未有过正式交接流程。
建设部：宣教局常年没人用的办公室被建设部当成了维修练习场——反正砸坏了也没人投诉。偶尔宣教局回城发现墙上的洞比走之前还多，建设部振振有词："我们在测试新锤子。"
总务部：总务部搞城内宣传时宣教局总是热情响应，但两个部门凑一起从未成事——讨论到一半就开始群交，图纸被乳汁泡烂。
