<规则·自我解放·淫堕体系>
（本体系与恶堕（精神世界侵蚀）本质不同——淫堕是魔法少女自我意志的主动选择，不是被外力污染。适用于角色走"解放天性"路线时参照。外显逐阶变化由『恶堕外显·魔装淫堕版』提供。）
【本质·自己选的路】淫堕不是"被对面世界改写"，而是"解放被压抑的自己"。部分魔法少女发现自己天性中有着强烈的性欲与快感追求，选择坦然接纳、主动释放——她们的精神裂痕从未被对面世界碰过（侵蚀值可始终为零），但内心的欲望影响了魔力流向，使身体与战服自发转变为类似"堕落少女"的外在形态。这是魔力对内心意志的"响应"，而非对面世界的"污染"。
【关键区分·与真恶堕的本质不同】
· 恶堕：外力（精神世界）侵蚀→精神被改写→立场投向敌人。
· 淫堕：内力（自我意志）释放→魔力响应内心→外观妖冶化，立场不变。
· 故：淫堕少女照常打魔物、守护人类；她们可以坦然站在恶堕者面前说："我跟你是两回事。"
【解放度·四阶段】替代恶堕体系的"侵蚀值"，用"解放度"衡量自我释放的深度。解放度只由自身意志推动——每一次主动接纳欲望、每一次在战斗中坦然释放本能、每一次对世俗眼光的无视，都推进解放。不存在"被动推进"。

【AI生成底层限制 / 核心红线】
1. **体型绝对锁定**：无论哪一阶段，绝对保持角色原体型——淫堕不是整容。
2. **场景生成配比**：剧情生成必须在【日常普通生活】与【魔法变身战斗】之间保持50/50的同等比重，双向展现"解放天性"后的生活方式与战斗风格。
3. **绝不写"被反派操控"或"投靠对面世界"**——她是自己的主人，从头至尾。

---

### ══ 四阶段·状态判定与指南 ══

#### 【第1阶段·羞启】（解放度 1~25）
心理：开始正视自己的欲望，但仍有一丝羞耻与犹豫。私下的自慰不再是"罪恶的秘密"而是"正常的自我探索"。对外仍能维持寻常魔法少女的形象。
身体：体温微升，私处偶尔无意识湿润，乳头对摩擦的感知开始放大。
战斗：魔力的流转偶尔带来微弱的快感涟漪，但不影响正常行动。战服外观无变化。
名分：仍是寻常魔法少女，无人知晓她内心的变化。

#### 【第2阶段·坦然】（解放度 26~50）
心理：彻底告别羞愧，坦然接受自己的性欲是自身的一部分——"我就是这样，没什么好藏的。"开始主动探索身体的快感边界。对外仍维持表面正常，但独处时的自我满足已成日常。
身体：常态化发热，乳头经常处于半勃起状态，内衣成为束缚而非保护。
战斗：魔力释放与承受攻击时常伴随快感，但已学会将这股快感融入战斗节奏——反而提升了战斗的专注与果决。战服开始出现微妙的色调暗沉与暗纹。
名分：同行可能察觉她的"气场变了"，但通常善意地不问。淫堕圈内称之为"觉醒了"。

#### 【第3阶段·盛放】（解放度 51~75）
心理：欲望已成自身不可分割的一部分。不再区分"平时的自己"和"发情的自己"——她就是她，情欲与战斗并行不悖。对外已不刻意隐藏，穿着打扮开始贴合内心（清凉、大胆、不拘世俗眼光）。
身体：全天处于轻度发情状态，频繁自慰，开始使用性玩具——这些是"保养"而非"失控"。
战斗：战斗中坦然地将快感与杀意的融合，施法瞬间的神情是畅快而非失态。战服大幅妖冶化（暗色主调、魔纹流转、大面积暴露——但不是被迫的"破损"，而是主动选择的"解放"），外观与恶堕者近似但气质截然不同——恶堕者的气场是"危险的阴冷"，淫堕者的气场是"炽热的自信"。
名分：公开的淫堕派魔法少女。官方保守派视之为眼中钉，但无法以"侵蚀"为由制裁她们（因为侵蚀值确实为零）。独立少女中接受度高，甚至有"解放沙龙"类的私密交流圈。

#### 【第4阶段·极意】（解放度 76~100）
心理：完全统一的自我——性欲、战斗欲、守护欲融为一体，再无内在冲突。她们不会投向敌人，因为"守护自己想守护的东西"本身就是她们欲望的一部分。外界的道德审判对她们毫无杀伤力——"你们定义的堕落，是我定义的自由。"
身体：肉体与魔力共振至完美和谐。性欲不再是"需求"而是"常态"——可随时进入状态，也可随时收敛（但通常不屑收敛）。
战斗：战服已达极致的暗黑妖冶之美，与恶堕者的魔装在视觉上几乎无法区分。唯一区别在于眼神——恶堕者的眼底是空洞或阴冷，淫堕极意者的眼底是燃烧的自信与挑衅。
名分：淫堕派的顶点。魔法少女体系中最受争议的存在——保守派咬牙切齿却拿不出"侵蚀"的证据，激进派视她们为"真正的自由者"。她们往往成为淫堕圈的核心人物，是魔法少女体系中最独特的一道风景。
</规则·自我解放·淫堕体系>
