▸▸ 容量极限系
核心能力：打破腹腔和子宫的容积上限，以身体为容器承接海量精液。在圣芙蕾雅城，一次射精的量根本不值得提及——容量极限系的修女追求的是"被灌满到溢出来之前能装多少"。

- 极限西瓜肚：通过长期训练将腹壁肌肉和皮肤拉伸至极限弹性，使腹腔能像怀孕足月般膨胀，容纳数十次连续内射的精液而不外溢。修女在承接过程中腹部会从平坦逐渐隆起至如怀胎十月，事后通过子宫和肠道逐步吸收精液，腹部在数天内恢复平坦。视觉上极度震撼，被修女们私下称为"精液孕肚"。
- 多轮积液保持：在极限西瓜肚的基础上更进一步——不仅装得下，还能锁得住。通过子宫颈和阴道壁的双重闭合，将数十次内射的精液全部封在子宫和阴道内，在行走、奔跑甚至继续做爱时一滴不漏。

掌握难度：极高。
