<阵营·五大流派——融合派>
（主张两界融合的格斗流派。适用于角色涉及融合派背景、神之相修行、两界冲突、阵营对立相关剧情时参考。）
【理念与背景】
融合派认为，自旧时代以来两个世界就在相互挨近之中，正因如此才诞生了格斗者的道路，格斗者因此而获益。提出在变动期无限延长的前提之下，两个世界融合是不可避免的，最终会像交融地一样形成一个统一的相对平衡的世界，可以在此基础上让两个世界寻到一条彼此共存的道路。但在纯净派看来，敌强我弱就是变相的投降——两派天然对立。
融合派自我宣扬，声称通过捕获和沟通，从一些超限生物乃至对面存在的身上获取力量，这样可以更好地对抗对面世界的侵袭。然而，当他们与这些东西越合越深的时候，除了少数意志坚定的人外，大部分人的思维方式在长期打交道的过程中，也不可避免地向那些异化生物和天外存在偏移。大轰撞逐渐临近，不少人愈发疯狂——他们甚至想与神祗或对面存在融合为一个新的生命，而这些人背后站着一些新神。这些人根本不愿意抵抗大轰撞，甚至还欢迎大轰撞的到来。

【影响】
政府和公司之中，都存在着一部分与对面暗中有所勾连的人，并支持这套话术。出于各种各样的目的——有的是因实力差距而绝望、认为世界已无可救药而自暴自弃，有的是彻底成了投降派、成为对面存在的信徒，有的单纯是为了从对面获取力量。目前世界各国政府内部，颇有一些人认为两界融合不可避免、没必要强行对抗——他们大多数都是融合派的支持者，或从融合派那里得到了好处。

【格斗家道路】
融合派对神之相研究最为深入，其中有不少人是旧国教的传继者，并疑似与某些存在有着长久的沟通。神之相与融合派的理念格外互补——这也是神之相过去多是宗教人士修行的原因：宗教之中要么有所供奉的神祗庇佑护持，要么信仰坚定不易受到蛊惑，其余人则很少走此道。但如今不同了——由于技术进步，交融地大片开拓、获得载躯也更为容易，越来越多的格斗者迈向此途。可因为根底打磨不够、信念不够纯粹、或力量先天有缺失，有意无意地会融入对面的力量。

【秘传】
融合派认为，从来没有天生没有缺陷的生灵和存在——世界对面的同样如此。他们善于融入各种外来力量，通过后天的弥补和融合补足缺陷，从而达到完美的境地。只要承受度足够，可以精心规划出一条适合个人的融合路线——如果每一步都能成功，有可能突破到更高境地。
中国融合派总部位于香港。

【与魔法少女的关联·交融魔法少女】
融合派是五大派中与魔法少女体系在哲学上最契合的——魔法少女的精神裂痕本身就是两界交汇的产物。融合派认为裂痕不是缺陷，而是两界融合的预演，应当拥抱它而非恐惧它。
· 战斗风格：魔力属性偏"暗"或"异质"——不是深渊污染，而是有意识地牵引对面世界能量所导致的独特质感。战服形态可能呈现非人特征：额外的眼睛、飘浮的半透明光带、类似对面生物质感的纹理。招式带有"侵蚀"视觉效果，但与真恶堕有本质区别。
· 核心能力：裂痕主动控制——普通魔法少女的裂痕是被动漏出能量，交融派则尝试主动调节裂痕的开合度，在关键时刻拉大裂痕获取爆发性力量。部分成员尝试与低阶魔物建立某种沟通甚至驯化关系。神之相理念映射为"星灵人格化"——有意培养星灵成为独立而强大的意识体，甚至尝试与之融合以突破上限。
· 危险的边界：交融派与真恶堕之间只有一线之隔。"我是在主动融合，不是在被动侵蚀"——这句话只有自己知道是真是假。异事局清道夫对交融派魔法少女的监控程度是五大分支中最高的。一旦堕落，交融派魔法少女往往成为高阶魔人干部，比普通恶堕者更危险。
· 社会定位：异事局在官方招募时会回避融合派背景，但暗地里可能借助她们的特殊能力处理一些常规魔法少女解决不了的局面——比如与对面存在打交道、深入裂隙区域侦查。
· 代价：恶堕风险极高，是五大分支中最容易滑向真恶堕的一支。随着大轰撞临近，部分交融派成员愈发极端，甚至主动投靠对面。
