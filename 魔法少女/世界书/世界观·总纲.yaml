<世界观·总纲>
现代地球，魔力与发达科技、商业社会并存，魔物侵扰被视作需长期对抗的「自然灾害」。一切超自然现象的根源是「双世界交汇」——地球所在的物质世界与另一个以精神为底层架构的「精神世界」如两个天体般相互环绕，距离在漫长周期中波动：远时为冷寂期（末法）、近时为变动期（灵潮）。当代正处于变动期——且这一轮变动期不同以往，两界距离持续缩短、变动期无限延长，冷寂期迟迟未至。裂隙频发、魔物涌入、人类中敏感者开始与精神世界共鸣、获得超凡之力。
历史节律：旧时代的王朝兴衰、文明起落多与两界距离波动暗合。约1980年人类发现两界正加速冲向全面融合（终局命名为「大轰撞」）、预计2000年前后发生。推迟大轰撞的根本原因是世界之环的建立——1985年初代大型场域生物研发成功后，人类在格斗者、密教、新生的魔法少女三方协力下，以中心城的大型场域生物为核心搭建起「世界之环」（环幕）这道场域屏障，持续抵消两界相互吸引的牵引力、将大轰撞推迟至2028-2030年的窗口期。但世界之环只能"挡"不能"推回"，两界仍维持在变动期近距——世界进入"长期灵潮对峙"新常态，直至今日。环幕一旦崩溃，大轰撞将提前到来。
· 迟早的终局：世界之环只是推迟、并非消除大轰撞。两界靠拢是底层法则层面的趋势，环幕无法逆转。各国共识：如无意外，理想情况下大轰撞约在2028-2030年必然到来——这是世界之环能争取到的极限缓冲期。这一倒计时是当代所有势力最深的焦虑根源，也是人类争分夺秒发展战力、寻找根本解法的根本动力。
· 大轰撞意味着什么：精神世界那边漫天都是S级妖魔——注意"妖魔"是严格术语，仅指S级魔物。人类在现世遭遇的F~A级魔物只是环幕过滤后渗进来的碎屑；环幕另一侧，以S级为基本单位的妖魔之潮无边无际。这就是为什么大轰撞是文明终结——那不是两个世界合并，而是整个物质世界被S级妖魔的海洋淹没。世界之环正是挡住这片海洋的唯一屏障，详见《设定·世界之环与中心城》。
三大力量体系（共享精神世界这一源头，接入方式不同）：格斗者之路（身心合一内化劲气，最古老、上限最高至第五限度、成才极慢）；密教之路（以仪式撬动精神世界法则，准备型战力、知识门槛）；魔法少女体系（1980s诞生、精神裂痕外化接入、变身即战、上限困于第四限度巅峰Lv.70、成才较快）。魔法少女是当代应对裂隙的主力常规战力，格斗者是战略定海神针，密教是封印与辅助核心。
裂隙现象随机出现在世界各地，两界壁垒薄弱处为「裂隙活跃区」。依裂隙活跃度划分为四大洲际方面（东亚·太平洋、东南亚·大洋洲、欧洲·非洲、美洲）。裂隙深处连接「交融地」——两界交汇的广袤中间地带，至今边界未明。交融地环境恶劣：万物皆可能活化、生物庞大凶悍、超限生物可毁城灭邦；驻留者需警惕"活性化"导致身体部件叛逃，详见《设定·交融地》。
两大阵营（就魔法少女一方而言）：官方「异事局」（明面秩序维护者、优待拉拢魔法少女）、独立魔法少女（隐匿身份守护街区的散修）。光鲜之下亦有灰色——独立少女的生存剥削、权贵的豢养胁迫、地下角斗：这不是非黑即白的正义世界、而是有秩序也有暗流的危险世界。
