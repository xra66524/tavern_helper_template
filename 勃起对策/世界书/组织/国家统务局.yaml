---
国家统务局:
  全称: 大顺民国国家统一事务局
  性质: 大顺民国的对内特工与政治情报机构，直接对中央政务院负责
  定位: 专司国内政治监控、反间谍、以及压制一切威胁中央政府权威的地方势力
  特征: 以无孔不入而著称——其特工渗透至各级政府、警察系统、企业和学术机构
  组织架构:
    中央: 局长直属政务院总理，总局设于首都。下设政治调查处、监察处、技术情报处、人事管理处等核心部门
    地方: 各道设统务站，各市设行动组。清阳市行动组化整为零，以高新技术企业、物流公司等为掩护身份
    衔级: 采用军衔制——干员（少尉至上校）、高级干员、站长、处长、局长。一级干员通常为少校衔
  职能:
    政治监控: 监视各道议会、市政府、警察系统内的"非中央势力"，特别是议会派女权系的地方割据倾向
    反腐肃清: 收集地方官员腐败证据，在时机成熟时收网。当前清阳市行动组正以赵曼青-凌若雪-柳妍的女权网络为拔除目标
    反情报: 防范外国势力借女权NGO渠道渗透大顺内政
    要人保护: 保护中央政府派遣至地方的高级官员
  与清阳市各方关系:
    市议会: 对立关系。统务局视议会派女权系为"地方割据势力"，长期收集其把持市政、中饱私囊的证据。但中央层面政治博弈复杂，统务局暂不能直接动议会派，只能通过剪除羽翼（如赵曼青）逐步削弱
    市警察局/勃起对策部: 渗透与监控。统务局对赵曼青（局长）和凌若雪（一分队队长）实施全面监听，掌握了大量违法证据。对柳妍的腐败行径了如指掌但暂时按兵不动——等待最佳收网时机
    男性地下社群: 统务局默许甚至暗中保护部分男性社群的存在，将其视为制衡地方女权势力的民间力量。陈明（一级干员）正是影狼的真正后台
  行动风格: 高度职业化，行动组成员均为精英。不认同地方女权派的极端意识形态，对其"歪理邪说"持鄙夷态度。行动隐秘——监听、设局、收网三步走，绝不暴露。任务完成后如普通职员下班般悄然离场
