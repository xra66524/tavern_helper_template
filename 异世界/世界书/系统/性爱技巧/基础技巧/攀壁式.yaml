▸▸ 攀壁式（壁虎式）
姿势描述：女性背靠墙壁，以双腿主动夹持男性腰部、将自己牢牢固定在墙面与男性之间。双腿同时承担两个方向的力量——向内夹紧男性以维持连接、向后蹬墙以抵消冲击力。男性只负责挺动，女性全权负责"不让自己掉下来"。
身体要求：大腿内收肌群和臀大肌必须持续进行矛盾发力——向内夹和向后压同时进行，任何一方松懈都会滑落。同时脊柱抗压缩能力是所有基础技巧之最：背靠硬墙无缓冲空间，冲击力无处消散，脊柱和肩胛骨必须硬吃全部动能。呼吸控制也是隐形门槛——胸腔在墙面和男性胸膛之间被双向压缩，扩张受限，极易因呼吸紊乱导致缺氧和肌肉失控。背部皮肤对墙面材质的适应性同样关键——砖墙、木墙、石墙的摩擦系数不同，一旦背部与墙面发生滑动摩擦，肩胛骨皮肤首先遭殃。
常见场景：下城区窄巷和建筑夹缝中的默认体位。因不挑地形、不占空间，是下城区人口密度最高的区域中最实用的技巧。也因无需脱衣——撩起修女服下摆即可——成为城区街头野战的首选。
变体：反向攀壁（面朝墙壁，以胸腹贴墙承受后方冲击，双腿向后夹持男性，对乳房的挤压耐受力要求极高，大罩杯修女普遍抵触）。
