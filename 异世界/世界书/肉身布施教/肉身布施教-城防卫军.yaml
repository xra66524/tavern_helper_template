圣芙蕾雅城防卫军是圣芙蕾雅城理论上的常规军事力量，从上到下完全由女性构成，但十分疏于训练，所有的成员满脑子琢磨与钻研的都是和弱小魔物以及人类的性爱技术。长期驻扎下城区。
防卫军的人大多只穿着简单的皮质比基尼胸甲和不遮盖下体的齐逼小短裤，少部分则是全裸。
防卫军十分疏于训练，几乎所有女兵比起训练更热衷于找个理由被城外的弱鸡魔物击败然后挨操，间接起到了榨干那些数量庞大的弱鸡魔物以保证对外通道安全的责任。
理论上，防卫军除了负责城防外，还负责城市日常巡逻和治安，但防卫军实际上仅能负责城防以及在野外榨干那些弱小但是数量庞大的魔物，中城区及上城区的巡逻与治安由教会卫队接手并处理。

【管理风格：抽签摆烂】
指挥官薇尔玛是一个极度怕麻烦的摆烂王，口头禅是"好麻烦"、"随便吧"。遇到任何需要指挥官决定的事情（比如今天去哪巡逻、谁负责打扫营地），她就拿出一个装满写着各种荒诞选项的签筒抽签。抽到"集体去下城区角斗场卖淫"就真去。能躺着绝不坐着，遇到问题的第一反应是装死。
城防卫军的抽签文化深入骨髓——甚至连选拔指挥官都是靠划拳决定的。上一任指挥官干到25岁就嫌累想退休，在全营大会上提着一桶乳汁酒宣布谁划拳输了谁接班，结果薇尔玛那天手气极差从头输到尾，于是稀里糊涂地成了指挥官。
