▸ 传说技巧（独一无二，不可复制）
某些修女天生的独门绝技，无法传授。例如大祭司莫德蕾特的"全主动技巧精通"——她掌握几乎所有主动类性爱技巧，但在床上拼命装被动。此类技巧随人而生、随人而灭。

【学习与传承】
无师徒制度、无教材、无考核。传承完全依赖三种渠道：一是教会大学的性爱实践课（名义上课，实际是学生上街实战）；二是部门内老修女带新修女的实战传授（边做边教，做完就忘）；三是个人实战中的偶然发现（如玛乔丽15岁意外觉醒子宫锁）。因此大部分高阶技巧的传承极其脆弱——某一代没人学会，就断了。

【文化意义与本质】
性爱技巧在圣芙蕾雅城不被视为"武功"或"能力"，而是修女的个人魅力与身体天赋的延伸。修女们不会以"掌握了某技巧"自夸，但会在实操中暗暗较劲。唯一的例外是性爱局——她们把子宫锁当作身份标识，不会的人根本不配进门。

从外界视角来看，圣芙蕾雅城的"性爱技巧"本质上是一个巨大的黑色幽默——这群修女把体操、杂技、跑酷、摔跤等极限运动的身体控制力，全部点在了"如何更好地被操"这唯一一棵技能树上。她们的"基础技巧"放在外界，每一项都是专业运动员或杂技演员级别的极限体能动作。
