---
大顺民国:
  性质: 清阳市所在的国家，一个问题重重的世界大国
  政权组织:
    政体: 半总统制。总政长为国家元首，由全民直选产生，掌握外交、国防等核心权力，有权解散国家议会。总理政长领导国家政务院，处理日常行政事务，政务院对国家议会负部分责任
    总政长:
      产生: 全民直选，任期五年，可连任一届
      职权: 国家元首、三军统帅；任免总理政长及各部部长（部分需议会批准）；解散议会；签署法律；宣布紧急状态
    国家政务院:
      首脑: 总理政长，由总政长提名、议会批准
      职权: 主持日常行政、拟定法律草案、编制预算、执行总政长决策
      对议会关系: 议会有权质询、弹劾政务院成员，但总政长可解散议会
    国家议会:
      体制: 两院制——元老院与民议院，两会并立，互相制衡
      总议长: 由民议院全体议员选举产生，为议会最高领导，主持两院联席会议
      职权: 立法、审批预算和决算、质询政务院、弹劾官员、批准重大人事任命、批准宣战和条约
      元老院:
        性质: 代表地方利益的上议院，侧重于审议和监督
        席位: 每道3席，中京2席，共59席
        产生: 各道议会选举产生，非直选
        任期: 六年，每三年改选半数
        派系态势: 富道与穷道在预算上死掐；军方派把持驻军省席位，议会派在民选传统强道占优，政府派靠中京及周边支撑。每道三名元老常分属不同派系，道内先吵，中京再吵。没有一个议题能干净利落地过
        特殊权力: 批准大审院长及高级法官任命；驳回民议院法案需三分之二多数
      民议院:
        性质: 代表民意的下议院，侧重于立法和预算
        席位: 按人口比例全国直选，共480席
        产生: 全民直选，按道划分选区，比例代表制
        任期: 四年
        派系态势: 一团乱麻。三大派系各有其地盘，但内部又分裂为无数小团体——议会派下分女权系、劳工系、环保系、民粹系，彼此互斗不亚于对外；政府派中分技术官僚系、强人系、调和系；军方派亦有陆海内斗和鹰鸽之争。加上发达道与落后道的利益冲突、城市与农村的矛盾、民族与地域的裂痕，480席中形成十几股相互掣肘的松散联盟。
        特殊权力: 预算案先议权；可对政务院成员通过不信任案
      两院互制:
        法案须两院均通过方能生效 预算案民议院先议，元老院可驳回但不得修改 人事批准案元老院先议，民议院可驳回但不得修改
        两院僵持时，总政长可召集两院联席会议裁决
    司法: 设有大审院作为最高司法机构，大审院长由总政长提名、元老院批准，任期十年
    军方地位: 大顺国家防卫军名义上对总政长负责，但军方高层独立性强，其预算和人事深受议会控制。军方派在三大派系中地位特殊，常在政府派与议会派之间充当平衡者
  三大派系:
    概述: 大顺民国无政党，三大派系为跨机构的松散政治网络。各派系内部又分裂为多个子派系，彼此间的合纵连横构成政治日常
    政府派:
      地位: 执政派系，掌控政务院和总政长职位
      势力范围: 中京、河北道、河东道、原北道及大部分边疆道
      子派系: 技术官僚系（务实行政）、强人系（强势中央集权）、调和系（与议会妥协）
      特征: 掌控行政资源和国家机器，但在民选中基础薄弱
    议会派:
      地位: 最大的在野势力，掌控民议院多数席位
      势力范围: 济北道、山南道、江南道、岭南道、淮南道等经济发达道
      子派系: 女权系、劳工系、环保系、民粹系、商事系
      特征: 民意基础雄厚但不掌握行政权，通过立法和预算卡政务院脖子
      女权系: 议会派内最激进、组织力最强的子派系，以济北道为大本营，清阳市为核心据点，详见女权系条目
    军方派:
      地位: 第三势力，在政府派与议会派之间摇摆
      势力范围: 陇右道、安东道、河北道、安西道等驻军大省
      子派系: 陆军系、海军系、鹰派、鸽派
      特征: 掌控武力但不直接参与日常政治，通过元老院和预算审批施加影响
  年号: 大顺民国采用年号制
  行政区划: 全国分为一京十九道。京为首都中京，道为省级行政区，地位等同于省
  首都: 中京（参照：洛阳一带/直辖首都特区） # 全国政治文化中心，辖首都圈及周边卫星城，不属任何道
  安西道: （参照：新疆） # 西部边疆大省，能源与矿产资源丰富，地广人稀
  原南道: （参照：中原南部） # 传统农业大省，人口稠密
  原北道: （参照：黄河中游沿岸） # 古都群所在，历史文化底蕴深厚
