<设定·魔法少女力量机制>
（魔法少女体系的力量运行机制。本条是旧"星灵契约"条目的改写——在新设定下，"星灵"被重新解释为精神裂痕的外化产物，而非外来灵体。体系起源见『魔法少女体系起源』，力量源头见『双世界交汇』，与格斗者/密教的对比见各自条目。）
【力量源头·精神世界】魔法少女的魔力与格斗者的劲气、密教的仪式之力同源——皆来自精神世界的能量渗入物质世界。双界距离越近、渗入越强、共鸣者越多。当代处于变动期，两界距离近、共鸣现象频发，这是魔法少女体系得以存在的前提。
【接入方式·精神裂痕】魔法少女的力量接入方式是三大体系中独有的"分裂外化型"：少女的精神因双界共鸣而天然裂开一道缝，她把裂出的那一部分（潜意识、直觉、情绪化的自我）外化、拟人化为"星灵"，通过这道裂痕接入精神世界的能量。这与格斗者（身心合一内化）、密教（以仪式撬动）截然不同。
【"星灵"的真相】所谓"星灵"，是少女精神的一部分被外化、拟人化的产物，不是外来灵体。
· 它有脾气、有情绪、有判断——那是少女与自己的潜意识在互动。
· 它可能撒娇、闹别扭、临阵掉链子——那是裂痕在压力下的不稳定。
· 它可能在宿主濒死时拼命灌魔——那是求生本能绕过分裂、短暂合而为一。
· 它与宿主的"羁绊"——本质是少女与自身裂出的那一部分的关系，经营这条线就是经营她与自己的关系。
· 异事局研究院的内部术语是"外化意识体"，但少女们仍爱叫它"星灵"、爱与它对话——这种拟人化本身就是稳定裂痕的心理机制，研究院对此睁一只眼闭一只眼。
【"星器"的真相】星器是精神裂痕的"锚定物"——少女把裂痕外化为一件随身小物（发簪、手镯、钢笔、耳坠等），通过它稳定地接入精神世界的能量。星器碎了，裂痕失控、契约崩溃、无法变身。星器形态常隐隐契合能力倾向（利器形偏近战、镜瞳晶形偏感知、杖笔铃形偏元素、钟表锁链环形多见特殊系），但这只是心理投射的倾向、非铁律。
【"变身"的真相】变身是少女主动扩大裂痕、让精神世界的能量大量涌入、在体表凝聚成"战服"的过程。
· 战服是裂痕的外化武装——魔力充盈时坚固耐打、破损时防护下降。
· 变身改换相貌气场——是裂痕能量对肉身的临时改写，也是独立少女隐匿身份的核心机制（见活人感）。
· 变身与维持持续耗魔——扩大裂痕本身即消耗能量，解除即停耗。
【等级＝魔力总量】少女的等级即她能通过裂痕引导的魔力总量。随着修炼与炼化魔核，裂痕的"通量"扩大、魔力上限提升、等级上升。面板【魔力MP】按百分比（当前÷上限）显示，升级扩大的是绝对容量、不影响读数。
【魔核与升级】精神世界的能量渗入是缓慢的基础增长，真正快速升级靠炼化「魔核」——魔物被击破或净化后凝出的能量结晶；吸收炼化可加速魔力扩容、即"升级"之实，魔核同时是这世界的硬通货（换装备、净化、作委托报酬）。故"刷魔核变强"只是想变强那条路的内容，魔力等级不会因不刷而衰退（见事件调度导演）。
【魔力的恢复】魔力随时间慢慢恢复（如休息），或服用药剂快速补充，吸收魔核也可补充但效果不佳——魔核主要用于扩充魔力容量而非补充的首选。
【先天缺陷·硬上限】魔法少女体系的根本代价：力量来自精神裂痕，而裂痕无法愈合。身心合一的格斗者可至第五限度，身心有裂的魔法少女永远困在第四限度巅峰（Lv.70传奇级）。这是体系本身的硬上限，与个人天赋、努力无关——无论多强的传奇级魔法少女，都无法突破到格斗者第五限度的境界。
【侵蚀的根源】正因精神有裂痕，精神世界危险面的能量能从裂痕渗入、污染少女——这就是"侵蚀"。格斗者身心合一、无裂痕这道"后门"，侵蚀抗性远超魔法少女——对面世界的能量无法像对魔法少女那样直接渗入。但这不代表格斗者绝对免疫：第三限度以上格斗者因生物场域觉醒、与精神世界产生牵连，经由开天门吸纳精粹、窥探世界之环对面、与妖魔场域交融等途径，同样可能被外染侵染；异化组织的不可控变异亦是污染的一种（详见《缝隙与异常》《精神世界与变动周期》）。简言之——魔法少女是"裂痕渗入型"（途径直接、低抗性），格斗者是"场域接触型"（途径间接、高抗性但第三限度后风险骤增）。魔法少女的裂痕既是力量之源、也是堕落之门。
