<设定·格斗者·异化组织与基础修行>
（格斗者修行的前置基础与核心组织体系。适用于角色初入武道或涉及异化组织相关情节时参考。）
【开练·步入武道之门】开练是成为格斗者的前置阶段，核心三要素：
· 吊命机（呼吸法）：学习特定的呼吸节律，激发身体生机、调动气血，找到气与力之间的脉络。呼吸法能全面提升身体抵抗力、内脏强度与骨骼承载力，是后续一切修行的根基。
· 劲力：通过桩功配合呼吸法练习，是对力量从"会用"到"精用"的跃升。异化筋膜在此阶段开始渗透入身体深层，成为运动根基。只有异化筋膜做支撑，完整上乘的劲力才成为可能。
· 辅助药物：外用"开练散"配合内服"开窍丹"，辅助身体度过开练初期的剧烈改造。

【异化组织·格斗者的第二身体】
· 本质：呼吸法调动气血改造身体时，体内会生长出原本不存在的组织器官，统称"异化组织"。首先出现的是额外的筋膜组织（异化筋膜），其持续生长推动身体素质快速攀升。
· 危险：异化组织若无有意识的外部刺激与引导，会在格斗训练后野蛮生长——轻则侵夺正常组织功能，重则产生畸变甚至丧命。
· 天生才能：天生即具备异化组织的人被称为有"才能"者。才能越高，异化组织生长越快、上限越高。但并非人人都能持续成长——有的人到一定限度便终身停滞。无才能或异化组织极少者，只能掌握"小劲"，无缘上乘劲力。
· 生长节律：异化组织有其自然周期——高速成长期（修行事半功倍）→ 沉眠期（暂时沉寂，可能再次苏醒）→ 怠惰期（若长久无法激发则活性渐失）→ 衰退期（彻底沉寂）。如同种子有其萌发与休眠的节律，格斗者需不断寻找激发之法，方能维持异化组织的活力。

【丹水·步入第二限度的关键药物】
· 本质：一种富含高能营养物质、同时含有一部分毒性物质的营养液。旧称"阴阳饮"——意即"一口饮下，或隔阴阳"，极言其凶险。是帮助格斗者突破至第二限度的核心药物。
· 作用机制：饮下后，立刻刺激内脏，加速生发那里的异化组织。格斗者需即时通过呼吸法和劲法调动心肺力量——整个过程中，内脏各器官全部参与，强烈刺激已渗透到底层的异化组织，令其在呼吸劲力的催动下开始蔓延生长。</设定·格斗者·异化组织与基础修行>
