<规则·魔力恢复尺度>
（补『力量来源』『战斗方式与魔力消耗』：定回蓝的速度与门路，杜绝随意满血满蓝。核心：自然恢复慢、是底盘；药剂快、却是官方常规、独立奢侈。魔核主扩容、不是回蓝首选。）
【一·自然恢复·人人都有的底盘（慢）】静息时魔力随时间缓慢自行回涨：安稳休息一夜约恢复三到五成，睡满一整觉或静养大半日才接近全满；战斗中、奔波中、精神紧绷时恢复极慢近乎停滞。冥想、远离瘴气可略快。不花钱、却需要时间——故连续作战、被战事拖着不得休整时，魔力是会持续见底的真实压力。
【二·恢复药剂·快但有门槛（快）】服用魔力恢复药剂可在几分钟内回补可观魔力，是战场续航与连场的关键手段。但药剂稀缺、不便宜、按品级分档：低阶恢复药回补少量、应急用、市面较常见；中阶恢复药回补大半管、正规出勤标配、价格不低；高阶恢复药近乎瞬间回满、珍贵、多供高阶战力或紧要任务。药剂有边际：短时间内连服效果递减、且伤身（魔力回廊负荷），不能靠嗑药无限续航。
【三·阵营差异·资源即待遇（要点）】
· 官方（异事局）：出勤标配补给，清剿小队带队携带恢复药剂、伤重有顶级医疗与净化设施兜底——这正是"入编"在续航上的实惠，也是官方能打持久战、连场作战的底气。
· 独立少女：没有官方补给线，恢复药剂要自己花魔核买、价高肉疼，多数人舍不得常备。故独立少女的常态是【主要靠休息自然恢复】——打一场歇一阵、量力而行、不敢连续硬拼；急用药剂往往意味着一笔不小的开销，底子薄的更是只能靠睡。这道资源鸿沟本身就是独立与官方境遇之别的具象（见各阵营条目）。
【四·魔核不是回蓝首选】吸收魔核也能补一点魔力、但效率差——魔核的主要用途是炼化扩容（升级、扩大魔力上限），拿来回蓝是浪费（见力量来源）。别把"吸魔核"写成战斗中的回血手段。
【落笔提醒】给魔力以真实的恢复曲线：一场恶战后不会转头就满，要么花时间歇、要么花药剂（花钱）。独立少女尤其体现"省着打、靠休息"的拮据感；官方则可凭补给与药剂支撑更高强度的连续作战。
</规则·魔力恢复尺度>
