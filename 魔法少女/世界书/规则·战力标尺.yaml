<规则·战力标尺>
强弱由两条轴共同决定，勿当成"等级高一阶就稳压"的单线世界。
【轴一·魔力总量（等级/阶级）——根基】一切能力都依托魔力；等级=魔力总量，决定续航、战服硬度、技能威力基础盘。
· 见习(Lv.1~10)：单一属性，应对E~D级魔物。对标格斗者第一限度（蕴真种）。
· 正式(Lv.11~25)：熟练2~3属性，独力应对D~C级，各城清剿主力。对标格斗者第二限度（守重命）。
· 精英(Lv.26~40)：精通多属性高阶战技，处理C~B级、带队。对标格斗者第三限度（破妄虚）。
· 战姬(Lv.41~55)：地区王牌，复合属性或「领域」，镇压B~A级。对标格斗者第四限度（载玄机）初中段。
· 传奇(Lv.56~70)：规则级能力，应对S级灾厄、国家战略力量。对标格斗者第四限度巅峰——这是魔法少女体系的硬上限，永无第五限度之力。
魔力差一阶即量级鸿沟：正式之于战姬如萤火比皓月，对方仅凭魔力厚度即可碾压、对冲。
【与格斗者五限度的对照】格斗者之路是更古老、上限更高的体系（详见『格斗者体系概述』）。魔法少女的Lv.70传奇级对应格斗者第四限度巅峰，而格斗者第五限度（抱元一）是魔法少女永远无法触及的境界——这是魔法少女精神裂痕的先天缺陷决定的硬上限，与个人天赋努力无关。故：同阶对位时，格斗者因身心合一、劲气利用效率更高，肉身硬度与续航略胜魔法少女；但魔法少女变身即战、招式多样、成才快，是常规战力的主力。第五限度的格斗者是全球屈指可数的战略底牌，凌驾于一切魔法少女之上。
【轴二·能力相性——可越级取巧、但有上限】这是相性克制的世界：感知系（探测/预知）、特殊系（时间/空间/因果等稀有）对常规系（元素/强化）有机制压制——不是数值高，是"让你碰不到、出不了手、攻击无效"。低阶特殊系确能让高阶火系停滞数秒。特殊系就是稀有难缠、不讲常理，不必平衡掉。
【三道硬限制·绝非无敌】①一切受制于魔力：特殊系同样烧魔力，不够则定身短、范围小、撑不久；②魔力压差可强行反制：对手魔力高你一阶以上能以魔力对冲、挣脱控制（正式时间系定不住战姬、反被镇压）；③须先成功施加：被瞬间逼近打断、被预判躲开、施术被打断，相性优势即无从谈起。
【裁断】相性相近或同阶时特殊/感知系占上风，常规系靠拼魔力、抓间隙、借地利死磕，胜面小但非没有；魔力差一阶以上则魔力厚者可强行碾压相性劣势。低阶特殊系能恶心人能爆冷、却赢不了魔力远胜的高阶——给变数，不给"一技通杀"的无敌。
【主线·少女vs魔物】多数战斗是少女打魔物，按阶对位（见习打E/D、正式打D/C、精英打C/B、战姬打B/A、传奇打A/S）稳扎稳打；越级凶险需相性/地利/拼命。魔物的特殊能力（精神污染、空间撕裂等）同享相性便宜。少女内斗多见于恶堕路线、同理裁断。
【示警】给主角的忌惮须与两轴相称：别让她提防魔力低自己一阶、相性又不克的对手（那是侮辱）。真正该小心的：魔力高一阶以上者、相性正克自己者、身负稀有特殊系者、以及——任何阶位的格斗者（格斗者身心合一、无裂痕、劲气效率更高，同阶对位魔法少女处于劣势）。
