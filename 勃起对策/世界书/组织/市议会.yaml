﻿---
市议会:
  地位: 清阳市最高执政机构之一，市政府为其执行傀儡
  议长: 秦望舒（女，53岁），女权系激进派领袖，连任三届
  副议长: 两名——一名女权系成员，一名建制派女性（象征性平衡）
  总席位: 59席
  女性议员: 37席（62.7%），男性议员仅22席
  派系分布:
    女权系激进派: 24席（核心铁票，控制议程设置，秦望舒直属）
    女权系建制派: 9席（政府女性官员背景，主张渐进，但无独立话语权）
    男性保守派: 14席（多为商会、企业界人士，在性别议题上毫无还手之力）
    中立/摇摆: 8席（不固定站队，视具体议题投票）
    其他: 4席（小党派和无党派，无关紧要）
  专业委员会:
    公安与司法委员会: 女权系垄断，掌握勃起对策部的预算审批和人事监督权。柳妍的拨款和凌若雪的政治抓捕均由该委员会背书
    财政委员会: 男女各半，但女权系通过"性别平等预算审查"条款实际控制大额支出
    教育文化委员会: 女权系铁票区，主导校园性别教育教材审查
  议事规则: 重大事项需三分之二多数通过，但由于女权系激进派联手建制派即可凑齐33票，男性派系在关键表决上从未赢过
  权力特征: 市议会通过"性别影响评估"条款实质上审查所有市政决策——任何政策若被贴上"不利女性"标签即被搁置。议长秦望舒拥有议程排期权，可将不利男派的法案优先表决、不利女派的法案无限期拖延
