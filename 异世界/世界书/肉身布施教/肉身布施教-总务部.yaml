【部门定位】
正式名称：总务部。类型：六部之一。所在地点：总教堂二层。

【负责人】
（详细人设见 `人设/人设-萝拉.txt`）
姓名：萝拉。职位：修女长。罩杯：P罩杯。
上位方式：12岁考入上城区教会大学，因课堂太过活跃被前来"找接班人"的前任修女长看中。萝拉死活不肯——她还想读完大学。最后六个修女把她从校门铁栏杆上硬扛下来，一路哭喊"我要上学！我要读书！"，抗议无效，硬被塞了修女长职务。

【团队画像】
胸围范围：M～O罩杯（全教会部门平均胸围最高的部门之一）。人数：仅十几人，不到其他部门的六分之一。
体型特征：与其他总教堂修女一致——皮肤苍白到近乎透明可见血管，四肢纤细，肌肉极少。胸部的重量对她们格外沉重，稍微跑两步就气喘吁吁。
性格共性：全员行动力强的元气笨蛋。想到就冲，冲到一半忘了为什么冲，然后开始干别的。没有一个人能完整复述自己昨天干了什么，但每个人都坚信自己"今天干了很多事"。

【理论职责】
圣芙蕾雅城及肉身布施教的总体管理工作。作为六部之首，理论上总务部应该统筹协调全教会的行政运转。

【实际做的事】
整个部门完全不按任何计划行事。修女们每天上班后自己拍脑门（或者拍奶子）想一个"今天要做的事"，然后拉上离自己最近的几个修女去办。跑到半路如果看到更好玩的事，立刻忘掉之前的一切。一件事如果三天之内没人提起，就等于从未存在过。
总务部的实际工作成果完全随机——有时候恰好修好了某段城墙，有时候把中城区的垃圾桶全部漆成了粉色，更多时候什么也没干成但大家都很开心。

【办公方式】
办公环境：办公室地面为浅盆地结构，常年蓄有膝盖深的乳汁，桌椅全部浸泡其中，墙壁天花板覆盖淡白色奶渍。
文件与记录：完全不生产任何文件，不做任何记录。办公室内找不出一张纸、一支笔。修女们甚至不知道"档案"是什么意思。
信息传递与汇报：所有工作全靠记忆和口耳相传。交接方式是走廊擦肩而过时喊一句"那个事你记得办啊"，对方回"什么事？"，喊的人想了想"算了我也忘了"，双方愉快地各走各路。向萝拉汇报只需开口说话，但她通常在第三句之前就会打断——要么突然想到更好玩的事，要么已经忘了对方在说什么。

【管理风格：灵感驱动与"我忘了"主义】
萝拉的管理哲学是"今天有什么好玩的事可以做？想不到就放假"。具体表现为五个标志性行为：
一、灵感启动。每天早上醒来躺在床上想今天有什么好玩的事。想到了就立刻翻身起床去干，想不到就当场宣布放假继续睡。
二、就近抓人。从不指派任务，想到什么直接拉起离自己最近的几个修女去办，不管对方正在干什么。
三、半路漂移。执行途中看到更好玩的事立刻忘掉之前的一切，转向新目标。原任务就此蒸发。
四、循环广播。同一条信息会在一天之内对同一个修女说三遍，每次都以"对了我想起来了！"开头。
五、绝不认账。被质疑忘了某事时，标准回答是"我没忘，我只是暂时没想起来"。

【部门特有文化】
"只听最后一句话"传统：总务部修女们经过长期进化，已经自动过滤掉萝拉说的前N句话，只接收最后一句。因为前面说的内容大概率在她说下一句话的时候就已经作废了。
"今天放假"文化：总务部的放假频率是全教会最高的。萝拉平均每三天就会宣布一次放假。但修女们放假也不知道干什么，大部分人会继续待在有乳汁池的办公室里嬉戏打闹——本质上和上班没有区别。
拍奶决策法：当修女们想不出要干什么时，会用拍打自己或彼此的乳房的方式来"激发灵感"。拍得越响，想法越离谱。最离谱的一次，一位修女拍出了"把总教堂所有门牌换成假鸡巴形状"的主意，结果真被萝拉批准执行了——然后执行到一半大家忘了为什么要换，至今还有几个门牌是假鸡巴形状的。

【跨部门关系】
外交部：外交部没有固定办公地点，其修女长期驻扎总务部办公室，这里实际成了外交部在城内的据点。两个部门共用一间办公室已成惯例。
议事会：总务部修女长是议事会固定成员（九修女长之一）。由于总务部不产生任何文件，议事会上涉及总务部的内容全靠口头汇报，且与其他修女长的记忆版本经常对不上。
大祭司：大祭司将跨部门临时协调事务默认丢给总务部处理。总务部接下后通常没有下文——但大部分事务因为无人干预反而自行消解。
文献部：同在二层，互为邻居。文献部掌管全教会唯一档案库，总务部连"档案"是什么意思都不知道。文献部偶尔来借调文件，回答永远是"什么文件？"。
后勤部：总务部修女是后勤部厨房最频繁的光顾者。放假后无处可去的总务部修女默认流向后勤部蹭甜点，后勤部对此表示欢迎。
财务部：总务部从不申请经费（不知道要花钱），财务部从不来查账（总务部不存在账），两个部门在财务问题上达成了完美的互不打扰默契。
