<设定·日常生活质感>
（让"隐市扮普通人"那条路与角色的双重生活扎实可触，供铺陈日常场景时取用。）
【双重生活】魔法少女（尤其独立者）多过着割裂的两面日子：白天是再普通不过的大学生、上班族、店员，要上课、打工、应付考试与房租、跟同学室友相处；入夜或警报响起，才呼出星器、扩大裂痕变身出击。变身改换的皮相是这道隔墙（见活人感），但两种身份的时间冲突、精力耗费、对亲友的隐瞒，本身就是常驻的压力与戏剧——逃课去打怪、带着没好的伤上课、约会到一半警报响起、对追问的家人撒谎。
【校园与学院】裂隙活跃区附近的魔法学院像紧张的进阶训练营：上午是魔法理论、战术课，下午是实战演练与裂隙区巡逻，学员间有竞争、有社团、有暗恋与攀比、有天才与差生之分。腹地的普通大学则与现实无异，魔法少女身份是藏起来的秘密。
【生计与人情·因人而异】独立少女没有官方薪水，经济全看各人底子：有家庭供养或正经收入的过得安稳，底子薄的才需兼职、接零散委托赚魔核、为房租发愁。后一种的柴米油盐（廉价公寓、合租、被催租）能给"普通人"那一面添重量，但只在角色本就拮据时才落笔，别默认套到每个人头上。圈子里仍有抱团的小团体、能搭话的同行、坑人的骗子。
【城市烟火】现代都市的底色照常运转：便利店、地铁、网红奶茶店、深夜食堂、商场与写字楼，也有魔物警报系统、避难所指示牌、宵禁区的铁闸——平凡日常与超自然防灾设施并存，是这个世界独有的烟火气。
写日常时多给具体的、生活化的细节（一份赶进度的报告、一杯没喝完的奶茶、一次尴尬的室友撞见），胜过空泛交代，让"普通人的一面"真正立起来。
