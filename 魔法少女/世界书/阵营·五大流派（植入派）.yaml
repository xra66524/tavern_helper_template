<阵营·五大流派——植入派>
（推崇植入技术的格斗流派。与植入体体系互为表里——植入体是技术层面的路径，植入派是社会组织层面的力量。适用于角色涉及赛博改造、企业背景、技术流格斗者相关剧情时参考。）
【理念与背景】
植入派由推崇植入技术的那一批格斗者组成，其中颇有一部分是生物工程师和技术专家，更多的是高级植入体战斗人员。外界通常认为他们是一群植入和改造狂人——其实很多加入植入派的成员并没有做很夸张的植入改造，理念上的重视往往比身体上的改造更重要。很多东西与国家绑定，因此更容易得到国家的信任。
从全球范围看，植入派数量最多，但同时也最为分散——彼此有着太多不同的理念。植入派普遍认为，随着技术进步，植入体才是现在世界的未来，能帮助很多没有天赋和才能的人走上这条道路。成员个个技术派，最擅长将自身的战斗体系与植入技术结合起来。

【目标与追求】
植入派更希望看到的是，植入体能够有朝一日武装整个人类世界，成为人类进化的必须物，活跃意识体也能成为泛用物。最终所追求的是——人造异化组织能够取代并超越目前的天生异化组织。保守和封闭不利于他们的技术研发。
植入派人员多数是中下层格斗者或科研人员，反而第四限度层次的武力不是特别多，只是靠着活跃意识体作为补充。
中国植入派总部位于北京，与中科院生物研究所隔街相望。

【与魔法少女的关联·改造魔法少女】
植入派的思路核心：魔法少女的力量来自精神裂痕，而裂痕能量输出受限于肉身状态。改造肉身，就能优化能量输出。
· 改造方向：①强化肉身承载力——能承受更高烈度的魔力输出，延长战斗时限；②植入魔力回路或魔力增幅装置——人工放大招式威力，或实现普通魔法少女做不到的精密魔力操控；③裂痕稳定装置——降低日常侵蚀风险，理论上可让魔法少女的侵蚀值长期接近零。
· 后天魔法少女（拟似魔法少女）：植入派最激进的尝试——用植入体系统模拟裂痕的魔力输出，让没有天赋的人也能获得魔法少女级别的战斗力。产物纯度与上限不及天生魔法少女，但胜在可量产。目前已进入有限试验阶段，在异事局研究院内部引起极大争议。
· 战服形态：魔装与植入体融合，常呈现半机械结构——外露的魔力导管、关节处的机械强化组件、眼部或胸口的能量指示灯。不追求华丽，追求功能性与模块化（植入部件可随任务更换）。
· 技术协同：与异事局研究院关系紧密（双方都在研究裂痕共鸣机制）。植入派的技术人才与研究院之间存在人才流动和技术合作，但也存在路线之争——植入派更激进，研究院更保守。
· 社会争议："改造这么多的还算是魔法少女吗？"——但植入派不在乎定义之争，只看战斗效果。改造魔法少女在一定程度上打破了"魔法少女=天生才能"的铁则，这对传统魔法少女观念冲击极大。
· 代价：过度改造可能损及裂痕本源，或产生严重技术依赖——一旦植入体损坏，战力断崖式下降。且拟似魔法少女的长期身心健康影响尚不明确。
</阵营·五大流派——植入派>
