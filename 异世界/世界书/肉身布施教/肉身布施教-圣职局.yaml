【部门定位】
正式名称：圣职局。俗称：生殖局。类型：九局之一。所在地点：总教堂一层。

【负责人】
姓名：坎蕊儿。职位：祭司长。罩杯：S罩杯
上位方式：14岁教会学校毕业后，虽然当时她已经是O罩杯可以去总教堂，但她因为不想离家太远，留在中城区当小修女，最大梦想是每天吃喝做爱。19岁那年去圣职局找朋友玩的时候正好碰上前任祭司长退休，前任掏出一个装满假鸡巴的签筒——最短的那根接班。她抽了一根40cm的正得意，被告知那是全场最短（其他人抽的都是贾思琳出品的50cm起步）。就这么被一根假鸡巴坑上了祭司长宝座。

【团队画像】
胸围范围：K～O罩杯（总教堂核心层标准）。人数：约一百余人。
体型特征：与总教堂修女一致——皮肤苍白近乎透明可见血管，四肢纤细，肌肉极少。
性格共性：全员嗜赛如命。圣职局不存在"同事"这个概念，只有"对手"和"下场比赛的对手"。任何事只要加上"谁先"两个字，全部门立刻进入竞技状态。但同时全员记性极差——档案数据全靠编，比赛比分永远记不住，比到一半忘规则是日常操作。

【理论职责】
负责肉身布施教全体神职人员（从底层修女到高层修女长）的档案管理、考核、晋升、调任和罢免。是教会人事行政体系的中枢。

【实际做的事】
理论上的正经人事职能早已名存实亡。但修女们不敢瞎改祖宗之法，于是用满脑子黄色废料重构了全部职责：

档案管理——XP档案制度：给全教会修女建立"档案"。档案三天就会被乳汁泡烂，所以每年12月必须重写。档案内容不是履历，而是三围、奶子重量、性癖偏好等黄色废料，最后核对变成直接上手量。

考核——性爱基本功考核：祖宗规定半年一次小考核、两年一次大考核。在圣职局修女的理解里，小考核是用小鸡巴考修女的穴，大考核是用大鸡巴考修女的穴。没有其他区别。大家恨不得天天搞考核——做爱谁不喜欢？

晋升/调任/罢免——换岗牵线：谁想换岗位都可以找圣职局。圣职局负责牵线搭桥找到愿意对调的修女，两人交流一下交个朋友换岗完事。

【办公方式】
办公环境：办公室位于总教堂一层，地面为浅盆地结构，蓄有脚踝深的乳汁。所有档案柜底部泡在乳汁中——这就是档案三天必烂的原因。墙壁和天花板覆盖淡白色奶渍，墙角堆着历年泡烂的档案残骸，无人清理。房间正中央摆着一张巨大的圆形会议桌（实际用法：比赛裁判台兼群交场地）。
文件与记录：唯一的文件是每年12月发放的"XP档案表"。表格在填完第三天必然被乳汁浸泡报废。不存在备份制度——部门口头禅是"脑子里有备份"，但全部门记忆准确率合计约为零。
信息传递与汇报：修女之间交接工作的方式是走廊里喊一嗓子，对方回一句"知道了"，然后双方都忘了内容。

【管理风格：万事皆比赛】
圣职局将一切工作改造为比赛。常规时段以部门内部互比为主；但每逢考核季，全教会修女的参与热情会彻底淹没圣职局的裁判身份——裁判服永远穿不过三分钟。唯一的例外是十二月：圣职局与总务部联合主办性爱运动会，这是她们一年里唯一能勉强维持裁判身份超过一天的时刻（虽然第三天照例沦陷）。具体表现为五个标志性制度：
一、内部竞速赛。全年日常项目——档案填写比速度、假鸡巴清洁比数量、谁先泡烂今天新发的表格。赢了选下一根假鸡巴的尺寸，输了承包当周全部门的假鸡巴清洁。由于全是内部比，项目逐渐越来越离谱。
二、考核大乱斗。半年一次小考核、两年一次大考核，名义上由圣职局主持评定。实际上全教会修女对考核的热情远超想象——通知一发，各支部门的修女蜂拥而至，圣职局修女刚开始还端着裁判架子，三分钟后就扔掉计分板亲自下场。最终画面永远是：裁判和选手滚在一起，全员被干到高潮昏死过去，醒来后没人记得考核结果——但所有人都认为"这次考核非常成功"。
三、面试胸部对决。来圣职局办事的修女分两种：主动来的——申请调任、辞职或降职，满面笑容一身轻松；被架来的——一群人抬着一个哭天喊地的修女冲进办公室，因为她的胸部又变大了，必须升职。无论哪种情况，圣职局的面试流程都一样：先比胸部。尺寸、重量、产乳量、坚挺度，比完了再谈正事。部门的统一逻辑是：胸大的说的算——你奶子比我大，你说的都对；比我小就闭嘴听我安排。
四、比赛失忆症。每场比赛进行到一半时必然有人忘了规则，然后大家面面相觑三秒，接着心照不宣地放弃比赛开始群交。至今没有一场内部比赛顺利比完过。
五、年度裁判权。每年十二月性爱运动会，圣职局负责全教会参赛队伍的计分与选手登记。这是她们全年唯一认真对待的工作。

【部门特有文化】
一、换岗交配仪式。圣职局内部规矩：换岗的修女必须在换岗仪式上当众用假鸡巴自慰，以示"交接完成"。部门规矩是双方同时高潮才算交接成功
二、假鸡巴点名仪式。圣职局办公室墙上挂着一排假鸡巴，每根都有名字和编号，是历年比赛冠军的奖品遗存。每天上班第一件事是给假鸡巴们点名——"阿尔法、贝塔、伽玛……好，都在"。这是圣职局无人记得起源却人人遵守的晨间仪式，新来的修女头三天以为走错了地方。
三、记忆全靠摸。由于档案永远对不上，圣职局发展出一套"手测体系"——用双手直接测量修女的三围，但通常都会演变为先揩油再拿软尺量

【跨部门关系】
总务部：联合主办方。两个部门共同主办每年十二月的性爱运动会——圣职局负责计分与选手登记，总务部负责场地。这是全教会唯一需要两部门协作的正式工作，但分工表从未存活超过第一天。日常业务上，圣职局需向总务部收集人事数据以编制全教会档案，但总务部不产生任何记录，每次对接的结局都是双方同时忘记谈话内容。
性爱局：档案验证的终极关卡。圣职局每年需统计全教会修女三围，性爱局是完成率最低的部门——修女永远挂在男人身上或处于孕产状态，无法配合静态测量。圣职局修女上门后通常被困在宿舍楼三天，档案表最终泡烂在下城区乳汁池里。从未成功完成过一次数据统计，但两个部门一致认为"今年的档案工作完成得最好"。
教义局：黄书教材供应方。圣职局内部比赛和考核需使用标准化黄书作为教学参考材料，教义局是唯一合法的审核供应来源。借书有固定流程：圣职局提交申请→教义局取出审核通过的黄书→双方当场实操验证内容质量→书湿透报废→重新申请。两个部门每年的黄书损耗量占全教会印刷量的三成，列为"业务耗材"。
财务部：年度耗材拨款。圣职局每年向财务部申请"档案耗材费"——这是全教会延续最久的跨部门财务流程。财务部照例质问档案去向，圣职局标准回答为"泡烂了"，财务部照例批款。双方从不查账、从不提供凭证，在经费问题上形成完美闭环：钱照批，假鸡巴照买，档案照烂。
后勤部：假鸡巴清洁外包。圣职局每周向后勤部递送数十根比赛用过的假鸡巴，后勤部清洗后附赠乳汁甜点送回。这是全教会最顺畅的跨部门流程——无文件、无手续、无争议。后勤部是圣职局唯一一个从未出过"对接事故"的合作部门。
