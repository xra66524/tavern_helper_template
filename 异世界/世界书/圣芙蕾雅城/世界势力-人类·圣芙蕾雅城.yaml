　　第一部分：总览-色欲与自由的性爱之都

圣芙蕾雅城，政教合一的城邦国家，坐落于维里迪亚大陆是的极西之地，拥有从迷雾群岛通向维里迪亚大陆的优良深水港。是维里迪亚大陆及迷雾群岛有名的销金窟，要塞与险地。在这个城市国家内，女性性欲旺盛，痴女遍地都是，性爱与逆强奸随处可见。迷雾群岛的海盗与维里迪亚大陆的冒险者们，最大的梦想便是来圣芙蕾雅城体验一次这里奔放的女人。

第二部分：地理风貌与城市结构

环境特征:圣芙蕾雅处于两座山脉的交界隘口处且位于海边，是天然的易守难攻之地。地下埋藏着大量的魔鬼与恶魔尸体，使得这里的空气充满了淡粉色的催淫瘴气。因此圣芙蕾雅城的周边怪物密集且丧失了除交配，奸淫以外的所有智慧。

城市结构：功能分区下的巨型城市国家

整座城市以肉身布施教总教堂为轴心，共分为上城区，中城区，下城区三大城区。

上城区：位于圣芙蕾雅城以总教堂为中心点，三公里范围内的中心地带，是圣芙蕾雅城的旅游区、外交区、娱乐区与商业区。总教堂位于此城区中心地带。

中城区：环绕上城区的广大区域，是圣芙蕾雅城货真价实的生活区，居民、贵族与修女混杂居住。圣芙蕾雅港位于此城区。

下城区：位于远离海岸的一边，依托山脉关卡而建。既是防卫军与教会骑士团的驻地，也是解决恩怨的角斗场所在地。特殊欲望矫正与释放中心位于此城区。

第三部分：人文环境与社会形态

肉欲文化：圣芙蕾雅城是肉欲之城，男欢女爱乃天经地义之事。圣芙蕾雅城不论男女人人纵欲，近亲结婚，通奸乱伦等行为更是司空见惯且被鼓励。并且女性比起男性更加痴迷于性爱。但对于同性恋是绝对的零容忍。

乳汁文化：由于肉身布施教修女们的泌乳体质，圣芙蕾雅城在乳汁上面产生了一系列的文化，基于母乳的乳制品冠绝整个大陆。

以白为美：在圣芙蕾雅城以及肉身布施教内，认为女性的皮肤越苍白代表她越纵欲，越是肉身布施教的忠诚信徒，因此修女们和贵族女性的皮肤白得有些刺眼。不是那种健康的白皙，而是一种近乎透明的、病态的苍白。甚至能清晰地看到皮肤下青紫色的血管，就像是大理石上的纹路。

不分厕所：圣芙蕾雅城的厕所是男女混用的，不分男厕女厕，不论男女，小便的时候都是站在小便池前撒尿的

肉欲乌托邦：在肉欲和催淫瘴气的双重作用下，整个城市都呈现出一种类似于乌托邦的状态，人人热衷于性爱，没有争斗之心，也没有勾心斗角，如同性爱的天堂一样。在这里，处女和清纯是骂人的词，说一个女人是滥交婊子才是夸赞。

历史遗忘：由于乳汁办公摧毁了几乎所有纸质档案，加上三百年来从未有人认真记录历史，圣芙蕾雅城从上到下对三十年前的任何事情都一无所知。没有人知道议事会为什么停摆，没有人记得初代修女们的事迹，甚至没有人说得清自己部门是干什么的。但也没人在乎——反正不影响做爱就行。

第四部分：组织与机构

肉身布施教：圣芙蕾雅城的统治教派。核心教义是通过免费的性爱与乳汁的自由释放，向世人传递肉欲的美好以及自我的彻底解放。其下设有总务部、文献部、建设部、后勤部、外交部、财务部以及九大局等机构。

圣芙蕾雅城防卫军：理论上的常规军事力量，从上到下完全由女性构成，但十分疏于训练，成员热衷于和弱小魔物及人类的性爱技术。长期驻扎下城区。

教会卫队：由身体素质较好且胸部大于L罩杯的修女中选拔而来，充当着圣芙蕾雅城的执法者角色，同时也负责守护总教堂的安全。
