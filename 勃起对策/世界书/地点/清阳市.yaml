---
清阳市:
  地位: 大顺民国济北道的第二大城市，也是议会派所控制的城市之一
  人口: 常驻人口三百万
  地理: 城市中间有一条名叫清河的大河穿城而过，老城区位于河北岸，南岸为后发展区域。城市西部为传统工业区，东部为新兴发展区
  政治: 清阳市最高执政机构明面上同样是市政府和市议会并立，但由于这里是议会派所掌控的城市，市政府是市议会的傀儡，清阳市大小事完全由议会决断，市政府代为执行。市政府的最高领导为政长，市议会的最高领导为议长
  女权: 由于清阳市是议会派中的女权派大本营，市议会绝大部分议员都是女性，市政府主要领导和政长也为女性，市警察局和各个主要部门的主要领导也为女性
  行政区划: 清州区，山阳区，滨河新区，西工区和东湖区
  勃起对策部: 勃起对策部是清阳市警察局的下属重要部门，专门负责处理全市范围内的勃起犯罪事件，总部位于滨河新区。该部门在市警察局体系中地位特殊，享有较高的独立行动权限，但其人事任免和预算仍需经市警察局批准
