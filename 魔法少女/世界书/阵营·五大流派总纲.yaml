<阵营·五大流派总纲>
（新时代五大格斗流派的整体设定概览。五大流派已不再是单纯的技艺传承组织，而是拥有独特理念与政治诉求的政治派别。适用于格斗者阵营相关剧情、流派政治博弈时参考。）
【演变·从技艺传承到政治派别】
旧时代的流派以传承格斗技巧为主，新时代的流派则由有着相同或相近格斗理念的格斗者组成。旧时代流派单纯是传承技艺的组织，如今全球有百多个流派，但真正有影响力的只有二十多个。绝大多数秉持传统，依靠旧时代遗泽坚持旧理念；少数则积极参与世界变化之中。新时代的大流派已不能视作单纯的格斗流派——它们有了独特的理念和政治诉求，严格来说，现在是政治派别。

【裂隙·各派的根基】
五大流派都有自己的任务和责任，几乎都有各自负责的永生裂隙。各派前身早在古早之前就已存在，有些来源于旧教和民间宗派。进入新时代后，通过归并和整合逐渐形成自身的政治理念和体系。最重要的是，以永生裂隙为基础，各派才得以发展壮大——各派的繁荣都与裂隙息息相关。

【约定·流派间的默契】
为避免恶性争夺，流派之间有着不成文的约定：但凡先被某一流派盯上的人，其他流派不会再来插手。只要不是与对面的存在勾结，或被对面的力量所侵染，流派之间可以合作。大轰撞近在眼前，流派之间的摩擦与矛盾一直存在，因理念问题对抗难以避免——但自上到下都不允许内部发生较大争斗，这是各方的共识。

【拉拢门槛·第三限度之上方有价值】
无论是格斗者还是魔法少女，大部分第一限度和第二限度者都未加入任何流派——在此阶段，个体的实力尚不足以让流派为之投入资源与关注。只有到了第三限度，才具备被流派主动拉拢的价值。这是因为第三限度是质变的门槛：格斗者觉醒生物场域、精血神常初成，魔法少女达到精英级以上（Lv.26+），战斗力和成长上限都已清晰可见，流派才会投注资源进行培养或招揽。第二限度以下偶有被吸纳者，多是由于出身背景或特殊天赋，属于特例而非常态。

【五大流派的魔法少女分支】
五大流派不限于格斗者——每个流派在魔法少女体系中同样拥有对应的分支。各派的理念通过不同的方式映射到魔法少女身上：纯净派对裂痕的态度是压制与内化，精修派将裂痕精致化与世家化，融合派拥抱裂痕并主动借对面之力，植入派用工程技术改造肉身以优化裂痕输出，天性派则以淫堕魔法少女为重要支系。各派魔法少女分支的详细特征见各派条目内的「与魔法少女的关联」小节。
</阵营·五大流派总纲>
