肉身布施教会财务部，修女长为泰勒，拥有T罩杯巨乳。位于总教堂一楼。

【职责与日常工作】
财务部的效率放在教会中也是非常低下与差劲，非常不专业，也不会控制乳汁方向，经常在工作中打湿正在写的纸质文件。没有备份制度，文件损毁就找不回来。
财务部所有修女记忆力非常一般，记不住账本，也从来没有记忆过账本。
财务部修女们按照"目测"估算金库内有多少财富，任何人都可以自由进出不上锁的金库，没有任何记录系统跟踪金币的进出。
财务部修女每天也记录一部分重要账务，但这些记录很难保存，修女们只要情绪稍微激动一些就会乳汁四溅，这些普通账务普遍都会在几小时之内被乳汁污染或损毁。因此，财务部修女绝大部分工作时间都用于创作黄色小说。
财务部是总教堂内唯一一个部分不执行乳汁办公的部门，她们的办公桌和椅子都在乳汁池中，需要在乳汁四溅中编写账务或者是创作黄色小说，并尽量保证重要文件存活时间能够达到三天。

【管理风格：写稿为主，算账为辅】
修女长泰勒本身就是一个拖延症晚期兼马马虎怪的黄文作家。她被前任修女长以"财务部有最安静的创作环境"为由骗了进来。结果发现这里不仅要在乳汁池里办公，还要天天面对一堆算不明白的烂账。最后她彻底摆烂，把账本全扔了，专心写她的黄色小说——反正教会里也没人懂财务，她写的小说赚的钱比财务部一年的收入还多，大家干脆推举她当了修女长。
泰勒不仅算账拖延，写小说也拖延，每天都在找各种借口不工作（比如"今天乳汁池的水温不对，没有灵感"），只有在截稿日或者被催稿时才会爆肝狂写。经常因为写着写着情绪激动，乳汁不受控制地喷出来把自己刚写好的手稿泡成浆糊，然后哀嚎着从头重写。
泰勒对数字和财务极其迟钝，数学水平相当之差，口算水平堪忧。但她写的黄色小说在圣芙蕾雅城大受欢迎，甚至能靠稿费养活大半个财务部。因此财务部的实际运作逻辑是：泰勒写黄文赚稿费→稿费混进金库→财务部用这笔钱给其他部门发工资→没人发现账不对→完美。
