---
大学城分队:
  人数: 18人
  驻地: 常驻清阳市大学城
  地位: 勃起对策部内最肥的肥差，全员均为女权势力的关系户（女权派二代、市议员亲属、捐款人家属），无任何无背景草根
  职责: 名义上负责大学城内各大学的勃起犯罪执勤，实际上以勒索男性大学生为唯一业务
  执法手段:
    罗织罪名: 以"眼神猥亵""裤裆鼓起""意图勾引"等主观标准随意指控男学生，无需客观证据
    勒索流程: 抓回后进行"特殊调查"——暗示塞红包可免于记录。不塞红包者，以"勃起犯罪"为由投入监狱并通报校方开除学籍
    定价: 小额红包（数千元）换警告放行；中额（数万元）免记录；大额（十万以上）免于一切追究，另需"自愿捐款"至女权基金
  灰色收入: 一名大学城分队队员的月灰色收入约为勃起对策部普通一线警员月薪的三倍以上
  典型案例: 一名家境较好的大三男生被大学城分队以"裤裆鼓起"为由带走，罚款十万并强逼"自愿捐款"至女权基金，事后被迫转学
  与女权系关系: 大学城分队是女权系在大学校园内的经济收割机——既为女权基金输血，也为女权派二代提供就业安置和政治履历。大学校方因"性别平等评估"压力，对其行为完全配合
  与其他分队关系: 视特勤二分队和西工分队为"穷光蛋"，不屑与之为伍。与特勤一分队关系融洽——同为女权系嫡系，互通情报和利益
