肉身布施教上城区修女，上城区修女长为萝丽莎，拥有Y罩杯巨乳（全教会第二大，仅次于圣女阿斯特丽德的Z罩杯）。

【部门架构】
正式名称：肉身布施教上城区修女团。俗称：上城区修女。类型：三大城区修女团之一。所在地点：上城区，下辖十二座教堂。全教会统一职级体系见 `肉身布施教-职级体系`，实际运转见 `肉身布施教-实际运转`。

组织层级：
- 修女长（1人）：萝丽莎，Y罩杯。名义上的团长，实际上永远挂在某个男人身上，所有"管理"都是路过时随口丢下一句话。详见【负责人】。
- 主教修女（12人）：分别驻守上城区十二座教堂，每人下辖两名中级祭司，胸围多在N罩杯。身为教堂领导者，她们每天的必修课是扫厕所、刷浴池——地位越高越该亲手干脏活。做完卫生便接客做爱，两件事同等虔诚。
- 中级祭司（24人）：每座教堂两名，是上城区修女团实际干活的中坚层。胸围L～N罩杯。她们负责安排商店驻守轮班、接待重要外宾、以及每隔一两年想起来一次"是不是该领工资了"。在上城区修女中，她们是唯一勉强具备"计划"概念的人——虽然计划通常执行不到一半就被新来的外国男人打断。
- 初级祭司（上百人）：分布在各教堂和主要商店，作为中级祭司的助手协调基层修女。胸围J～L罩杯。她们的工作内容介于"管事"和"干活"之间——中级祭司说"你去安排一下"，她们说"好"，然后转头就忘了要安排什么。
- 普通修女（三千余人）：修女团的绝对主体，分散在上城区各大商店、娱乐场所和公园中。胸围I～J罩杯为主。她们的工作哲学是"想干什么就干什么"——因为上面四级管理者全都不管事。唯一的共同默契是"有外国男人来了先放下手头的事去接客"。

实际运转：以上架构纯属教会纸面上的规定。上城区修女团的实际指挥链是不存在的——萝丽莎不管理任何人，主教修女每天扫完厕所就去做爱，中级祭司发下去的安排永远没有下文。

【负责人】
姓名：萝丽莎。职位：修女长。罩杯：Y罩杯（全教会第二大）。
上位方式：12岁入教当天在入教仪式上展现出惊人淫乱天赋，被性爱局修女们一哄而上集体推举为祭司长。13岁时前任上城区修女长因35岁退休，上城区三千修女不约而同把她架到修女长位置，至今稀里糊涂当了整整十五年。

【团队画像】
胸围范围：I～N罩杯。人数：约三千一百余人。
体型特征：与总教堂修女一致的苍白透明皮肤、纤细四肢，胸部的重量对她们格外沉重。但她们从不遮掩胸部的晃动，乳汁随手甩在商店柜台上，走路带风、奶摇带响。
性格共性：全教会最放浪、最不知羞耻的一批人。面对外国贵族时心情好了敷衍两句场面话，心情不好直接扑上去。

【理论职责】
为上城区约四十万男性游客、海盗、外国贵族与外交官提供宗教服务与性爱慰藉，维护圣芙蕾雅城对外形象的体面。

【实际做的事】
陪外国男人做爱，以及帮男性游客在商店买单。在上城区，女性购物须自掏腰包，男性则看中什么直接让商店旁的修女付钱——完事后和修女做一次爱就能拿走商品。不过很多男性为避免被榨干，宁可自己掏钱也不让修女搭手。修女们薪资微薄，且出于脸面一年只领一次工资，领到当天便全花在给男性消费上，一分不剩。平日囊中羞涩程度其实比中城区修女还严重，花光工资后就靠喝自己产的乳汁维生——反正修女喝自己的奶永远饿不死。

【办公方式】
办公环境：以上城区十二座教堂及商业区商店为据点。上城区教堂装饰华丽、乳汁池深阔——毕竟这里是圣芙蕾雅的门面。修女长办公室常年空置，萝丽莎几乎不在里面。
文件与记录：不产生任何内部文件。对外国游客的接待完全靠修女个人的记忆——一个游客来过三次之后，总会有修女记得他喜欢什么姿势，但记不住他的名字。
信息传递与汇报：没有汇报制度。萝丽莎偶尔挂在男人身上路过时丢下一句"今天多接几个啊"，修女们回一句"好的"，双方都不会记得这件事。重大消息靠修女们口耳相传，传播速度取决于当天有多少修女在同一个商店门口排队等男人。

【管理风格：无管理即管理】
上城区修女团的管理制度是——没有制度。具体表现为五个标志性制度：
一、彻底放养。萝丽莎不下任何指令，修女之间不分配任务。每人早上醒来自己决定今天站哪家商店、陪哪个男人。外国游客源源不断，工作自动找上门，无政府状态自然维持。
二、外国游客优先。全团唯一隐性纪律：看到外国游客先服务，不能让外人觉得圣芙蕾雅修女怠慢客人。其余一切——纠纷、教堂维护、物资补充——排在"接完这个客人再说"之后。
三、一年领一次。工资制度理论上存在，修女们出于脸面一年只领一回。财务部早已放弃催促。
四、商店买单制。男性购物由修女付款，全团唯一被严格执行的流程。修女们真心觉得为男人花钱比为自己花钱快乐，一天没给男人买过东西就觉得这天白过了。
五、自愈式遗忘。所有内部矛盾、失误、遗留事务，不到一天自动清零。每天都有新男人来，注意力永远在下一个，没人有闲心计较昨天的事。

【部门特有文化】
懒得装：全教会最不在乎体面的人。外国贵族来访，别的部门还会收敛一下，她们心情好敷衍两句，心情不好直接扑。
一年一度的领工资仪式：一年领一次，领到当天全团涌向上城区最贵的商店，买礼物、请吃饭、包场子，一天花光。这不是经济活动，是狂欢节。
替男人花钱是福气：为上城区修女的核心信仰。如果修女一周没给男人掏过钱，会陷入存在危机——"我是不是不够骚了？"

【跨部门关系】
中城区修女团：中城区修女领完工资后的主要消费目的地。上城区的商店是中城区修女们为数不多能把工资花出去的地方，上城区修女对此热烈欢迎——因为这意味着更多男人来逛商店。
下城区修女团：上城区修女觉得下城区修女太野太脏，下城区修女觉得上城区修女太装。双方极少主动往来，偶尔在下城区角斗场碰面时上城区修女会坐在最远的看台上。
性爱局：萝丽莎是性爱局推举出来的，两个部门在"性爱至上"的根本理念上完全一致。性爱局的年轻修女常来上城区"实习"，实则是想见识外国男人的尺寸。
财务部：上城区修女一年领一次工资的特殊节奏让财务部核算极其痛苦。财务部最终放弃了对上城区的任何财务规划，在账本上专门为上城区开了一页，上面只写着"随缘"。
总务部：总务部偶尔会有修女跑到上城区执行奇思妙想（比如尝试把某个商店招牌换成假鸡巴形状），但上城区修女通常会阻止——"别闹，有外宾看着呢"——这是上城区修女唯一会认真说"不"的时刻。
