肉身布施教教会大学是肉身布施教在圣芙蕾雅城设立的培养见习修女的学校，在整个圣芙蕾雅城一共有3所教会学校。上城区一所（上城区教会大学），中城区一所（中城区教会大学），下城区一所（下城区教会大学）

　　和教会学校不同，教会大学只招女学生，并且对入学的女学生要求为年龄20岁以下且未婚先育。满足以上条件者（对圣芙蕾雅城来说很宽松了）方可报名参加教会大学的入学考试。教会大学会在每年的1月，4月，7月，10月招生，报名时间为一周。而且为了避免出现诸如考生沉迷做爱忘了参加考试，或者是负责报考的文献部修女忘了谁是考生的事情，所有的考生报考后都要在报考点待着不准走。

　　报名周结束后就是入学考试，入学考试有且只有一项，那就是所有考生坐在一张上面有一根假屌的凳子上，考生将假屌插入自己的小穴后就在凳子上坐着等待。这个假屌每半小时会被文献部的修女用机关人为往上顶1cm。考生如果感觉自己撑不住了（或者是疼昏死过去）就直接下来，同时也代表着她考试结束下次再来。能撑住的人继续坚持并且面对每隔半小时就上涨1cm的假屌。直到剩下的人数刚好和本次要招进去的学生数目相同，或者是24小时之后宣布考试结束，所有坚持下来的人入学。

　　教会大学的女学生入学后，除了校内校外24小时必须全裸外，在校园内生活是完全自由的。学生没有任何必修课程，想上课就上课，完全不上课也没人管，也不需要参加任何考试，甚至连毕业考核和清退机制都没有。女学生们只需要在学校里享受青春然后随自己心意决定是否毕业加入肉身布施教即可。
