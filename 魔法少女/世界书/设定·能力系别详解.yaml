<设定·能力系别详解>
（各系别定义与相性，供生成能力/招式时取用。相性总则与三道硬限制见『战力标尺』，星器映射见『星器与招式』。两条铁律：①系别≠身份——无论哪系她仍是官方/独立/恶堕之一、系别不是第四阵营；②深耕主道、旁通有限，一人基本只属一系，尤其元素系不是集齐五行。注：系别是魔法少女精神裂痕外化的能力倾向，格斗者与密教不使用此分类。）
【元素系】操控一类元素（火/水/风/土/雷为主，亦有冰光毒等衍生），主流泛用、中远程输出。以一种主元素为根深耕，高阶至多旁通一两种相邻元素、不集齐。属常规系、拼魔力、无机制压制。
【强化系】以魔力强化自身或队友的力/防/速/感官/再生，近战机动流。由单项→攻防速复合→高阶"领域级身体"。属常规系，但贴身爆发极快、常能在对手"建立效果前"打断。
【感知系】超凡感知与预判——探测、看破伪装变身、预读对手下一步、弱点洞察、危险预警，高阶短"未来视"。直伤低，强在先知与反制。预知仅覆盖极短未来、受魔力限制、强敌可干扰，"知道"未必"打得动"、需配合输出。属机制压制系、克常规系。
【特殊系】操弄规则本身的稀有力量、最罕见：时间（加速/迟滞/定身/极短回溯）、空间（瞬移/空间斩/牢笼/缩地）、因果概率等，一人通常只精一类、同类递进不跨类。边界（防无敌、呼应战力标尺）：①极烧魔力越强越短小；②魔力压差可被挣脱（定不住高你一阶者）；③须先成功施加、被打断或预判即落空；回溯只能撤极短、代价高。属最强机制压制系、但绝非通杀。
【净化系】驱散、净涤、解咒、疗伤，对魔物/瘴气/侵蚀/恶堕有奇效的辅助克制流。直伤低，强在涤净邪异、治疗己方、克制对面世界（对魔人恶堕者造成"净化灼伤"）。对人类与常规系无特殊相性。仍只是系别非阵营——属官方（编入医疗清剿）或独立（抢手的"私人净化师"）；恶堕的净化系扭曲为反向施咒。
【召唤/造物系】凝聚魔力造出使魔、傀儡、武装或造物作战的指挥官/工匠型、靠数量协同。由单只→多体协同→高阶军团或巨型造物，受魔力总量硬约束。属常规系、以多压人，被高爆发或大范围杀伤针对时易被一锅端。
【结界/封印系】专精护盾、领域、囚笼、镇封的守护控场流、攻弱守强。由单层盾→多重领域→镇封高阶目标→战略级永久结界。对"需移动或施法空间"的对手有压制，自身直伤弱需队友输出；遇魔力远胜者结界会被轰破。半常规、主防控。
【跨系/双系】极罕见，绝大多数人一生只属一系；个别天才或经觉醒/改造/恶堕方可能旁涉第二系，顶级稀有、勿轻易赋予。
