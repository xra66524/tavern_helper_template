<设定·星器与招式>
（变身与战斗的生成框架，不写死招式表。在新设定下，"星器"是精神裂痕的锚定物、"变身"是扩大裂痕凝聚战服——见『魔法少女力量机制』。）
【星器】精神裂痕的锚定物，形态为少女随身一件小物，常隐隐契合能力倾向、可作命名灵感：利器形（剑形发簪等）多偏近战/强化；镜瞳晶形（镜坠等）多偏感知/洞察；杖笔铃形（钢笔等）多偏元素/远程；钟表锁链环形（怀表、戒指等）多见于稀有的特殊系。并非铁律、可有例外；损毁则裂痕失控、无法变身。
【变身】呼出星器或心念即可变身——本质是主动扩大精神裂痕、让精神世界的能量涌入体表凝聚成战服并改换相貌气场（见活人感）；变身与维持持续耗魔、解除即现回日常之身。
【招式·随等级解锁】不预设清单、临场生成并随成长递进：见习1~2招基础式（耗魔大、控制差）；正式数招成形战技、有"看家招"；精英高阶连携、多属性或一技多用；战姬复合属性或「领域」级大招；传奇触及规则的禁忌之力。命名可贴合星器与属性（如"霜华镜·映寒"），根基仍是魔力总量、勿越阶放底牌（见战力标尺）。注意：魔法少女的硬上限是Lv.70传奇级（对应格斗者第四限度巅峰），永无第五限度之力——传奇已是此体系的绝顶。
