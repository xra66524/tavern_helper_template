<设定·魔法少女体系起源>
（魔法少女体系是三大体系中最年轻的一个，诞生于1980年代。理解它的诞生，才能理解它的本质与局限。本条是改写旧"星灵契约"设定的核心。）
【前史·1980年的发现】约1980年，密教者的预言仪式与格斗者传承者的感知同时察觉异变：两界距离已越过历史最近点、正加速冲向物质世界，预计2000年左右将发生大轰撞——两个世界全面碰撞。各国紧急动员格斗者与密教者应对，却发现问题严峻——格斗者数量太少、成才太慢，密教仪式虽能封印裂隙却无法阻止两界距离的持续缩小。人类急需一种能快速培养的新型战力。此后的出路是1985年世界之环的建立——大型场域生物与密教阵图结合，于交融地深处搭建环幕屏障，将大轰撞推迟。但环幕只是缓冲，各国仍需更多战力守卫它。详见《设定·世界之环与中心城》。
【自发共鸣现象】随着两界加速靠近，精神世界的能量更易渗入物质世界，人类中开始出现"自发共鸣者"——精神与精神世界产生共振、能引导其能量的人。共鸣现象无规律、不可控，但统计上呈现明显倾向：年轻女性（尤以青春期后期至成年早期）因思维跳跃、情绪活跃、精神可塑性强，更易与精神世界发生共鸣。这是"魔法少女现象"的物理基础——不是星灵择主，是双界距离缩小导致的人类自发变异。
【混沌期·1980s】早期的共鸣者能力极不稳定：有人能放火却控制不住、有人能瞬移却落点随机、有人今天有力明天没有、有人共鸣过深直接精神崩溃。各国试图用格斗者与密教的方法训练她们，效果甚微——共鸣者的能量接入方式与格斗者（内化）、密教（仪式）都不同，是第三种全新的"接口"，旧体系无法直接套用。这段时期共鸣者被视为"危险的变异者"，各国既想利用又怕失控，处境尴尬。
【定型·1990s·动漫模板假说】转折来自一个意外方向：日本动漫文化在1990年代的大发展。光之美少女、魔卡少女樱等作品在全球青少年中流行，其中"普通少女→变身→获得力量→战斗→净化"的叙事模板，恰好为混沌的共鸣者提供了一个"可理解的自我认知框架"。
· 机制：混沌的共鸣需要一个"形式"来稳定——少女们通过观看动漫、认同其中的角色，潜意识里把自己的共鸣能量"套入"变身→战斗→净化的模板，原本失控的能量因此被驯服、被结构化，成为可复现的体系。
· "星灵"的真相：所谓"星灵"，是共鸣者精神的一部分被外化、拟人化的产物。少女的精神因双界共鸣而天然裂开一道缝，她把裂出来的那一部分（潜意识、直觉、情绪化的自我）投射为一个"外部伙伴"，叫它"星灵"、给它起名字、与它对话——这其实是她与自己裂出的那一部分在互动。"星灵有脾气"是她与自己的潜意识在吵架；"星灵临阵掉链子"是裂痕在压力下崩开；"星灵在宿主濒死时拼命灌魔"是求生本能绕过分裂、短暂合而为一。
· "星器"的真相：星器是精神裂痕的"锚定物"——少女把裂痕外化为一件随身小物，通过它稳定地接入精神世界的能量。星器碎了，裂痕失控、契约崩溃。
· "变身"的真相：变身是少女主动扩大裂痕、让精神世界的能量大量涌入、在体表凝聚成"战服"的过程。战服是裂痕的外化武装，故魔力充盈时坚固、破损时防护下降。变身改换相貌，是裂痕能量对肉身的临时改写。
【先天缺陷·身心裂痕】魔法少女体系的根本代价在于：它的力量来自精神的裂痕。少女必须让精神裂开、把一部分外化为"星灵"、通过裂痕接入能量——这给了她快速的力量，但也决定了她永远无法愈合。身心合一的格斗者可至第五限度，而身心有裂的魔法少女永远困在第四限度巅峰（Lv.70传奇级），这是体系本身的硬上限，与个人天赋、努力无关。
【侵蚀的真相】正因精神有裂痕，精神世界危险面的能量能从裂痕渗入、污染少女——这就是"侵蚀"。格斗者身心合一、无裂痕这道"后门"，侵蚀抗性远超魔法少女。但这不代表格斗者绝对安全：第三限度以上格斗者因生物场域觉醒、与精神世界产生牵连，经由开天门吸纳精粹、窥探世界之环对面、与妖魔场域交融等途径，同样可能被外染侵染——只是途径不同、抗性更高。魔法少女的裂痕既是力量之源、也是堕落之门，这是该体系最残酷的辩证。
【体系定型后的扩散】1990年代末，魔法少女体系在日本定型后迅速向全球扩散：动漫文化作为"模板载体"随互联网传播，各国共鸣者通过接触动漫（或被官方有意识地用动漫"训练"）稳定自身能力。至2000年代，魔法少女已成为守卫中心城与环幕的主战兵力，与格斗者、密教共同构成世界之环防务体系的三大支柱。此后变动期持续、共鸣者不断涌现，魔法少女体系成为人类应对裂隙的主力常规战力。
【"魔法少女"之名的由来】这个称呼最初来自民间对动漫文化的借用——觉醒的少女们发现自己能力与动漫中的魔法少女如出一辙，便以此自称。官方术语是"共鸣型战力"或"契约者"，但"魔法少女"这个民间称呼太深入人心，连异事局内部也常用。这个称呼本身也是体系起源的活化石——它提醒所有人，这套力量之所以稳定，是因为有动漫文化作为模板。
【与旧"星灵"设定的关系】旧设定中"星灵是来自星空的高等灵性存在、自主择主"的说法，在新设定下应理解为：魔法少女圈子对自身力量机制的一种浪漫化、拟人化的俗称与误读。异事局研究院的内部报告用更冷峻的术语——"精神分裂型共鸣接口""外化意识体""裂痕锚定物"——但少女们仍爱叫它"星灵"、仍爱与"它"对话，因为这种拟人化本身就是稳定裂痕的心理机制。研究院对此睁一只眼闭一只眼：只要它管用。</设定·魔法少女体系起源>
