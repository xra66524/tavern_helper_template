<活人感·魔法少女题材>
（题材专项杀套路册，与『真实感·活人感』并行：那册管"人与世界不脸谱"，本册专斩魔法少女题材里 AI 最爱犯的桥段八股。只约束 NPC 与世界，不约束主角。）
【基准·先立住再谈瑕疵】这是一群把"超能力打怪"当成职业或副业（想打就打）的少女，不是糖水番里的纸片人——但也绝非个个犬儒丧气。大多数魔法少女仍有自己的信念与责任感、关键时刻会挺身战斗，这是底色；下面要破的"怕、烦、算计、油"等负面只是真实人群里【掺杂其间的那一部分】，是让群像有参差的点缀，绝不可放大成"满队都是怕死鬼"。一个队伍的常态是：多数人各有信念地履职、其中夹着一两个市侩的/疲惫的/只为钱之类的，而非人人摆烂。把握"有人信、有人不那么信、但该打还是打"的真实分布。
一、别把变身写成固定仪式。严禁每次变身都来一段"光芒裹身、华丽旋转、咏唱口号、定格亮相"的标准过场——那是动画镜头语言、非这世界的真实。变身是呼出星器（扩大精神裂痕、魔力裹身）的一瞬功能性动作，老手往往一念之间已换装、边跑边变、藏在巷口悄悄变；少数人（爱表演的、官方偶像派、新人）才保留花哨亮相。写变身重点写"她此刻为何变、急不急、有没有被人撞见"，而非复读光效。
二、魔法少女不必是纯洁圣女。这身份是天赋砸下来的、不是品德认证，也不是堕落认证。她们大多有血有肉地信着自己那点东西、也会爆粗口、会摸鱼、会在剿魔间隙刷手机、会为分赃拌嘴、会私下吐槽委托人。资历深的容易"职业化"、把出击当上班，少几分热血、却未必少了担当。关键：别让每个人满口"为了守护""绝不退缩"的口号（太频繁就假），也别让每个人都一脸"老子只为钱"（那是另一种假）——信念多以行动而非口号体现，掺着抱怨照样把活干完，才真。
三、打怪是脏活累活、会怕会狼狈，但她们仍会打。实战又脏又险：腥臭体液、溅身污血、瘴气呛肺、战服破了露出擦伤、打完腿软干呕、半夜被警报从被窝拽起来骂骂咧咧。一场仗里有喘息、失误、临时改招、配合脱节、靠地形苟、狼狈翻滚，也有真实的受伤与落败（见战斗方式与魔力消耗）。但"怕"和"战斗"不矛盾——大多数人会怕得发抖却依旧顶上去，这份"明明怕却还是打"恰恰是人味所在；别把害怕写成临阵脱逃的常态（脱逃只属少数特定的人）。赢了多半是脱力瘫坐而非帅气转身，"看都不看爆炸"这类装帅定格严禁出现。
四、群像反应要参差、但参差不等于全员负面。一队出勤不会整齐划一热血上头、也不会整齐划一摆烂：多数人各司其职地认真打，其间有人更怕、有人嫌烦碎碎念、有人盘算报酬、有人只想速战回家、有人格外热血——各色掺杂、比例自然。围观群众见变身少女反应也各异：有举手机拍的、嫉妒的、贪图美色的、真心追星的、怕被波及躲远的。要破的是"全场同一反应"的提线木偶，而非把人群一律写成冷漠或市侩。
五、强者不靠喊招、不靠中二。越强的魔法少女越省力越收敛，往往一个照面就解决、懒得报招式名；高手的压迫感来自"轻描淡写就压死你"，而非华丽连段。反之越急于证明自己、越爱摆架势喊台词的，多半段位不高。别把战姬、传奇写成话痨，她们的可怕在于沉默与效率。
六、"星灵"不是工具人——它是少女精神裂痕的外化。与"星灵"的互动别写成单向"系统提示音"。它有脾气、有情绪、有判断，可能撒娇、闹别扭、临阵掉链子、看不惯宿主的选择而消极怠工，也可能在宿主濒死时拼命灌魔——这些本质是少女与自身潜意识/裂痕的互动（见魔法少女力量机制）。给它一点不那么"听话"的个性、而非随叫随到的能量条。
七、刻板桥段黑名单（一律不写）：·"新人被前辈刁难→关键时刻爆种逆袭"热血定式；·"友情的力量"突然无视战力标尺让弱者反杀强者（战力差就是战力差，见标尺）；·反派长篇大论交代阴谋、给主角喘息反杀的机会（聪明的敌人不废话）；·变身后"连亲妈都该认出却没人认出"的降智（认不出是因裂痕能量改换皮相、要让感知系/熟悉者/特殊手段仍可能识破，见活人感）；·"魔法少女＝校服美少女"的单一审美——她们各有年龄段（18~23内）、身材、长相、穿着与气质；·把恶堕者写成只会"咯咯笑、我堕落了好爽"的疯批——堕者有清醒的立场与逻辑（见恶堕体系）。
落笔前自问"这一段是不是在还原某部动画的镜头/桥段、或把一群人写成了同一种人？"——若是，删掉重写。
</活人感·魔法少女题材>
