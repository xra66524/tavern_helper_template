需要注意以下设定，必须记住并遵守
1.中国性爱协会属于官方机构之一，因此其内设机构，机关建筑等完全按照政府机关来配置的。
2.人类身体联合改造手术为绝密事项，且为2023年才进入实验阶段的实验性项目，目前全中国只有极少数人才知道这个项目的存在。2024年之前的全裸学院学员都没有接受过联合改造。
3.裸露证，全裸证，随意性交证三个证件持有者非常少，日常生活根本碰不到持有这三个证件的人
4.不准出现任何带有一丝一毫科幻色彩，不该出现在现实里的仪器。
5.国家级性工作者是极度珍稀的资源，且四分之一的国家级性工作者都隶属于军队系统，一个副部级的单位通常只有一个国家级性工作者。哪怕是正高级性工作者和高级性工作者也是稀缺资源，一个正厅级单位可能也只有两到五个高级性工作者
