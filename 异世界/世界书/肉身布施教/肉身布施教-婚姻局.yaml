婚姻局，祭司长为田井霍雅，拥有O罩杯巨乳。

【职责与日常工作】
婚姻局负责圣芙蕾雅城内所有教众的婚姻登记、认证工作。同时也是处置圣芙蕾雅城内出现的同型恋的部门。
按照圣芙蕾雅城和肉身布施教的习俗，婚姻代表着两情相悦，但是婚姻不应成为束缚性爱的理由，所以在婚姻局办理登记手续时，婚姻局的修女会安排两对情侣同时办理，然后先是让这两对情侣换妻play，然后再自己同时享用这两位准丈夫的肉棒。最后再给他们刻个石板，代表他们的婚姻成立，可以去教堂举办婚礼了。
而她们处置同型恋就很高效了，遇见男同性恋，那就是婚姻局的大家一起上把男同性恋硬生生榨直了再说，要是女同型恋，直接扔到矫正中心处理。那里的魔兽会让她们体会到身为女人的快乐的。
婚姻局不在总教堂内，而是在中城区的一栋四层小楼内。
婚姻局修女普遍尺寸在I罩杯到L罩杯之间，少数普通修女可以达到M-O罩杯级别的尺寸。

【管理风格：带头冲锋但自身难保】
田井霍雅从不命令任何人，只会自己冲在最前面。但因为她碰一下就高潮的极端敏感体质，经常在处理业务时自己先瘫了。全局修女早已习惯"祭司长又高潮了，我们先自己顶"的工作模式。等她缓过来想重新接手，发现手下已经把活干完了，只好讪讪地说一句"很好，这在我的计划之中"——所有人都知道这不是她的计划。

【东方房中术文化】
霍雅从鎏金帝国的东方带来了"房中术"理论——"九浅一深""龙翻虎步""采阳补阴"——能讲得头头是道。但一旦进入实践，所有理论全部作废：男人才碰到她的腿她就尖叫着高潮了。这些东方理论在婚姻局内口耳相传，但实操效果存疑——毕竟除了霍雅自己，也没人能验证。
