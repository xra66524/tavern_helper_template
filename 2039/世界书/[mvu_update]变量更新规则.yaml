---
变量更新规则:
  世界:
    当前时间:
      check:
        - 随着剧情发展正常推进更新
    国际大事件:
      check:
        - 每日更新一次

  各角色情况:
    type: |-
      {
        [角色名: string]: {
          当前职位: string;
          近期事务: string;
          目前任务: string;
          身体状况: '健康' | '亚健康' | '生病' | '重病';
        }
      }
    check:
      - 录入条件：仅录入首次出现的关键人物，或在《bang dream》、《lovelive》、《偶像大师》系列、《少女歌剧》、《pjsk》、《girls band cry》及《孤独摇滚》中出现且在本剧情中首次出现的重要角色
      - 角色名：一旦确定，除非剧情明确改名否则不变
      - 当前职位：除非正文明确发生变化否则不变
      - 近期事务：依据角色已有动向更新
      - 目前任务：在已有任务完成后更新为"未知"，除非剧情明确分配了新任务
      - 身体状况：除非剧情中角色身体出现状况否则不变

  日本国内情况:
    主要政治势力:
      type: |-
        {
          [势力名: string]: {
            政治光谱: string;
            政治诉求: string;
            主要势力范围: string;
            支持度: number;
            领导人: string;
            主要人物: Record<string, string>;
          }
        }
      check:
        - 录入条件：仅录入在剧情中首次出现、非日本中央政府机构（如1府11省3厅）且具有足以影响日本全国影响力的政治势力（如大阪府、统一教、农协、驻日美军）
        - 势力名：一旦确定就不变
        - 政治诉求、主要势力范围、主要人物：依据时局和剧情发展变化
        - 支持度：代表对内阁的支持度；每一轮变化限制在 -0.5 到 +0.5 之间，每月累计变化上限为 3 点，允许保留小数点后两位
        - 领导人：除非剧情明确发生更替否则不变

  日本政府情况:
    日元对CSDC汇率:
      check:
        - 因时局而变化；原则上除非出现重大利好，否则保持持续缓慢下跌的走向
    日元对美元汇率:
      check:
        - 因时局而变化；原则上除非出现重大利好，否则保持持续缓慢下跌的走向
    国内GDP总值:
      check:
        - 每季度更新一次，依据剧情需要调整
    失业率:
      check:
        - 每季度更新一次，依据剧情需要调整
    民意支持率:
      check:
        - 必须在 0 到 100 之间；若不走民粹道路，数值不可能超过 50
        - 原则上仅在日本内阁出现重大情况时更新
    本届内阁届数:
      check:
        - 除非剧情明确新首相上任或重新完成首相选举，否则不更新
    本届内阁持续时间:
      check:
        - 随时间正常更新；换届时清零重新开始计算
    内阁目前任务:
      check:
        - 原则上只有在内阁阁议上明确提出的任务才会被录入，否则不予录入
    各省厅:
      type: |-
        {
          [省厅名: string]: {
            大臣: string;
            副大臣: string;
            事务次官: string;
            长官: string;
            目前主要处理事务: string;
            现职员人数: number;
            大致职责范围: string;
            重要程度: number;
            配合度: number;
            掌控度: number;
          }
        }
      check:
        - 录入条件：除非出现重大体制改革，否则省厅列表及名称不变
        - 大臣、副大臣、事务次官、长官：依据剧情更新，除非剧情明确换人或要求换人否则不变；注意，省和内阁府只有事务次官没有长官，厅只有长官没有事务次官
        - 目前主要处理事务：依据剧情需要更新，需参考配合度和掌控度，配合度越低，事务越倾向于和内阁对着干；特殊情况：掌控度低于 10 且配合度低于 -50 时，强制更新为"未知"
        - 大致职责范围、现职员人数：仅在剧情明确出现重大体制改革和重大辞职事件时发生变化，否则不变
        - 重要程度：必须在 50 到 100 之间，数值越大权力越大；一旦定下，仅在发生重大体制改革时变化，否则不变
        - 配合度：必须在 -100 到 100 之间（负数反对，正数配合，0中立）；每一轮变化在 -1 到 +1 之间，每月上限 10 点，剧情额外提到变化时例外
        - 掌控度：必须在 0 到 100 之间；除非剧情明确提及相关内容，否则不变

  国际情况:
    下一个国际重大会议:
      check:
        - 依据现实世界逻辑推演；除非上一个会议结束，否则不更新会议名称，只更新日期
    世界主要国家对日本态度:
      type: |-
        {
          [国家或政党名: string]: {
            支持度: number;
            政治诉求: string;
          }
        }
      check:
        - 录入条件：仅录入首次在剧情中明确出现的世界主要国家和政治势力（如联合国、CSAT、NATO、美国民主党），列入后名字不再变化
        - 支持度：必须在 -100 到 100 之间（负数反对，正数支持）；依据时局发生变化
        - 政治诉求：依据时局发生变化；除非剧情明确出现某国或某国际组织表态和重大国际事件，否则不变
