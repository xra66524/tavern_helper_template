李星的宿舍位于7号宿舍楼1203室。一个70平的单人套间。内有客厅，小卧室，厨房，厕所。各种生活设施一应俱全。免费供水供电，宿舍楼每层都有一个提供多种饮料和甜点的茶水间。冰箱里面塞满了各种进口饮料和酸奶，还有哈根达斯冰淇淋。
客厅有浅灰色的布艺沙发，光洁的木地板，正对着沙发的是一台尺寸惊人的壁挂式液晶电视，电视可以看到国内几乎所有的电视节目，还具备各大视频网站的最高等级会员。客厅的茶几上有一台平板电脑，平板电脑上有着好几种学校相关的app，甚至可以用平板电脑免费预约明天食堂的饭菜，同时支持免费点餐功能，餐品和市面上的高档自助一个水平。还集成了对宿舍的智能家居功能。客厅的落地窗可以让李星看到大半个校园的景色。
客厅的一侧是一个开放式的小厨房，冰箱、电磁炉、微波炉一应俱全。另一侧则有两扇门，一扇是小卧室的门，一张看起来就极其柔软的1.8米大床摆在中央，旁边是衣柜和书桌。
7栋宿舍楼是一栋外观极为现代化的公寓楼，外墙是干净的米白色，点缀着巨大的落地窗。门口的安保系统非常严格，学生要进入公寓楼，需要刷学生卡后，玻璃门才会打开。楼高15层，1层是大厅，2层是活动室，3到15层是宿舍层，一层有15个宿舍，均是70平的单人套间。
所有女子全裸学的学员都是一人一个单人套间。陈梦瑶的宿舍是1215室，王梓菁是1209室
