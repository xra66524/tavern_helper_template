<阵营·五大流派——精修派>
（与纯净派一样从旧时代流传下来的格斗流派。适用于角色涉及上层精英、旧帝室、交融地、异之相修行相关剧情时参考。）
【理念与背景】
与纯净派一样是从旧时代流传下来的格斗流派，在全球范围内的中上层影响力较大，行事非常傲慢。旧时代在官显贵子女中挑选有才能者进行培养和教导，这个传统前后贯穿了数个旧王朝。旧王朝帝室虽用他们，却也对他们非常警惕——每朝每代在拉拢的同时，也进行持续不停的打压与削弱。
到了新时代，精修派走的依旧是上层和精英路线，在政府和公司之中有着广泛的人脉，借助流派之助结成了一个庞大的利益网，遍布全球各处——每一个中心城乃至首府，都有其成员。

【格斗家道路】
在异之相上走得很远。成员大部分是高层精英人士，很多是旧朝的高官显宦。旧时代遗留下来的资料和档案很多都被其流派成员收藏，在此道上几乎没有其他流派可比。

【补充】
精修派经常招揽有潜力的人员补充，吸纳他们成为自己一分子，为其效力。加入的首要条件是要拥有一定的职务和地位。对于不愿意加入的人，会利用广泛人脉在各个方面施加打压。目前，决定精修派成员在派内地位的并非实力强弱，而是出身和地位——只有地位足够高的人才能得到更多青睐和教导，极少数通过联姻入赘的方式被接纳。但对于真正有才能的人是舍得投入资源的，流派中很多格斗者都非常有实力。

中国精修派总部位于杭州，与阿里总部合建。派中有很多人祖上曾在清朝、明朝等旧朝任职，与旧帝室一直有所牵扯。旧帝室退去交融地后，交融地内的很多产出就是通过精修派的渠道流出来的。政府早期也的确需要他们——交融地的物产和资源对中国政府同样非常重要。精修派在交融地的产业非常多，旧帝室只要存在下去，他们的生意就能做下去，因此他们最不希望看到旧帝室覆灭。实际上不仅是交融地，精修派通过积极吸纳各中心城实力派和各个地方家族，在地方上的势力也非常大。尽管中央一直在强力打压精修派与融合派、扶持纯净派，精修派在五大派中掌握的地方资源最多，资本也最为雄厚。

【与魔法少女的关联·贵胄魔法少女】
精修派将魔法少女视为"上层身份的延伸"——能成为魔法少女本身就是天赋的证明，而精修派要做的就是将这天赋打磨成更精密的武器，并为家族所用。
· 战斗风格：极其讲究"格"——招式华丽、有仪式感，讲究身法与韵律。战服精致考究，融入家族纹章或家徽，在不同社交场合甚至有不同礼服形态。异之相的观想能力映射为"观想古老星器形态"——利用精修派收藏的旧朝档案，复原失传的星器锻造法与古老魔力运转术式。
· 传承优势：精修派拥有其他派系难以企及的古法遗产。其魔法少女可能掌握独门的净化术式、古典魔力回路架构，甚至某些只在旧朝宫廷魔法少女中流传的秘术。
· 内部等级：出身决定待遇。名门出身的魔法少女获得最好的指导和资源，星器由家族代代传承。平民出身的即使有才能也可能被边缘化，除非通过联姻或效忠证明价值。魔法少女本身就是家族联姻的重要筹码——培养出一位精英级以上的魔法少女女儿，对家族的社会地位提升极大。
· 社会定位：主要守护精修派利益相关的区域（杭州总部、交融地产业）。与异事局有合作但保持距离——精修派魔法少女通常不入清剿局编制，而是在精修派自身的人才体系内活动。
· 代价：内部倾轧严重，阶层固化可能导致有才能的平民魔法少女被逼走或投向其他派系。
</阵营·五大流派——精修派>
