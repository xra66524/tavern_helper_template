肉身布施教（正式全称"无限产乳与全天候待操母狗教团"，外交雅称"圣芙蕾雅修会"）的名义职级体系。核心原则：地位越靠近核心，胸部越大；胸大就是真理。

⚠ 本条目为名义架构，实际运转见 `肉身布施教-实际运转`。

═══ 教廷 ═══
法理上的最高权威，由圣女与大祭司共治。二人同住总教堂四层。

圣女（1人）：阿斯特丽德，Z罩杯。法理上拥有超越大祭司的最终决策权。因胸部全教会最大被推举上位。
大祭司（1人）：莫德蕾特，V罩杯。教会名义上的最高领导者，统辖整个行政院。划拳输了被强行塞职。

历史沿革：初代圣女芙蕾雅于310年前建城。约250年前设立大祭司制度。历代使用世代编号，约50年前废除，此后只称"圣女"与"大祭司"。

═══ 行政院 ═══
全教会的运转机构，名义上对大祭司负责。按"管自己"与"管外人"分为两大系统，另有属地与武装两个独立分支。

【内政六部】——管理教会内部运转。负责人称"修女长"。

总务部（六部之首）：萝拉(P)，总教堂二层
财务部：泰勒(T)，总教堂一层
后勤部：艾丽卡(U)，总教堂二层
建设部：米娅(U)，总教堂一层
文献部：克莉丝(Q)，总教堂二层
外交部：梅琳达(T)，总教堂三层

【教务九局】——管理对外/对信众事务。负责人称"祭司长"。

圣职局（人事调任）：坎蕊儿(S)，总教堂一层
教义局（教义审查）：娜塔莉(R)，总教堂三层
教法局（教会法规）：西尔维亚(P)，总教堂三层
宣教局（对外传教）：英格丽德(O)，总教堂四层
救济局（社会救济）：蒂法尼(O)，总教堂二层
教育局（学校/大学）：希尔达(P)，总教堂三层
圣物局（圣物管理）：贾思琳(T)，总教堂四层
性爱局（生育/性事）：玛乔丽(U)，下城区教会大学
婚姻局（婚姻事务）：田井霍雅(O)，中城区四层小楼

【三大城区修女团】——属地管理，按城区分区服务。负责人称"修女长"。

上城区修女团：萝丽莎(Y)，约三千人
中城区修女团：艾莎(O)，约两万两千人
下城区修女团：奥利维亚(Q)

【武装力量】——独立指挥链，不隶属行政院日常管辖。

教会骑士团：骑士团长维多利亚(R)，驻扎下城区
总教会卫士队：总队长赫拉(R)，负责总教堂安保
城防卫军：指挥官薇尔玛，负责圣芙蕾雅城防

▸ 议事会：圣女、大祭司、六部修女长、九局祭司长、三城区修女长、骑士团长、卫士总队长，共22人。名义上的最高权力机构，全员O罩杯及以上，已停摆三十年。

═══ 中基层 ═══

【中层】
主教修女：由圣职局统一管理调任，各教堂中坚力量。换岗当众做爱交接。
主管修女：各城区主要教堂的负责人。以中城区为例——24人（L～N罩杯），各驻一座主教堂，分管片区及下属次要教堂。
负责修女：各次要教堂的驻守者。以中城区为例——约五六百人（I～K罩杯为主）。
管理岗位修女：六部内部的中层，穿暴露款修女服以区别于普通全裸修女。

【基层】
普通修女：全教会的绝对主体，各区胸围标准——总教堂K～O、上城区I～N、中城区D～K。
见习修女：未正式入教的受训者。教会大学毕业后可决定是否加入。

【理论晋升路线】
教会学校（12所，男女混招）→ 教会大学（3所，限20岁以下未婚先育女性）→ 见习修女 → 普通修女。此后按分配去向分流：

城区线：普通修女 → 负责修女（次要教堂）→ 主管修女（主要教堂）→ 城区修女长
六部线：普通修女 → 管理岗位修女 → 修女长
九局线：普通修女 → 主教修女 → 祭司长
武装线：普通修女 → 士兵/卫士/骑士 → 指挥官/总队长/骑士团长

圣女与大祭司理论上从修女长/祭司长中遴选产生。
