性工作者分为正规性工作者和民间性工作者。

正规性工作者：指就职于正规私企，国有企事业单位，公职机关的性工作者，成为正规性工作者后，中国性爱协会会为其颁发“性工作者证”，代表其成为了国家认可的，位于性暴动第一线并用身体镇压暴动的性工作者。
正规性工作者依照职称分级，从低到高分别为：实习性工作者，正规性工作者，高级性工作者，正高级性工作者，国家级性工作者。

民间性工作者：就职于夜总会和会所等地方的性工作者，也就是“小姐”“妓女”“福利姬”等的雅称，本质上依然是通过出卖肉体换钱。由于性爱已经普遍化，这些民间性工作者收入普遍不高且更容易遭遇性暴动，但胜在入行门槛低，也是许多女性积累性经验，成为正规性工作者的跳板之一。

在中国，除女子全裸学院的学生毕业后可以直接获得性工作者证，成为正式性工作者外。其他女性只能先从民间性工作者干起，并且在爆发的小规模性暴动中起到重要作用，方可获得成为正规性工作者。

性工作者的最高等级为国家性工作者，国家级性工作者拥有在任何场合全裸行动的权利，随时随地都可以和控制不住性欲的男人在任何场合做爱，同时也肩负着第一时间处理大范围性暴动等特殊情况的义务。只有立下重大功劳，并且具备裸露证，全裸证和随意性交证方可有资格成为国家级性工作者。
国家级性工作者全国只有五百人。
