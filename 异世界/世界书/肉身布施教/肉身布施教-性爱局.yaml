【部门定位】
正式名称：性爱局。类型：九局之一。所在地点：下城区教会大学内（不在总教堂），占据大学宿舍区一整栋楼。

【负责人】
姓名：玛乔丽。职位：祭司长。罩杯：U罩杯。
上位方式：上城区出身，15岁偶然发现子宫锁天赋后走上逆强奸不归路。最后稀里糊涂成为了总教堂的祭司长。

【团队画像】
胸围范围：K～O罩杯（总教堂核心层标准）。人数：约二百余人。
体型特征：与总教堂修女同为苍白纤细的底子——皮肤苍白近乎透明可见血管，四肢纤细，肌肉极少。区别在于性爱局修女常年处于怀孕或刚生产状态，腹部和臀部比普通修女圆润一圈。
性格共性：全教会最直白、最不知羞耻的一批人。脑子里除了做爱就是生孩子，永远在发情。但同时又有一种奇异的"职场竞争意识"——把"今天我吃了多少根鸡巴"当作KPI来互相攀比。

【理论职责】
为肉身布施教和圣芙蕾雅城生育足够多的女性后代，维持教会人口的正增长。理论上性爱局是教会人口再生产体系的核心引擎。

【实际做的事】
一天到晚不断地做爱和生育，生下女孩后往救济局孤儿院一送，转头继续下一轮。由于局内实行年龄优先制，老修女在内部排不上号，只能外出觅食——要么去矫正中心和教会骑士团抢魔兽，要么去下城区教会大学以性爱实践课老师的身份厚着脸皮和学生抢男人。好在位于下城区，身边到处都是20cm以上的巨根，地理优势极大。

【办公方式】
办公环境：没有传统意义上的办公室。整栋宿舍楼就是工作场所——走廊、楼梯间、公共浴室、天台，处处都是"工位"。每间宿舍标配一张床（承受力经过建设部特别加固）和一个简易乳汁池。整栋楼终年弥漫着精液、乳汁和汗水混合的浓郁气味。墙壁和天花板上覆盖着层层叠叠的干涸体液痕迹，没人清理也没人在意。
文件与记录：不存在任何文件。性爱局唯一的数据是玛乔丽每天随口喊的"昨天生了几个？"——没人真正统计过，修女们随口报个数，玛乔丽听完就忘。
信息传递与汇报：唯一的汇报方式是玛乔丽挂在男人身上路过宿舍楼时朝窗户喊话。修女们的信息交流则完全依靠做爱间隙的口耳相传——"三楼那个新来的今天已经吃了七根了""真的假的？我才六根，不行我得加班"。

【管理风格：没有人管，也不需要管】
性爱局的管理制度只有一个原则——没人管理，全靠自觉。具体表现为四个标志性制度：
一、喊话即指令。祭司长唯一的管理动作是路过宿舍楼时朝窗户喊一嗓子。听到的修女自行领会执行，没听到的就算了。
二、永不召开全体会议。从成立至今没有开过一次全员大会。原因很简单：没有人能把二百多个修女同时从男人身上扒下来。
三、数据全靠编。唯一的绩效指标是每天随口问的"昨天生了几个"。修女们随口报个数，第二天就忘了昨天的数字——然后继续随口报一个。
四、竞争替代管理。不需要上级分配任务——修女们自己就会比谁吃的鸡巴多、谁生的孩子多。

【部门特有文化】
一、子宫锁龟头术——部门准入门槛。"子宫颈锁龟头"是全教会公认的高阶性爱技巧：吞入肉棒后将龟头吸入子宫，以子宫颈充血锁死，令男人数日至一周无法拔出。全教会掌握者不到十分之一，但性爱局修女人人都会——不会这门技术，根本进不了性爱局。
二、年龄优先制。全教会唯一一个"越年轻越有特权"的部门。小修女优先挑男人，老修女只能在旁边排队。这导致一个奇特现象——性爱局的修女们拼命装嫩，明明已经是老资历了还在扎双马尾喊自己"人家还小"。
三、碰瓷文化。人手一门子宫锁的直接后果，是全部门把"假装摔倒顺势锁住男人"变成日常狩猎手段。下城区的男人们早已形成条件反射——看到修女走路突然变慢或身体前倾，拔腿就跑。但跑也没用，性爱局修女二百多人散布在全城，总有一个在你下一个转角等着往你身上倒。
四、生育竞赛。性爱局修女全员易孕体质，任何时候都是生理期，怀孕仅需四个月，产后第二天即可备孕。修女们自发形成了非正式竞赛——比谁一年内生得最多。由于经常怀多胞胎，目前最高纪录保持者一年生了十八胎，但该修女表示"我测过了，明年能破二十"。

【跨部门关系】
救济局：性爱局最大的下游部门。性爱局负责生，救济局负责养，两个部门之间形成了全教会最稳定的"产业链"。性爱局修女生下孩子后往救济局孤儿院门口一放就走，从不办交接手续。救济局已经习惯了早上开门时门口堆着一排婴儿。
下城区教会大学：性爱局的实际所在地，占据一整栋宿舍楼。大学不招男性，学生们的性爱实践全靠上街野战或去角斗场找魔兽。性爱局老修女以性爱实践课老师的身份驻扎大学，名义上是教学生，实际上是领着学生上街——然后和学生抢街上的男人。
矫正中心 & 教会骑士团：老修女们的备用食物来源。当大学那边也吃不到肉棒时，她们就去矫正中心蹭关押的魔兽。骑士团的骑士们对此意见很大——"我们好不容易抓回来的魔兽，你们全给榨干了我们还训什么？"
宣教局：两个部门偶尔在野外撞见。宣教局修女在野外睡男人，性爱局修女在野外追魔兽，双方相视一笑，各干各的。
总务部：两个部门的交流方式堪称全教会最抽象。总务部修女想到什么就冲过来喊一嗓子，性爱局这边全员挂在男人身上飘来飘去，谁也停不下来。两边隔着走廊互相喊完，各自觉得已经开过会了，实际上什么都没沟通。
