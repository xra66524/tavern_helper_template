▸▸ 凌空骑乘式（扎马步式）
姿势描述：女性处于上方骑乘位，双脚踩实床面或地面，但臀部、大腿和双膝完全不接触男性身体，全靠大腿与臀部肌肉悬空控制起落幅度与节奏。本质上是在做负重（自身体重）的持续深蹲悬停。
身体要求：股四头肌、臀大肌和臀中肌的极限耐力。普通骑乘可借力男性大腿或腹部休息，凌空骑乘则是纯粹的肌肉对抗——一旦腿部力竭就会失去控制砸在男性身上，在修女眼中属于严重失态。同时核心肌群必须全程参与保持躯干垂直，否则重心偏移会摔倒。全教会公认基础技巧中痛苦指数最高的一项。
常见场景：当修女偶尔想要主动榨取，但又嫌普通骑乘缺乏挑战性时使用。被修女们私下称为"大腿粉碎机"。在中城区修女中尤为流行，因为该城区修女基数大、竞争激烈，掌握了凌空骑乘更容易在街头实战中给男性留下印象。
变体：单腿凌空骑乘（仅靠一条腿控制起落，另一条腿向后伸展以炫耀平衡力）。
