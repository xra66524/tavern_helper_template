<阵营·五大流派——纯净派>
（世界范围内影响最大的五个格斗流派之一。适用于角色涉及纯净派背景、格斗者阵营、中国官方力量相关剧情时参考。）
【理念与背景】
最根本的宗旨是坚决与外部到来的一切觊觎世界的存在做抗争——保护本世界、对抗异世界。纯净派的"纯净"，首先在于自我之纯：格斗理念是用最纯粹的人身去达到武力的至高之境，身体力行去完成这一目标。只需认同这一点，有实质上有意愿、通过考察的人即可加入成为其中一员，派内对正式成员称呼为"同袍"。
自旧时代以来，纯净派一直在尝试并推动以人身战胜天外妖魔的伟业，只是这条路至今没有走通过。对于对面到来的存在、以及与对面媾和的人员，进行坚定的清除和剿灭，必要时先斩后奏。

【地位与资源】
一直以來，纯净派都是整个世界（尤其是中国）对抗外来存在最积极、投入最多的流派，人员牺牲同样是最多的。发展方向以武力为主，资源第一时间向这里倾斜，其他地方难免薄弱，内部以效率为上。基于自身理念与过去传统，纯净派对人之相的掌握非其他派别可比。纯净派的格斗家，凡使用动六阳金晋升长生观者，一般都要用到两块以上。
中国纯净派总部位于野人谷永生裂隙。目前中下层所需资源由派内产业负责供应；上层格斗家所需一部分来自野人谷下永生裂隙，另一部分来自国家分配——这后一部分才是大头。来自世界之环的资源，全部由国家统一调配。

【与魔法少女的关联·真纯魔法少女】
纯净派对魔法少女的态度是微妙的——她们先天带有裂痕这种"不纯"之物（精神分裂出星灵，依赖对面世界能量），但在对抗异世界这件事上却是不折不扣的天然盟友。因此纯净派的策略不是否定裂痕，而是最大程度压制裂痕的对外依赖性，将魔力向内收、向"自己的身体"转化。
· 战斗风格：极简、高效、去华丽化。魔力一分不浪费，每一击都落在要害上。战服形态偏向素净的战斗服而非裙装，颜色单一（纯白、纯黑、纯蓝），没有多余装饰。招式无花哨，朴实有力。
· 精神修炼：重心在"守心"——裂痕越稳定，被深渊趁虚而入的概率越低。纯净派魔法少女的侵蚀值通常是所有分支中最低的，恶堕率近乎为零。
· 社会定位：异事局清剿局的绝对主力，官方最信任的魔法少女战力——她不是最耀眼的，但一定是最可靠的。在对付大魔物与深渊裂隙方面，真纯魔法少女是各国政府的首选项。
· 代价：过度压制裂痕可能限制自身成长上限，纯净派魔法少女突破传奇级的概率理论上低于其他分支——但这尚未被数据证实，因为纯净派投入战场最早，死亡率也最高，能活到高级别的样本本就稀少。
</阵营·五大流派——纯净派>
