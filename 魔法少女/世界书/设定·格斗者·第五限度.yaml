<设定·格斗者·第五限度·抱元一>
（人类战力的真正顶端，全球存世者屈指可数。旧称"神通观"，国际通称"上层力量"。适用于角色已达第五限度或涉及上层力量对抗的剧情场景。）
【第五限度·抱元一】
· 定义：第四限度洞玄观突破后的最终境界。旧时代称"神通观"，意为修行者获得类神通之力。国际通称"上层力量"。核心要义为「炼虚真，天地藏」——炼化虚妄为真实，将自身藏纳于天地之间。
· 侵染的终结：到了上层力量这一步，精神世界的侵染已完全不是问题。格斗家以炼假成真之力在精神世界深处开辟身外天作为存身之基，自身即一方天地——不再是"抵抗"外染，而是外染根本无从侵入一个自成法则的封闭系统。上层力量可自由深入精神世界、与妖魔正面交锋，无需任何防护。这是格斗者之路相对于魔法少女体系最根本的优势之一——魔法少女终身受裂痕侵蚀之苦，而格斗者走到终点时，已与对面世界平起平坐。
· 存世数量：全球屈指可数，是各国真正的战略底牌。
· 准入原则：第五层次的力量是不可逆的，一旦突破便无法回头。且其他上层力量的拥护者恐怕也不允许其人继续留下来——突破者实际上已不再属于凡人世界。
· 收敛之要：力量越大，越不能任意妄为。在神意中沟通的时间流速与外界不同。

【第五限度的核心能力·炼假成真】
· 定义：神通观修行者的标志性能力——化虚无为真实。
· 作用方式：在世外自立一域，这也是上层力量能在重天之上存在的缘故。
· 代价：无节制的施展会消耗自身本源，乃至永久性力量亏缺。
· 正确用法：加上较大针对性的限制（限誓），可相对温和地创造所需之物。
· 物质世界的限制：上层力量亲自去物质世界易造成极大扰动和破坏，通常选择派包含少许力量的虚影。上层力量留在人间的印痕不能太深入，否则会在人群中形成自发的精神信仰——对力量的崇拜。新时代摒弃旧信仰体系，唯有通过上层力量有意识地管控。

【第五限度的存身之基·身外天】
· 本质：上层力量在精神世界深处开辟的独立空域。这是修行和存身之根，藏身避世乃至修养修行之地，是"重中之重"——没有这方身域，根本无法在重天之上立足。
· 开辟方式：借助炼假成真的手段，在精神世界之中建立独属于自己的空间。需要花费一定工夫反复锤炼。
· 功能：最终形态的身域要能自给自足，且在外敌进攻时也能抵御乃至提升自身战斗力，需要修行者反复权衡、投入炼假成真之力。
· 战斗意义：上层力量之间的战斗，核心即围绕寻找对方的存身空域展开。一旦存身之地暴露，结局不言自明。遁回身域也讲究时机和技巧，强行归返有一定可能暴露。

【第五限度的层次划分·旧时代玄教说法】
· 人仙：需要依附，如同受敕封可被驱驭的神祇。
· 地仙：不受上力驱使，但囿于一地，自保有余、进取不足，往往需依附更为殊强之人。
· 天仙：无拘无束，真正逍遥，五限之中最高成就。

【第五限度的三相分化】
【人之相·诚己诚道】
· 旧时代一旦突破层限被视为仙神一流，但有一批人不这么认为，坚持自己只是更强大一些的玄机武者。其共同特点：大部分是人之相出身，且原本多为民间武师，未在旧国教或朝廷体系内。
· 这些武师出身的格斗者得不到教派宣扬和香火供奉，但否认自己是仙神并非因为出身，而是源于对自我的认知、对修行之道的明确。
· 神之相、异之相天生与凡人有所区隔。唯有人之相格斗者仍然自承是人——"唯有诚于己，方能诚于道"。
· 人之相没有固定路径，每个人都不一样，没有人能告诉到底该怎么走。

【异之相·唯一性与多重蜕变】
· 异之相的格斗家通过观想修行，使自身逐渐向观想目标蜕变。突破上层后无限靠近传说中的神明或神话生命，有极其强烈的外在呈现。
· 唯一性：当某一人到达上层，此唯一性被放大。在其陨亡之前，以后再无人可通过观想达至此层次，连入门都不可能。
· 多重蜕变：有的异之相突破即顶点；有的可通过第二次、第三次蜕变完成整个过程，最终完全蜕变乃至超越传说中的存在，从而具备传说中的威能。
· 上层力量不再是"运用"而是化为身体的本能，能持续不断对自身和敌人施加影响。
· 异之相的立愿和限誓使其趋向最直接的力量碰撞。
· 唯一例外——妖兆：理论上第五限度不存在妖鬼。唯一例外是某上层力量遭遇妖魔神异力量侵袭、不敌之下为求生求存化变而成（毕竟到了炼假成真这一步，什么事都可能发生）。

【第五限度的修行方式·愿景体系】
· 核心逻辑：到了第五限度后没有具体的境界划分，主要在于对力量的合理运用。首要即明确自己所走之路，其次以此为基追逐某个宏大愿景。
· 愿景：将自己不切实际的想法化变为真实。只要本人对此深信不疑，就可以此立下愿景。当完成自身所愿，力量自然会有较大幅度提升。
· 分阶段：可分段进行、逐次积累，直至最终目标。但所划阶段不宜太多太复杂（一般两段即可），因为每完成一个愿景都耗费"炼假成真"力量，对本源损耗既与自身期许有关，也与次数有关。
· 运用路数：
- 先获取力量再还愿
- 专以替他人完愿
- 让某个群体替自身完成寄托
· 集体愿景：上层力量可以联合起来共同探求一个愿景。力量不用担心付出太多，互补短板。理论上越多的上层力量合作，所能创造的奇迹越伟大。一旦目标实现，每个人都得到丰厚回报。这也是为何旧教和当代的上层力量团聚在一起的根本原因。但集体配合也有短板——锚定在固定愿景上时，只要此愿未完成，都会被限定于此，无从越限。
· 限誓：修行者本源有限，不能任由其漫无目的地发散。期望不能是太过虚无缥渺的东西。限誓定得越精细、范围越狭窄，实现代价越小。但若被人知道限誓内容，可能被针对。一旦确认道路，就坚定不移地去做——因为定下便很难再回头。
· 愿景失败的风险：如不加以节制或无法完成愿景，不止损失本源，也有可能导致自身彻底消失，当中极大凶险。
· 并非越古老越强大：如果修行者没能完成自己的誓愿，只会停留在那里无望前进。

【第五限度的斗战逻辑】
· 上层力量之间的战斗绝非直来直往。除非被敌人找到一击致命的突破口，否则大部分时候都围绕寻找对方存身空域展开。
· 上层力量可以被击败，但极难被杀死。全世界的上层力量组织抵抗妖魔这么久，明确战死的记录也不多——失踪、反叛才是占多数。
· 妖魔不但数目多，还极难杀死。
· 上层力量在物质世界的对抗往往是最直接的力量碰撞，因为没有什么比这更直接有效。

【第五限度与第一至第四限度的根本不同】
· 第一至第四限度：无论哪一个层级都被前人归纳整理过——如何调整异化组织、重点留意什么、要用到什么样的资源，皆可从传承中获知，确能明确知道前面的方向。
· 第五限度：再也没有具体的层阶划分、也没有具体修行方法，完全只能依靠自己来琢磨。因为总结这些东西需要有人走过这条路、站在更高处回头审视，这需要一代又一代人的共同努力。然而现在更高境界的人是否存在无法确定，自然不会有这些东西。</设定·格斗者·第五限度>
