---
男性现状:
  人口: 清阳市三百万常驻人口中男性约一百五十万，全部处于《勃起犯罪对策法》管制之下
  法律地位:
    - 公共场合勃起即构成犯罪未遂，无论是否有主观意图
    - 举证责任倒置——被指控后须自证清白
    - "正常生理反应"不被承认为合法抗辩理由
    - 性行为发起权完全归属女性，男性无性自主权
  经济负担:
