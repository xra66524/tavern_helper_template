<阵营·五大流派——天性派>
（五大派中最独特的一支。适用于角色涉及天性派背景、极端个人主义、淫堕魔法少女、反派或灰色地带剧情时参考。）
【理念与背景】
五大派之中最独特的流派——强调顺应自身的天性，认为每个人都应该尊崇自身的内心，去寻求自身所需求的一切，极度强调自我。只要你认同这个理念就可以加入，哪怕你是别的派系的人。这种理念使得整个派系大部分成员非常散漫，从来不在乎一个人的出身和来历，也没有什么规矩来约束别人。
天性派中有些人的理念非常极端，甚至比其他派别还要极端——认为人类就应该被对面的世界所融合，人类就应该被淘汰，应该主动去拥抱大变革的未来。但凡天性派中能走到上层的格斗家，实力都不弱——因为他们足够极致，或者说足够极端。天性派部分人认为纯净派是武斗分子。

【局面与打压】
因为要求解放天性、活出自我，随心所欲到了极点之后，社会与个人没有关系，世界也与个人没有关系——我想干什么就干什么。普通人还好说，掌握了强大武力的人就是灾难了。因此天性派自二战之后就被世界各国打压。可偏偏那套东西很能吸引一批人，有着阴谋家存身的土壤。目前在世界各国都广泛存在着，而且这个派系偏偏高手很多，又不得不加以重视。
目前天性派在美洲及欧洲势力较大，在中国相对老实。
中国天性派总部位于上海，同时也是上海市公安局重点盯防的扫黄地点。

【与魔法少女的关联·淫堕魔法少女】
天性派在魔法少女体系中的对应分支即淫堕魔法少女——这正是天性派的"顺应天性"理念在魔法少女身上的最直接体现。
· 本质：淫堕魔法少女并非被深渊污染，而是"解放了自己的天性"——她们天生或后天发现自身在性方面的强烈欲望与快感需求，选择坦然接纳、不再压抑。精神裂痕并未被深渊触碰（侵蚀值可与普通少女一样为零），但内心意志推动了魔力与战服的自发转变，外观趋近堕落者的妖冶之美。这是"内力释放表达自我"，与恶堕的"外力侵蚀改写精神"有本质区别。
· 战斗风格：战力与普通魔法少女无异，照常打魔物、守护人类，不投靠深渊。魔力属性可能因解放而偏"暗"，但对魔物的净化效果不打折扣——深渊管不了她们。
· 社会争议：官方内部态度分裂——保守派视之为"自甘堕落、伤风败俗"，激进派认为"只要侵蚀为零就是合法战力"。独立魔法少女中对淫堕派接受度较高（本就追求自由）。民间舆论两极分化——有人追捧她们的"禁忌之美"，也有人以道德大棒攻击她们"不配称为守护者"。
· 社会定位：天性派魔法少女散漫自由，没有固定组织模式，也不像其他四派那样有集中的训练与资源体系。她们在世界各地或独自行动、或结伴而行，与其他派系的魔法少女关系微妙——尤其是与纯净派真纯魔法少女之间偶有理念冲突。
· 代价：社会认同度最低，容易被误认为恶堕者；天性派内部缺乏约束，个体若走得太远可能从"解放天性"滑向失控。
</阵营·五大流派——天性派>
