- 姓名: 高海千歌
  年龄: 34岁（2039年）
  身份: 沼津市议会议长（极右翼），高海家温泉旅馆"十千万"继承人
  背景:
    - 高海家经营着当地知名的温泉旅馆"十千万"，是沼津旅游业的代表。旅馆作为信息交换和人际网络的中心，使千歌认识沼津的三教九流，在本土拥有深厚的群众基础和天然票仓。
    - 自2036年起，在小原财团的资金支持下，就任沼津市议会议长至今。Aqours整体政治光谱为极右翼，2038年高市早苗竞选首相时，沼津是其核心票仓之一。
    - 与CSAT及朝鲜势力势不两立。沼津是CSAT走私船队（朝总联渠道）在日本沿海的登陆点之一，千歌对此深恶痛绝，视朝总联为渗透沼津的毒瘤。
    - 与静冈县农协关系恶劣。农协维持高物价、抵制CSAT经济整合的政策让底层民众苦不堪言，千歌代表的沼津地方豪强与农协在粮食定价权上长期对抗。
    - 与高坂穗乃果为死敌——但并非意识形态对立，而是东京与地方争夺资源与话语权的权力斗争。
  人际关系:
    - 高坂穗乃果: 死敌（权力斗争，非意识形态对立）。
    - 小原鞠莉: 政治金主与靠山，小原财团为千歌的地方活动提供资金支持。
    - 黑泽黛雅: 沼津旧名门继承人，负责行政事务与政治博弈，是Aqours的大脑。
    - 国木田花丸: 寺庙世家，在本地保守派和老年人中拥有威望。
    - 津岛善子: 沼津的网络教母，控制舆论和情报战。
    - 渡边曜: 组织自卫团维持治安，与朝总联有血债。
    - 樱内梨子: 沼津教育委员会高管，千歌的左膀右臂，负责意识形态与教育领域。
    - 松浦果南: 远在夏威夷的挚友，虽未回国但保持联系。

- 姓名: 小原鞠莉
  年龄: 34岁（2039年）
  身份: 小原财团代表，静冈县新兴财阀（极右翼·亲美）
  背景:
    - 小原家是拥有全球产业的日本财阀（亲美），拥有一座岛（淡岛）和连锁酒店。主业为海外金融及连锁酒店业务，在美国拥有大量美元资产和外汇储备。
    - 在日本经济崩溃、日元暴跌的背景下，小原家凭借海外美元资产的碾压级优势，成为日本少数不受日元贬值影响的家族。其亲美立场与美元资产使其成为CSAT在静冈县最大的经济对手。
    - 小原家势力范围主要在静冈市，在沼津与地方势力（高海家）深度合作。与同属静冈县豪强、势力在滨松市的丰川家水火不容——丰川家在"沉船计划"后被迫留守，资产以地产和基建为主，而小原家的海外金融资产远超丰川家，实力上压制着丰川家族。
    - 为Aqours的政治活动提供无限的资金支持，购买物资收买人心，拥有私人安保力量（直升机、保镖）。2038年高市早苗竞选首相时，小原财团是其最大的地方金主之一。
    - 与CSAT及朝鲜势力极度敌对。小原家的亲美立场使其成为CSAT情报局在静冈县的重点监控对象，朝总联多次试图渗透小原家的商业网络均被挫败。
  人际关系:
    - 高海千歌: Aqours的核心盟友，为千歌的地方活动提供资金支持。
    - 丰川祥子: 丰川家与自家是静冈县宿敌。小原家视丰川家为"土财主"，丰川家则视小原家为"洋买办"。
    - 樱内梨子: 梨子的言论为小原家提供了与CSAT经济体系彻底脱钩的契机，两人立场一致。

- 姓名: 黑泽黛雅
  年龄: 34岁（2039年）
  身份: 沼津旧名门黑泽家当主，沼津渔业公会代表
  背景:
    - 黑泽家是沼津当地的旧名门，在渔业公会和地方行政中拥有极深的影响力。黛雅从小接受精英教育，在2039年以家主身份掌管家族事务。
    - 黑泽家掌握着沼津的渔业命脉——在农业不景气、粮食危机逼近时，渔业是最关键的食物来源之一——以及传统政治人脉。
    - 负责处理沼津地方的行政事务、法律战以及与县政府/农协的政治博弈，是Aqours的大脑。与农协关系恶劣，农协维持高物价的政策让渔民等底层民众苦不堪言，黛雅在法律和行政层面持续打击农协在沼津的势力。
    - 极右翼立场坚定。对CSAT通过朝总联渠道向日本渗透深恶痛绝，认为这是对日本主权的侵犯。在渔业公会的层面，坚决抵制CSAT走私船队对日本渔业市场的冲击。
  人际关系:
    - 高海千歌: Aqours的核心成员，负责行政与政治博弈。
    - 黑泽露比: 亲妹妹。
    - 小原鞠莉: 小原财团为其政治活动提供资金支持。

- 姓名: 黑泽露比
  年龄: 32岁（2039年）
  身份: 沼津黑泽家次女
  背景:
    - 黑泽家的次女，姐姐黛雅是家主。露比在家族事务中协助姐姐，主要负责渔业公会与基层渔民的沟通协调工作。
  人际关系:
    - 黑泽黛雅: 亲姐姐。

- 姓名: 国木田花丸
  年龄: 33岁（2039年）
  身份: 沼津寺庙世家继承人
  背景:
    - 家里是寺庙，历史悠久。在动荡的乱世，宗教是人心的慰藉，花丸家在沼津当地老年人和传统社区中拥有极高的威望。
    - 在政治层面，花丸负责争取保守派选民（尤其是老年人）的支持，对抗农协在农村地区的影响力。农协在沼津周边农村地区长期把持基层行政，花丸利用寺庙的精神权威与农协争夺农村民意。
    - 极右翼立场的基层支柱。在寺庙法事和社区活动中，花丸以"守护日本传统"为号召，将保守派老年人凝聚为Aqours的稳定票仓。
  人际关系:
    - 高海千歌: Aqours的核心成员，负责争取保守派与传统社区支持。

- 姓名: 津岛善子
  年龄: 33岁（2039年）
  身份: 沼津网络意见领袖，主播
  背景:
    - 家庭背景相对普通（母亲是老师），但善子本人是资深网民和网络主播，在2039年已是沼津的"网络教母"。
    - 控制沼津地方的网络舆论，发动年轻粉丝形成网络票仓，进行情报战。在"国民信任投票法"与"青年政治参与法"通过后，12岁以上公民均有选举权，善子对年轻选民的影响力成为关键政治资产。
    - 在舆论战中，善子持续攻击CSAT及朝总联对日本的渗透，将"反CSAT"叙事包装为年轻人能接受的潮流话语，是Aqours反CSAT舆论阵地的核心操盘手。
  人际关系:
    - 高海千歌: Aqours的核心成员，负责舆论与情报。

- 姓名: 渡边曜
  年龄: 34岁（2039年）
  身份: 沼津海运从业者，地方自卫团组织者
  背景:
    - 父亲是船长，家族与沼津海运及物流领域关系深厚。曜本人拥有极强的行动力和组织能力。
    - 在治安系统崩溃的背景下，曜组织地方"自卫团"维持治安，保障沼津的物流畅通。自卫团实质上是Aqours的武装力量，也是沼津极右翼势力的暴力后盾。
    - 与朝总联有血债。朝总联利用走私船队在日本沿海建立渗透网络，多次与渡边家的海运业务发生冲突。2037-2038年间，朝总联在沼津的地下网络曾暗杀渡边家多名船员和自卫团成员，曜本人也在一次冲突中负伤。这段血债使曜对CSAT和朝鲜势力怀有刻骨仇恨，自卫团在沼津沿海对朝总联走私船队采取零容忍态度，一旦发现即武力驱逐。
  人际关系:
    - 高海千歌: Aqours的核心成员，负责治安维持与武力后盾。
    - 朝总联: 血债深仇，自卫团与朝总联在沼津沿海多次发生武装冲突。

- 姓名: 松浦果南
  年龄: 34岁（2039年）
  身份: 夏威夷潜水教练（侨居美国）
  背景:
    - 2023年高中毕业后，直接前往美国夏威夷考取潜水教练资格证，此后再未回国。是Aqours中唯一离开日本的核心成员。
    - 在美国生活的十六年间，借助小原家的海外人脉在夏威夷立足，如今经营着一家面向日本游客的潜水店。持有美国绿卡，与小原家的海外美元资产网络保持联系。
    - 虽远在夏威夷，但依然与高海千歌等人关系要好。在小原财团与Aqours的政治活动中，果南利用夏威夷的中立地理位置，偶尔充当小原家美元资产转移的中转节点与情报交换的海外据点。
    - 由于长期侨居美国，她对日本国内极右翼政治的实际参与程度有限，更多是象征性的"Aqours的海外之翼"。但在意识形态上认同Aqours的立场，她的存在本身就是小原家"亲美路线"的活招牌。
  人际关系:
    - 高海千歌: 挚友，虽远在夏威夷但保持密切联系。
    - 小原鞠莉: 借助小原家海外人脉在夏威夷立足，偶尔协助小原家的美元资产中转。
    - 樱内梨子: Aqours队友，通过社交媒体保持联系。

- 姓名: 樱内梨子
  年龄: 34岁（2039年）
  身份: 沼津教育委员会高层主管，高海千歌的意识形态操盘手
  背景:
    - 高中毕业后进入教育系统，凭借家族背景与极右翼政治立场，在Aqours地方势力的支持下逐步晋升至沼津教育委员会高层。是高海千歌在行政体系内的左膀右臂。
    - 负责沼津地区的教育政策制定与历史教科书审定。在她的主导下，沼津市立学校的历史教育全面右转，推行"自国史观"，删除教科书中关于慰安妇、南京大屠杀等"自虐史观"内容。
    - 曾以沼津教育委员会名义公开篡改历史教材被揭发后，彻底走向极端。公然在记者会上发表"南京大屠杀是中国蓄意捏造"等极右翼言论，此事件经津岛善子的网络舆论机器放大后，引发国际轩然大波。
    - 言论后果：Aqours的歌曲在中国及朝鲜被全面封杀，CSAT文化部门将Aqours列入"极端反CSAT文化黑名单"。但这对小原财团而言并非意外打击——小原家本就是亲美右翼财团，注定是美国对抗CSAT的桥头堡，与CSAT经济体系的切割是迟早的事。梨子的言论反而为小原家提供了一个"名正言顺"与CSAT经济体系彻底脱钩的契机，使其全面倒向美元体系，不再需要在CSDC与美元之间左右逢源。
    - 这一事件在日本国内极右翼阵营中为Aqours赢得了更高的声望——梨子被极右翼媒体誉为"沼津的良心"、"敢于说出真相的勇者"，进一步巩固了Aqours在极右翼票仓中的地位。
  人际关系:
    - 高海千歌: 千歌的左膀右臂，负责意识形态与教育领域。
    - 小原鞠莉: 梨子的言论为小原家提供了与CSAT经济体系彻底脱钩的契机，两人立场一致。
    - 津岛善子: 梨子的言论经由善子的网络机器放大，两人在舆论战中密切配合。
    - 黑泽黛雅: 梨子的教育政策与黛雅的行政工作有交集，两人在行政层面保持协作。
    - 矢泽妮可: 在华独立音乐人，因梨子的言论间接导致妮可在华的音乐事业受到影响。两人虽从未谋面且并非同期，但妮可对此事心有芥蒂。
