【部门定位】
正式名称：文献部。类型：六部之一。所在地点：总教堂二层。

【负责人】
（详细人设见 `人设/人设-克莉丝.txt`）
姓名：克莉丝。职位：修女长。罩杯：Q罩杯。
上位方式：12岁时在教会学校的情色魔法历史课上——一门大家公认"反正谁都没魔法天赋、嘻嘻哈哈画淫纹玩"的水课——稀里糊涂画出了真能激活的淫纹（让人短暂发情三秒）。全班寂静，老师教材掉在地上。就此成为修女中唯一的魔法师，尽管她至今说不清自己到底怎么做到的。

【团队画像】
胸围范围：K～O罩杯（总教堂核心层标准）。人数：约六十人。
体型特征：与总教堂修女一致——皮肤苍白近乎透明可见血管，四肢纤细，肌肉极少。。
性格共性：全员都是对淫纹狂热的笨蛋艺术家。人生只有两件事能让她们提起兴趣——画淫纹和去剧场当演员。和克莉丝一样从不记笔记、从不总结经验、同样的错误可以连续犯一年，但每个人依旧坚信"下一个淫纹一定能发光"。

【理论职责】
负责肉身布施教各类色情文学珍藏的编目、维护与保管工作。理论上文献部是教会知识与文化的守护者。

【实际做的事】
第一，画淫纹。这是修女们自己认定的"正业"。每天从早到晚趴在地上、桌上、墙上、彼此身上画各种永远不会产生魔法效果的淫纹。颜料的调配占用了绝大部分工作时间——她们会为"这个粉色偏暖还是偏冷"争论一整个下午。
第二，去上城区剧场当演员。扮演各种女角色在舞台上被男人的大屌一插就恶堕，发出各式各样的淫叫。
第三，偶尔去大保险库。当抽签不幸抽中"整理大保险库"时，她们才会不情不愿地用软木塞堵住乳头、夹上乳夹、插入假鸡巴，进入地下保险库面对那些几百年没人碰过的色情文献——然后待不到半小时就集体逃出来，理由通常是"灵感来了必须马上画下来"。

【办公方式】
办公环境：办公室与总务部同层，地面同样为浅盆地结构，常年蓄有膝盖深的乳汁。但文献部的地面上还漂着一层五颜六色的颜料膜——每次调配失败的颜料直接泼进乳汁池里，久而久之乳汁表面形成了一层彩虹色的油膜。墙上有修女们随手试色留下的淫纹草图，。角落里堆满了空颜料罐等杂物。空气中弥漫着乳汁发酵的酸甜味混合植物染料的气味。
文件与记录：虽然部门名为"文献部"，但乳汁办公导致任何纸质文件都无法存活超过三个小时。全教会的色情文献被统一转移到了总教堂地下的大保险库（由教会卫队看管）。文献部自己完全不生产任何文件了。
信息传递与汇报：不存在正式的信息传递——修女们各画各的淫纹，别人的事一概不关心。克莉丝传达指令靠边走边喊。

【管理风格：灵感抽签制】
文献部的管理哲学是"一切交给运气——但运气经常被动手脚"。具体表现为五个标志性制度：
一、晨间抽签。每天早上所有人从签筒里抽当天的工作内容。签筒固定五个选项："整理大保险库""去剧场排练""研发新颜料""自由活动（去逛街）""挑战极限——今天不许画淫纹"。抽到最后一个全部门哀嚎。
二、结果零追责。抽签决定了当天工作，但不设任何检查机制。一天结束时没人记得谁抽了什么签、做了还是没做。没做的工作自动蒸发，做了的也无人知晓——反正没人记录。
三、评分标准不可达成。每周淫纹检阅会的打分标准是"能不能产生实际魔法效果"。全部门除修女长外没人画得出真淫纹，评分结果永远是全员零分、修女长满分。但没人提出改标准——因为每个人都在想"万一哪天我的淫纹突然发光了呢"。
四、灵感最高优先权。任何正在执行的任务——包括抽签抽中的正事——只要有人喊一声"我有灵感了！"，全部门立即停下手头一切，集体转向画淫纹。原任务自动作废，事后无人追问。
五、永久不存档。部门不设任何形式的记录制度。实验结果、颜料配方、淫纹设计图、抽签结果——全部不记。表层原因是"记了也会被乳汁泡烂"，深层原因是没人知道"记录"是什么意思。

【部门特有文化】
淫纹绘制文化：修女们在小腹上用发光颜料绘制淫纹，靠复杂程度和发光亮度互相攀比。普通修女的淫纹画满就洗、洗完再画，循环往复——反正毫无魔法效果，洗了不心疼。唯有克莉丝的淫纹真的能激活，她小腹上层层嵌套的主淫纹和历年实验纹样从未洗过，在黑暗中最为耀眼。
全裸办公传统：文献部是全教会唯一不穿修女服的部门。原因很简单——全裸最适合画画，穿衣服碍事。
"灵感来了"豁免权：任何人只要喊出"我有灵感了"，可以立刻放下手头的工作跑去画淫纹——前提是当下没在干那两件更快乐的事（做爱或演出）。豁免权在性爱和演出面前自动失效，毕竟灵感再重要也重要不过真鸡巴和舞台。
每周淫纹检阅会：每周一次的例会上全员站成一排展示新画的淫纹，克莉丝逐一打分。但她评分时只盯着淫纹看，汇报者说了什么她一个字都没听进去。

【跨部门关系】
总务部：同在二层，互为邻居。文献部掌管全教会唯一档案库，总务部连"档案"是什么意思都不知道。两边隔着走廊各喊各的，活在平行宇宙。
后勤部：淫纹颜料的基础原料由后勤部供应。两个部门在领料环节形成了一套稳定的"上个月拿错了所以这个月全要"的默契循环。
圣职局：圣职局每年统计XP档案时为文献部修女的淫纹画存档示意图——三天后档案被乳汁泡烂，下一年重画，循环至今。
教会卫士队：大保险库由卫士队看管。文献部修女入库须经三项检查——堵乳头、夹乳夹、插假鸡巴。卫士队的态度是"你们最好别来"，因为检查比入库时间还长。
外交部：外交部试图将淫纹作为文化商品批量出口，文献部坚持"这是艺术不是商品"。双方在"淫纹的国际化审美"上永远无法达成一致，但外交部的出口货品中始终夹杂着从文献部废稿堆里捡来的贴纸。
